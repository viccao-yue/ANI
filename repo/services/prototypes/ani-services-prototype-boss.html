统繁忙，请稍后重试 |\n\n字段级错误（建议）：\n- invitations[3].email：invalid email format\n- oidc.issuer：invalid url\n\n### 5.2 频率限制（建议默认值）\n\n设置类接口属于“高风险低频”操作，建议默认较严格：\n\n| API 类别 | Limit（示例） | Description |\n|---|---|---|\n| 读取类（GET） | 60 req/min/user | 常规读取 |\n| 成员邀请 | 10 req/min/tenant | 防止滥用与轰炸 |\n| 角色变更/移除成员 | 20 req/min/tenant | 需要保护 |\n| SSO 配置变更 | 5 req/min/tenant | 高风险变更，建议二次确认 |\n| 密钥创建/轮换 | 5 req/min/tenant | 高风险变更 |\n| Webhook 创建/删除 | 10 req/min/tenant | 防止误操作与刷写 |\n\n建议返回（可选）：\n- X-RateLimit-Limit / Remaining / Reset\n- X-Request-Id（必返）\n","docs/BOSS-功能细节说明.md":"# BOSS 功能细节说明（可落地）\n\n本文档用于补齐 BOSS 侧各页面的可实施细节，统一对齐 Console 已有规范：信息密度、交互范式（列表 + 详情抽屉/页 + 操作确认）、状态处理（loading/empty/error）、以及权限与审计约束。\n\n## 通用规范（继承 Console）\n\n### 统一交互范式\n\n- 列表页默认包含：筛选区（可折叠） + 主表格 + 批量操作（可选） + 右侧详情抽屉（可选）\n- 详情展示优先使用抽屉；当信息密度/信息层级过深时使用详情页\n- 危险操作（删除/停用/配额降低/证书替换/升级执行/垃圾回收等）必须二次确认，并在确认框内展示影响范围与不可逆提示\n- 所有写操作必须在完成后给出明确结果（成功 toast + 关键字段回显；失败 toast + 可复制 requestId）\n\n### 状态与数据流（页面级）\n\n- 页面状态统一：初始化加载（skeleton）→ 成功（列表/详情）/ 空（empty state）/ 失败（error state）\n- 列表筛选变更：重置 pageNo=1，保留 pageSize/sortBy/sortOrder\n- 详情抽屉打开：优先用列表数据预填，随后拉取详情接口补全；失败时显示“部分信息不可用”并提供重试\n- 批量操作：先进行前置校验（权限/状态/范围），确认后触发异步任务；在“任务历史”可追踪\n\n### 权限模型（Bearer + 资源级权限）\n\n统一约定：所有 BOSS 接口为管理端接口，使用 Authorization: Bearer 鉴权；权限采用“角色 + 资源级授权”组合：\n\n- 角色（示例）：SuperAdmin / Operator / Auditor\n- 资源级范围：tenantId / projectId（可选）/ resourceType / resourceId\n- 关键边界：\n  - 无权限：返回 403\n  - 资源不存在或跨租户不可见：返回 404（避免信息泄露）\n  - 同一请求内涉及跨租户资源：整体拒绝（403/404），并给出可定位的 requestId\n\n### 异常处理与提示规范\n\n- 400：参数校验失败 → 表单字段级提示 + 全局 toast\n- 401：登录态失效 → 引导重新登录\n- 403：无权限 → 明确缺少的权限点/范围（仅对管理员可见；对审计员可简化提示）\n- 404：资源不存在/不可见 → 引导刷新/返回列表\n- 409：状态冲突（如配额低于已使用、任务重复执行、升级窗口冲突）→ 展示冲突原因与建议动作\n- 429：触发限流 → 展示建议等待时间与重试策略\n- 5xx：系统错误 → 展示 requestId + 允许一键复制（用于排障）\n\n### 审计与可追踪性\n\n- 所有写操作必须产生审计事件（操作审计可查询），至少包含：actor、tenant、resource、action、result、requestId、before/after（若适用）\n- 支持从“操作审计/告警/日志/Trace”互相跳转：以 requestId 作为主链路关联键\n\n---\n\n## BOSS / 运营总览\n\n### 页面目标\n\n- 面向 Operator/SuperAdmin 的平台级“单屏态势感知”：平台健康、租户健康、资源健康、风险与告警、趋势。\n\n### 页面布局与元素规则\n\n- 顶部工具条：时间范围（最近 1h/6h/24h/7d/自定义）+ 自动刷新开关（默认开，间隔 30s）+ 导出（CSV/JSON）\n- 核心区块卡片（与 Console 首页卡片一致的视觉层级）：\n  - 平台状态（服务分组健康摘要：正常/降级/异常/未知）\n  - 租户概览（总数、活跃、停用、近 24h 新增）\n  - 资源概览（GPU/CPU/内存/存储：总量/已分配/使用率）\n  - 服务概览（推理服务、知识库、模型数量：总量/异常数）\n  - 告警（P0/P1 当前数、未确认数、最近触发）\n  - 交付状态（最近安装、验收、故障单：进行中/失败）\n  - 用量趋势（GPU-Hours、Token、KB Queries：折线图）\n\n### 核心操作\n\n本页操作按“触发条件 → 执行路径 → 输出结果”结构描述。\n\n- 新建租户\n  - 触发：点击“新建租户”\n  - 路径：打开“新建租户向导”→ 提交创建 → 成功后跳转租户详情抽屉\n  - 输出：新增租户记录 + 审计事件；若配额不足/名称冲突返回 409\n- 查看告警\n  - 触发：点击告警卡片或“查看告警”\n  - 路径：跳转 BOSS/平台健康/告警，并携带默认筛选（P0/P1 + 未关闭）\n  - 输出：告警列表展示\n- 查看平台健康\n  - 触发：点击平台状态卡片\n  - 路径：跳转 BOSS/平台健康/服务状态，并定位到异常服务分组\n  - 输出：服务状态列表\n- 导出运营报表\n  - 触发：点击“导出”\n  - 路径：生成导出任务（异步）→ 在“任务历史”查看状态 → 完成后提供下载\n  - 输出：导出文件（含时间范围与筛选条件元信息）\n\n### 异常场景\n\n- 指标源不可用：对应卡片显示“数据源异常”，保留上次成功时间与重试按钮\n- 多数据源聚合部分失败：允许“部分成功展示”，并提示哪些分组失败\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n\n### 权限与边界\n\n- Auditor 默认只读可见，不允许新建租户/导出（可配置为只允许导出审计类报表）\n- Operator 仅可见被授权的租户/资源范围聚合结果（跨范围数据必须脱敏或聚合）\n\n### 前置依赖与关联\n\n- 依赖：指标系统（Prometheus/计量服务）、告警系统、任务服务、租户服务\n- 关联：告警/服务状态/任务历史/租户列表\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n---\n\n## BOSS / 租户管理 / 租户列表\n\n### 页面目标\n\n- 管理租户全生命周期：创建、停用/恢复、查看状态、跳转配额/用量/管理员管理。\n\n### 页面布局与元素规则\n\n- 筛选区：租户状态（active/suspended/deleted）、创建时间、最近活跃时间、资源占用区间（GPU/CPU/存储）、关键词（名称/管理员）\n- 表格列规则：\n  - 状态列采用颜色 badge：active（绿）、suspended（黄）、deleted（灰）\n  - 数值列（配额/使用）支持 tooltip 展示“已用/总量”\n  - 操作列按权限显示（按钮灰显不展示均可；推荐不展示并在更多菜单中提示原因）\n- 详情抽屉（建议）：基础信息、配额摘要、最近活跃、关键告警、最近操作审计\n\n### 核心操作\n\n- 查看租户详情\n  - 触发：点击租户名称\n  - 路径：打开详情抽屉（预填列表数据）→ 拉取详情补全 → 支持跳转“配额管理/用量/管理员”\n  - 输出：可复制 tenantId、requestId\n- 新建租户（向导）\n  - 触发：点击“新建租户”\n  - 路径：基础信息 → 配额设置 → 管理员账号 → SSO 选项（可选）→ 确认创建\n  - 输出：创建成功后返回列表并高亮新租户；失败返回字段级错误\n  - 校验要点：租户名称唯一；管理员账号唯一；配额不得超过平台剩余资源池（否则 409）\n- 停用/恢复租户\n  - 触发：操作列选择“停用/恢复”\n  - 路径：二次确认 → 触发状态变更（可能异步）→ 结果回写\n  - 输出：suspended 状态下禁止新建推理服务/知识库；已运行资源策略由平台策略决定（建议：允许存量运行但禁止扩容）\n- 重置管理员\n  - 触发：操作列“重置管理员”\n  - 路径：选择重置方式（重置密码/重置 MFA/重新绑定邮箱）→ 二次确认 → 生成一次性链接/临时密码（只展示一次）\n  - 输出：审计事件必填 reason；敏感输出仅展示一次\n\n### 状态与数据流\n\n- 列表数据：租户服务（tenant）+ 计量服务（usage）聚合；聚合失败允许降级展示（仅 tenant 基础字段）\n- 停用/恢复：写操作 → 若异步，返回 taskId；页面展示“处理中”并轮询任务状态\n\n- 异步操作：返回 taskId，并可在“任务历史”中查看进度、日志与结果/下载链接（若适用）\n\n### 异常场景\n\n- 配额信息不可用：操作列隐藏“编辑配额”，提示“计量/配额服务不可用”\n- 停用冲突：存在强制禁止停用的资源（如正在升级/迁移任务）→ 409 并提示关联任务\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n\n### 权限与边界\n\n- SuperAdmin：全量操作\n- Operator：仅对授权 tenant 范围可见/可操作；跨租户不可见视为 404\n- Auditor：只读；禁止新建、停用、重置\n\n### 前置依赖与关联\n\n- 依赖：租户服务、配额服务、计量服务、任务服务、审计服务\n- 关联：配额管理、租户用量、管理员账号、操作审计\n---\n\n## BOSS / 租户管理 / 配额管理\n\n### 页面目标\n\n- 管理租户资源上限（GPU/CPU/内存/存储/服务数/知识库数/限流），并明确“调整影响与生效策略”。\n\n### 页面布局与元素规则\n\n- 顶部：租户选择器（支持按名称/tenantId 搜索）\n- 配额概览卡：当前配额、当前使用、近 7d 峰值（可选）\n- 配额表格：每行一个配额项；包含“当前/使用/新值/差值/影响”\n- 调整配额抽屉：\n  - 新配额输入规则：数字型支持最小值/最大值提示；必须大于等于当前使用（否则 409）\n  - 生效时间：立即/定时（定时需要时区与调度冲突校验）\n  - 审计备注：必填（用于运营追溯）\n\n### 核心操作\n\n- 调整配额\n  - 触发：点击某项“调整”\n  - 路径：打开抽屉 → 输入新配额 → 预检（dry-run，返回影响）→ 确认提交（可能异步）→ 刷新概览\n  - 输出：成功后记录 before/after；若异步返回 taskId\n- 批量调整（可选）\n  - 触发：多选配额项 → “批量调整”\n  - 路径：一次性填写多项 → dry-run → 提交\n  - 输出：失败时逐项返回错误（details 列表），并可继续修改后重试\n\n### 影响说明（必须可见）\n\n- 配额降低：不得低于已使用；若需强制降低，必须走“回收/迁移”流程（本页只提供引导，不直接执行）\n- API 限流调整：生效方式明确（立即影响新请求；历史窗口按服务策略）\n\n### 异常场景\n\n- 409：新配额 < 当前使用；或定时生效窗口与升级窗口冲突\n- 400：输入格式不合法（小数/负数/超范围）\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n\n### 权限与边界\n\n- Operator 需具备 tenant:quota:write + 资源范围授权；否则按钮不展示\n- Auditor 只读，可见历史调整记录（建议只展示聚合，不展示敏感备注）\n\n### 前置依赖与关联\n\n- 依赖：配额服务、计量服务、任务服务、审计服务\n- 关联：租户列表（入口）、运维 Skills（tenant.quota）、任务历史\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n---\n\n## BOSS / 租户管理 / 管理员账号\n\n### 页面目标\n\n- 管理租户管理员账号：创建/绑定、重置、锁定/解锁、MFA/SSO 状态检查。\n\n### 页面布局与元素规则\n\n- 顶部：租户选择器\n- 主表格：管理员账号列表（通常 1~N，支持主/副管理员）\n- 右侧详情抽屉：账号安全态（MFA/SSO）、最近登录、最近操作审计\n\n### 核心操作\n\n- 新增管理员（绑定已有用户/创建新用户）\n  - 触发：点击“新增管理员”\n  - 路径：选择方式 → 填写邮箱/手机号/用户名 → 发送邀请/设置临时密码 → 绑定为 tenant-admin\n  - 输出：邀请状态（pending/accepted/expired），可重发邀请\n- 重置安全凭据\n  - 触发：操作列“重置密码/重置 MFA/解除 SSO 绑定”\n  - 路径：二次确认 → 生成一次性链接或触发流程 → 记录审计 reason\n  - 输出：一次性链接仅显示一次；后续只能重新生成\n- 锁定/解锁\n  - 触发：操作列“锁定/解锁”\n  - 路径：确认 → 立即生效\n  - 输出：锁定后该用户无法登录/调用管理端接口；审计记录\n\n### 异常场景\n\n- 409：该用户已是该租户管理员；或存在未完成邀请需先取消/过期\n- 400：邮箱格式、手机号格式不合法\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n\n### 权限与边界\n\n- 仅 SuperAdmin 或具备 tenant:admin:write 的 Operator 可操作\n- Auditor 仅可查看账号列表与安全态（敏感字段脱敏）\n\n### 前置依赖与关联\n\n- 依赖：IAM/用户中心、租户服务、审计服务、通知服务（邮件/短信）\n- 关联：租户列表（重置管理员入口）、操作审计\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n---\n\n## BOSS / 租户管理 / 租户用量\n\n### 页面目标\n\n- 平台侧查看租户用量与成本归因：GPU-Hours、Token、存储、知识库查询、推理请求等。\n\n### 页面布局与元素规则\n\n- 顶部：租户选择器 + 时间范围 + 维度（按服务/按模型/按项目/按 API Key）\n- 指标卡：总量、同比/环比（可选）、异常涨幅提示\n- 明细表：按维度分组的用量排行（支持导出）\n- 规则提示：计量延迟窗口（如 T+5min）、数据修正说明\n\n### 核心操作\n\n- 切换维度\n  - 触发：选择维度 tab\n  - 路径：刷新图表与明细表；保留时间范围与租户\n  - 输出：展示对应维度的 topN 与长尾汇总\n- 导出用量\n  - 触发：点击“导出”\n  - 路径：异步导出任务 → 任务历史追踪 → 下载\n  - 输出：导出文件包含维度、时间范围、过滤条件与生成时间\n\n### 异常场景\n\n- 数据延迟：提示“最近 X 分钟数据可能不完整”\n- 计量服务不可用：降级仅展示历史缓存或提示不可用\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n\n### 权限与边界\n\n- Operator 仅可见授权租户范围\n- Auditor 可见但默认脱敏（如 API Key 只展示前缀）\n\n### 前置依赖与关联\n\n- 依赖：计量服务、导出任务服务、对象存储（导出文件）\n- 关联：用量报表（Console 租户侧）、推理调用审计\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n---\n\n## BOSS / 资源运营 / GPU 资源池\n\n### 页面目标\n\n- 平台级 GPU 资源全景：总量/分配/利用率、型号分布、节点维度健康、租户占用与热点。\n\n### 页面布局与元素规则\n\n- GPU 总览：总 GPU、已分配、使用中、空闲、故障；支持按资源池/机房（若存在）筛选\n- 型号分布：按 gpuModel 聚合的饼图/条形图\n- 节点列表：按利用率/故障排序；支持查看节点详情抽屉\n- 租户占用排行：支持切换口径（分配数/使用数/GPU-Hours）\n- 利用率趋势：时间范围与聚合周期（实时/5min/1h/24h）\n- 异常设备：ECC 错误、温度异常、驱动不匹配等（按严重度）\n\n### 核心操作\n\n- 查看节点详情\n  - 触发：点击节点名\n  - 路径：打开节点详情抽屉 → 展示 GPU 列表、最近事件、指标曲线 → 可跳转节点健康页\n  - 输出：支持复制 nodeName、GPU UUID\n- 标记异常/发起运维 Skill\n  - 触发：异常设备列表“触发运维”\n  - 路径：选择 skill（如 gpu.drain）→ 参数配置 → 确认执行（异步）→ 任务历史跟踪\n  - 输出：taskId；告警/审计关联\n\n### 异常场景\n\n- 指标缺失：标记为 unknown，并提示最近采集时间\n- 节点离线：仅展示最后一次上报信息，操作按钮隐藏\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n\n### 权限与边界\n\n- Operator 可按授权资源池范围查看与操作\n- Auditor 只读\n\n### 前置依赖与关联\n\n- 依赖：监控/指标系统、节点信息源（K8s/CMDB）、任务服务、审计服务\n- 关联：节点健康、告警、运维 Skills\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n---\n\n## BOSS / 资源运营 / 节点健康\n\n### 页面目标\n\n- 运营侧节点健康与维护入口：查看节点状态、驱动/K8s 版本、执行维护动作（cordon/drain）。\n\n### 页面布局与元素规则\n\n- 筛选：角色（gpu/compute/storage）、状态（Ready/NotReady/Maintenance）、GPU 驱动状态、K8s 版本、标签/污点、资源占用区间\n- 表格：节点基础信息 + “维护态”标识；操作按状态与权限展示\n- 详情抽屉：标签、污点、Pod 列表、事件、指标曲线\n\n### 核心操作\n\n- 标记维护（cordon）\n  - 触发：操作列“标记维护”\n  - 路径：确认 → 将节点设为不可调度 → 成功后显示 Maintenance badge\n  - 输出：审计记录；可选触发告警静默建议\n- Drain（迁出工作负载）\n  - 触发：操作列“drain”\n  - 路径：预检（是否存在不可驱逐 Pod）→ 选择策略（忽略 DaemonSet/设置超时）→ 确认 → 异步任务\n  - 输出：taskId；失败时返回阻塞原因清单\n- 查看节点 Pod\n  - 触发：打开详情抽屉\n  - 路径：展示当前 Pod 与资源占用；支持跳转到 Console 容器资源页（只读）\n  - 输出：Pod 列表与事件\n\n### 异常场景\n\n- 409：drain 时存在 PDB 阻塞/不可驱逐 Pod；提示可选方案（先下线服务/调整 PDB）\n- 403：无维护权限\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n\n### 权限与边界\n\n- 维护操作需具备 infra:node:maintain 权限\n- Auditor 只读\n\n### 前置依赖与关联\n\n- 依赖：K8s 集群 API（或节点管理服务）、任务服务、审计服务\n- 关联：GPU 资源池、告警、运维 Skills\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n---\n\n## BOSS / 资源运营 / 存储容量\n\n### 页面目标\n\n- 平台存储容量与健康概览：块/文件/对象（若有），以及向量存储容量趋势与风险。\n\n### 页面布局与元素规则\n\n- 维度：存储类型（块/文件/对象/向量）+ 集群/资源池（若有）\n- 核心指标：总容量、已用、使用率、增长率、Top 租户/Top 项目\n- 风险提示：接近阈值（80/90/95%）与扩容建议\n- 操作：导出容量报表、跳转告警、触发 GC/清理（如果平台支持，建议走运维 Skill）\n\n### 核心操作\n\n- 查看 Top 租户占用\n  - 触发：点击 Top 榜单\n  - 路径：跳转到“租户用量”并预置过滤（存储维度）\n  - 输出：对应租户用量详情\n- 触发清理/GC（可选）\n  - 触发：点击“触发清理”\n  - 路径：选择范围（tenant/cluster）→ 选择策略 → 确认 → 异步任务\n  - 输出：taskId 与审计记录\n\n### 异常场景\n\n- 指标不一致：提示“数据口径来源”，允许切换数据源或查看上次同步时间\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n\n### 权限与边界\n\n- Operator 仅能对授权范围触发清理类操作\n- Auditor 只读\n\n### 前置依赖与关联\n\n- 依赖：存储监控、计量服务、任务服务、审计服务\n- 关联：租户用量、告警、运维 Skills、任务历史\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n---\n\n## BOSS / 资源运营 / 网络状态\n\n### 页面目标\n\n- 平台网络健康与容量（IP/带宽/连接错误）概览，支持定位到租户/服务维度。\n\n### 页面布局与元素规则\n\n- 指标：入口/出口带宽、连接数、丢包率、错误率、DNS/Ingress 状态\n- 维度筛选：集群/区域、网关实例、租户、服务（推理服务）\n- 事件：最近网络告警与变更（如网关升级/证书轮换）\n\n### 核心操作\n\n- 定位异常链路\n  - 触发：点击异常指标\n  - 路径：跳转“日志/Trace”并预置 requestId/服务过滤（如可关联）\n  - 输出：定位线索\n- 导出网络报表\n  - 触发：点击导出\n  - 路径：异步任务 → 下载\n  - 输出：导出文件\n\n### 异常场景\n\n- 指标采集延迟：提示采集延迟窗口\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n\n### 权限与边界\n\n- Operator 仅可见授权范围的租户/服务信息\n- Auditor 只读\n\n### 前置依赖与关联\n\n- 依赖：网关/Ingress 指标、日志系统、Trace 系统、任务服务\n- 关联：平台健康（告警/日志/Trace）\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n---\n\n## BOSS / 平台健康 / 服务状态\n\n### 页面目标\n\n- 查看平台服务健康：状态、版本、副本、延迟/错误率，并能快速跳转到日志与指标。\n\n### 页面布局与元素规则\n\n- 服务分组：网关/Auth/模型服务/知识库/计量/任务/数据库/对象存储/向量存储/消息队列/监控组件\n- 表格：服务名、状态（healthy/degraded/unhealthy/unknown）、副本、版本、P99、错误率、最近重启\n- 操作：查看日志、查看指标（新开抽屉/跳转日志页并带过滤）\n\n### 核心操作\n\n- 查看服务日志\n  - 触发：点击“查看日志”\n  - 路径：跳转到日志页并预置 service + 时间范围\n  - 输出：日志列表\n- 查看指标\n  - 触发：点击“查看指标”\n  - 路径：打开指标抽屉（可选）展示 QPS/latency/error rate/资源占用\n  - 输出：指标图\n\n### 异常场景\n\n- unknown：指标缺失或探活失败，提示“检查监控组件”\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n\n### 权限与边界\n\n- Auditor 可见但仅允许查看，不允许触发变更类操作\n\n### 前置依赖与关联\n\n- 依赖：健康探测/指标、日志系统\n- 关联：告警、日志、运维 Skills（如有自愈）\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n---\n\n## BOSS / 平台健康 / 告警\n\n### 页面目标\n\n- 处理 P0/P1/P2 告警：确认、静默、分派、关闭，并关联日志/Trace/运维。\n\n### 页面布局与元素规则\n\n- 筛选：等级、状态（firing/ack/silenced/resolved/closed）、租户、对象、时间范围、负责人\n- 详情抽屉：告警描述、触发规则、影响范围、建议处理、关联日志、关联运维 Skill\n- 操作要求：\n  - 确认（Ack）：必须填写处理备注（可选），记录责任人\n  - 静默（Silence）：必须填写原因 + 过期时间；静默范围明确（对象/租户）\n  - 分派：选择负责人/团队\n  - 关闭：仅 resolved 后允许关闭（否则 409）\n\n### 核心操作\n\n- 触发运维 Skill\n  - 触发：详情抽屉“触发运维 Skill”\n  - 路径：打开执行弹窗 → 参数预填（告警对象）→ 确认执行 → 任务历史追踪\n  - 输出：taskId + 审计 + 告警关联\n\n### 异常场景\n\n- 409：告警仍在 firing，禁止关闭\n- 403：无权限修改告警\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n\n### 权限与边界\n\n- Operator 可处理授权范围内告警\n- Auditor 只读\n\n### 前置依赖与关联\n\n- 依赖：告警系统、任务服务、审计服务、日志/Trace 系统\n- 关联：服务状态、日志、Trace、运维 Skills、任务历史\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n---\n\n## BOSS / 平台健康 / 日志\n\n### 页面目标\n\n- 平台日志检索：按服务/租户/requestId/level/关键词检索，并支持导出。\n\n### 页面布局与元素规则\n\n- 筛选：时间范围（必填）、服务、租户、request_id、level、关键词\n- 日志列表：时间、level、服务、实例/Pod、租户、request_id、message\n- 行为：\n  - 点击 request_id：跳转 Trace 并预填 request_id\n  - 点击 message：展开查看完整行（支持 copy）\n\n### 核心操作\n\n- 导出日志（可选）\n  - 触发：点击导出\n  - 路径：异步任务 → 下载\n  - 输出：导出文件（注意脱敏）\n\n### 异常场景\n\n- 查询超时：提示缩小时间范围；允许重试\n- 关键词过长：400 并提示限制（如 256）\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n\n### 权限与边界\n\n- Auditor 可查询但默认脱敏（如 IP/账号）\n\n### 前置依赖与关联\n\n- 依赖：日志系统、任务服务\n- 关联：Trace、告警、操作审计\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n---\n\n## BOSS / 平台健康 / Trace\n\n### 页面目标\n\n- 通过 request_id 排查跨服务调用，定位耗时与错误 span。\n\n### 页面布局与元素规则\n\n- 顶部：request_id 搜索（必填）+ 时间范围（可选）\n- 主体：Trace 瀑布图 + 服务调用链 + 耗时排行 + 错误 span\n- 行为：\n  - 点击 span：展示 tags/事件/日志（若有）\n  - 支持复制 traceId/spanId\n\n### 异常场景\n\n- 未找到：404，提示检查时间范围/是否采样\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n\n### 权限与边界\n\n- 跨租户 trace 默认不可见；若为平台级网关 trace，则只展示脱敏字段\n\n### 前置依赖与关联\n\n- 依赖：Trace 系统\n- 关联：日志、告警、审计（以 requestId 关联）\n\n### 核心操作\n\n- request_id 查询：输入 request_id → 拉取 trace → 展示瀑布图；未找到返回 404 并提示校验时间范围/采样\n- span 详情：点击 span 展示 tags/logs/events（若有），支持复制 traceId/spanId\n- 关联跳转：支持按 request_id 跳转到日志检索（预置 service/timeRange）\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n---\n\n## BOSS / 安全审计 / 操作审计\n\n### 页面目标\n\n- 查询所有重要操作记录，并支持导出与 Trace 关联。\n\n### 页面布局与元素规则\n\n- 筛选：租户、用户、操作类型、资源类型、结果、时间范围\n- 列表：时间、租户、用户、IP、操作、资源、结果、request_id、耗时\n- 详情：before/after（若适用）、参数摘要、错误信息（若失败）\n\n### 核心操作\n\n- 导出审计\n  - 触发：点击导出\n  - 路径：异步任务 → 下载\n  - 输出：CSV/JSON；包含元信息与脱敏策略说明\n- 跳转 Trace\n  - 触发：点击 request_id\n  - 路径：跳转 Trace 并预填 request_id\n  - 输出：Trace 页面\n\n### 权限与边界\n\n- Auditor 可读；Operator 仅授权范围\n\n### 前置依赖与关联\n\n- 依赖：审计服务、任务服务、Trace 系统\n- 关联：合规导出、任务历史\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n\n### 异常场景\n\n- 查询失败（网络/后端错误）：展示错误态与 requestId，并提供重试入口\n- 权限不足：403 或跨范围不可见按 404 处理；页面提示需联系管理员授权\n- 状态冲突：409 提示冲突原因与建议动作（如先停止任务/先扩容/先解除锁定）\n- 限流：429 提示等待时间与重试策略；必要时引导缩小查询范围\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n---\n\n## BOSS / 安全审计 / API Key 审计\n\n### 页面目标\n\n- 审计 Key 创建、使用、吊销与异常调用趋势。\n\n### 页面布局与元素规则\n\n- 筛选：租户、用户/service-account、Scope、状态、时间范围\n- 列表：Key 前缀、租户、主体、Scope、最近调用、调用次数、限流命中、状态\n- 详情：最近 24h 调用分布、失败原因 top、异常 IP top（可选）\n\n- 脱敏策略：默认不展示密钥明文、prompt 全文、完整账号等敏感字段；仅展示必要摘要（如 keyPrefix/hash/长度）\n\n### 核心操作\n\n- 定位异常调用\n  - 触发：点击“限流命中/异常调用”\n  - 路径：跳转日志并预填关键词（keyPrefix/requestId）\n  - 输出：日志列表\n\n### 权限与边界\n\n- 仅可展示 Key 前缀，不展示 secret\n\n### 前置依赖与关联\n\n- 依赖：API Key 服务/网关日志、审计服务\n- 关联：推理调用审计、日志\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n\n### 异常场景\n\n- 查询失败（网络/后端错误）：展示错误态与 requestId，并提供重试入口\n- 权限不足：403 或跨范围不可见按 404 处理；页面提示需联系管理员授权\n- 状态冲突：409 提示冲突原因与建议动作（如先停止任务/先扩容/先解除锁定）\n- 限流：429 提示等待时间与重试策略；必要时引导缩小查询范围\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n---\n\n## BOSS / 安全审计 / 推理调用审计\n\n### 页面目标\n\n- 审计推理调用链路与用量，不展示 prompt 全文。\n\n### 页面布局与元素规则\n\n- 筛选：租户、用户/API Key、模型/推理服务、状态码、时间范围、request_id\n- 列表字段：时间、租户、主体、模型/服务、input_tokens、output_tokens、duration_ms、status_code、request_id\n- 详情：请求摘要（脱敏）、响应摘要（脱敏）、错误信息、路由信息（如 region/cluster）\n\n### 异常处理与脱敏规则\n\n- prompt 默认不展示；仅展示长度、hash、top-level metadata\n- 如需合规审计展示全文，必须走“合规导出”并授权审批（本页不直接展示）\n\n### 权限与边界\n\n- Operator 可见授权范围\n- Auditor 可见但脱敏更严格\n\n### 前置依赖与关联\n\n- 依赖：推理网关日志/计量服务、审计服务、Trace 系统\n- 关联：租户用量、合规导出\n\n### 核心操作\n\n- 查询审计记录：按租户/主体/模型或服务/状态码/时间范围过滤并分页查询\n- 查看详情：打开抽屉展示脱敏请求/响应摘要、路由与计量字段（token、耗时等）\n- 关联排障：点击 request_id 跳转 Trace/日志，使用 request_id 作为链路键\n- 导出（可选）：创建异步导出任务并在任务历史下载，导出内容遵循脱敏策略\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n\n### 异常场景\n\n- 查询失败（网络/后端错误）：展示错误态与 requestId，并提供重试入口\n- 权限不足：403 或跨范围不可见按 404 处理；页面提示需联系管理员授权\n- 状态冲突：409 提示冲突原因与建议动作（如先停止任务/先扩容/先解除锁定）\n- 限流：429 提示等待时间与重试策略；必要时引导缩小查询范围\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n---\n\n## BOSS / 安全审计 / 合规导出\n\n### 页面目标\n\n- 按合规模板导出审计/用量/调用记录，形成“可审批、可追踪、可下载”的闭环。\n\n### 页面布局与元素规则\n\n- 模板选择：操作审计导出 / 推理调用审计导出 / 用量导出 / 自定义（可选）\n- 导出范围：租户范围、时间范围、字段脱敏级别（按权限）\n- 任务列表：taskId、模板、状态、创建人、创建时间、过期时间、下载\n- 下载链接：预签名 URL（有效期明确，如 24h）\n\n### 核心操作\n\n- 创建导出任务\n  - 触发：点击“创建导出”\n  - 路径：填写条件 → 校验（时间范围上限、字段权限）→ 创建任务 → 跳转任务列表\n  - 输出：taskId；完成后可下载\n\n### 异常场景\n\n- 400：时间范围过大（如 > 90d）\n- 403：无导出权限或脱敏级别不允许\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n\n### 权限与边界\n\n- Auditor 默认允许导出审计类模板；是否允许导出推理调用由平台策略决定\n\n### 前置依赖与关联\n\n- 依赖：任务服务、对象存储、审计/计量数据源\n- 关联：操作审计、任务历史\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n---\n\n## BOSS / 镜像仓库 / 项目配额\n\n### 页面目标\n\n- 管理镜像仓库项目配额（按租户/项目），并明确与 Registry（如 Harbor）的边界。\n\n### 页面布局与元素规则\n\n- 筛选：租户、项目、配额状态、使用率区间\n- 列表：项目、配额（容量/仓库数）、已用、使用率、最近推送、操作\n- 调整抽屉：新配额、影响说明、审计备注（必填）\n\n### 核心操作\n\n- 调整项目配额\n  - 触发：点击“调整”\n  - 路径：输入新配额 → dry-run（可选）→ 提交（可异步）→ 刷新\n  - 输出：审计事件 +（如异步）taskId\n\n### 异常场景\n\n- 409：新配额低于已用\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n\n### 权限与边界\n\n- 仅 SuperAdmin/授权 Operator 可写\n- Auditor 只读\n\n### 前置依赖与关联\n\n- 依赖：Registry/Harbor 集成服务、审计服务、任务服务\n- 关联：漏洞扫描、垃圾回收、租户配额\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n---\n\n## BOSS / 镜像仓库 / 漏洞扫描\n\n### 页面目标\n\n- 查看镜像漏洞扫描状态与报告，支持触发扫描、策略与阻断建议。\n\n### 页面布局与元素规则\n\n- 筛选：租户、项目、镜像仓库、tag、严重度、扫描状态、时间范围\n- 列表：镜像、扫描状态、最高严重度、漏洞数、上次扫描、操作\n- 详情：漏洞列表（CVE、严重度、修复建议、受影响层）+ 策略建议（是否阻断部署）\n\n### 核心操作\n\n- 触发扫描\n  - 触发：点击“重新扫描”\n  - 路径：确认 → 异步扫描任务 → 在任务历史追踪\n  - 输出：taskId；完成后刷新报告\n\n### 异常场景\n\n- 扫描器不可用：提示并允许重试；告警联动\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n\n### 权限与边界\n\n- Operator 可触发扫描需具备 registry:scan:trigger 权限\n- Auditor 只读（报告可见但敏感信息脱敏）\n\n### 前置依赖与关联\n\n- 依赖：扫描服务（Trivy 等）、Registry、任务服务、告警系统\n- 关联：故障处理、告警、运维 Skills\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n---\n\n## BOSS / 镜像仓库 / 垃圾回收\n\n### 页面目标\n\n- 执行/查看垃圾回收（GC）计划与结果，释放存储。\n\n### 页面布局与元素规则\n\n- 当前存储与可回收估算（可选）\n- GC 任务列表：任务 id、范围、状态、开始/结束、回收量、错误摘要\n- 触发 GC 弹窗：范围（全局/租户/项目）、窗口（立即/定时）、风险提示（可能影响 pull/push 性能）\n\n### 核心操作\n\n- 触发 GC\n  - 触发：点击“触发 GC”\n  - 路径：选择范围与窗口 → 二次确认 → 异步任务 → 任务历史追踪\n  - 输出：taskId；完成后展示回收量与报告\n\n### 异常场景\n\n- 409：同一范围存在运行中的 GC 任务\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n\n### 权限与边界\n\n- 仅 SuperAdmin/授权 Operator 可触发\n- Auditor 只读\n\n### 前置依赖与关联\n\n- 依赖：Registry、任务服务、审计服务\n- 关联：存储容量、任务历史、操作审计\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n---\n\n## BOSS / 运维操作 / 运维 Skills\n\n### 页面目标\n\n- 提供标准化运维能力入口：可审计、可参数化、可追踪。\n\n### 页面布局与元素规则\n\n- Skills 列表：Skill、说明、适用对象、风险等级、最近执行、成功率\n- 执行弹窗：\n  - 选择对象（可多选，需显示数量与范围）\n  - 参数配置（字段级校验）\n  - 风险说明（必须勾选“已阅读”）\n  - 确认执行（生成 taskId）\n\n### 核心操作\n\n- 执行 Skill\n  - 触发：点击“执行”\n  - 路径：选择对象 → 填参 → 二次确认 → 执行 → 跳转任务详情\n  - 输出：taskId；失败时展示错误摘要与重试入口\n\n### 异常场景\n\n- 403：无执行权限\n- 409：同一对象已存在冲突任务（如同节点 drain 中）\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n\n### 权限与边界\n\n- Operator 需要 skill:execute + 资源范围授权\n- Auditor 只读\n\n### 前置依赖与关联\n\n- 依赖：任务服务、审计服务\n- 关联：告警、节点健康、租户配额、任务历史\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n---\n\n## BOSS / 运维操作 / 任务历史\n\n### 页面目标\n\n- 查看所有异步任务状态，支持定位、重试、标记处理。\n\n### 页面布局与元素规则\n\n- 筛选：任务类型、状态、租户、资源、时间范围\n- 列表：任务 ID、类型、租户、资源、状态、进度、worker、开始/完成、错误信息\n- 详情：输入参数、执行日志、重试次数、相关 requestId\n\n### 核心操作\n\n- 重试任务\n  - 触发：点击“重试”\n  - 路径：仅允许失败/取消的任务重试（否则 409）→ 二次确认 → 创建新任务（关联 parentTaskId）\n  - 输出：新 taskId\n- 标记处理\n  - 触发：点击“标记处理”\n  - 路径：选择标记类型（已处理/忽略/需要升级）+ 备注\n  - 输出：便于运营协作，不影响任务真实状态\n\n### 权限与边界\n\n- Operator 仅可见授权范围任务\n- Auditor 可读但默认不可重试\n\n### 前置依赖与关联\n\n- 依赖：任务服务、审计服务\n- 关联：运维 Skills、告警、合规导出\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n\n### 异常场景\n\n- 查询失败（网络/后端错误）：展示错误态与 requestId，并提供重试入口\n- 权限不足：403 或跨范围不可见按 404 处理；页面提示需联系管理员授权\n- 状态冲突：409 提示冲突原因与建议动作（如先停止任务/先扩容/先解除锁定）\n- 限流：429 提示等待时间与重试策略；必要时引导缩小查询范围\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n---\n\n## BOSS / 运维操作 / 故障处理\n\n### 页面目标\n\n- 故障处置闭环：登记 → 分派 → 处置 → 复盘；关联告警、任务、变更与审计。\n\n### 页面布局与元素规则\n\n- 故障列表：等级、标题、影响范围、状态、负责人、创建时间、更新时间\n- 故障详情：时间线、关联告警、关联任务、处置步骤、复盘结论\n- 状态机：open → investigating → mitigating → resolved → closed（可选 reopened）\n\n### 核心操作\n\n- 新建故障\n  - 触发：点击“新建故障”\n  - 路径：填写标题/等级/影响范围/关联告警（可选）→ 创建\n  - 输出：故障单号；通知相关人（可选）\n- 关联告警/任务\n  - 触发：详情页“关联”\n  - 路径：选择告警/任务 → 建立关联\n  - 输出：时间线记录\n\n### 异常场景\n\n- 409：已关闭故障不允许修改关键字段，需 reopened\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n\n### 权限与边界\n\n- Operator 可创建/更新授权范围内故障\n- Auditor 只读（可导出复盘）\n\n### 前置依赖与关联\n\n- 依赖：告警系统、任务服务、审计服务、通知系统\n- 关联：告警、任务历史、操作审计\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n---\n\n## BOSS / 系统设置 / 品牌配置（Phase 2）\n\n### 页面目标\n\n- 平台品牌资产配置：平台名称、Logo/Favicon、主色、登录页背景、备案信息。\n\n### 页面布局与元素规则\n\n- 表单分区：基础信息 / 视觉资产 / 备案信息 / 预览与发布\n- 上传规则：图片格式与大小限制（如 PNG/SVG，<= 2MB），上传后提供预览\n- 发布规则：支持预检（dry-run）与发布；发布需二次确认并记录审计\n\n### 核心操作\n\n- 保存草稿\n  - 触发：点击“保存”\n  - 路径：字段校验 → 保存配置（不生效）\n  - 输出：草稿状态提示\n- 发布生效\n  - 触发：点击“发布”\n  - 路径：dry-run（可选）→ 二次确认（影响范围：登录页/导航/浏览器标签）→ 发布\n  - 输出：新版本号与发布时间；失败返回 requestId\n\n### 权限与边界\n\n- 仅 SuperAdmin 可发布；Operator 可编辑草稿（可选策略）\n\n### 前置依赖与关联\n\n- 依赖：配置中心、静态资源存储、审计服务\n- 关联：升级管理（变更窗口）、操作审计\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n\n### 异常场景\n\n- 查询失败（网络/后端错误）：展示错误态与 requestId，并提供重试入口\n- 权限不足：403 或跨范围不可见按 404 处理；页面提示需联系管理员授权\n- 状态冲突：409 提示冲突原因与建议动作（如先停止任务/先扩容/先解除锁定）\n- 限流：429 提示等待时间与重试策略；必要时引导缩小查询范围\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n---\n\n## BOSS / 系统设置 / 升级管理（Phase 2）\n\n### 页面目标\n\n- 管理平台升级：上传 Patch、预检、执行升级、查看历史与回滚策略（若适用）。\n\n### 页面布局与元素规则\n\n- 当前版本与组件版本表（可展开）\n- Patch 上传区：文件校验（签名/哈希/大小），显示上传进度\n- Dry-run 结果：风险清单、影响组件、预计耗时（可选）、需要人工确认项\n- 升级历史：版本、时间、操作者、结果、日志下载\n\n### 核心操作\n\n- 上传 Patch\n  - 触发：选择文件并上传\n  - 路径：校验签名/哈希 → 上传 → 生成 patchId\n  - 输出：patchId 与可追踪日志\n- 执行 Dry-run\n  - 触发：点击“预检”\n  - 路径：触发预检任务 → 展示结果\n  - 输出：风险清单；若存在阻断项则禁止升级（409）\n- 执行升级\n  - 触发：点击“开始升级”\n  - 路径：二次确认（窗口/回滚策略）→ 异步任务 → 任务历史追踪\n  - 输出：taskId；升级完成后刷新当前版本\n\n### 异常场景\n\n- 409：存在进行中的升级任务/变更窗口冲突\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n\n### 权限与边界\n\n- 仅 SuperAdmin 可升级；Operator 可查看\n\n### 前置依赖与关联\n\n- 依赖：升级服务、任务服务、审计服务、对象存储（Patch 包）\n- 关联：任务历史、操作审计、告警\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n---\n\n## BOSS / 系统设置 / 证书与 CA\n\n### 页面目标\n\n- 管理内部 CA 与证书分发，支持下载根 CA 与查看轮换记录。\n\n### 页面布局与元素规则\n\n- 根 CA 信息：subject、serial、notBefore/notAfter、指纹（sha256）、下载按钮\n- 中间 CA（可选）：同上\n- 叶证书列表：用途（网关/控制面/registry 等）、到期时间、状态（valid/expiring/revoked）、轮换记录\n- 下载：根 CA 下载需明确用途与安全提示；下载行为应审计\n\n### 核心操作\n\n- 下载根 CA\n  - 触发：点击下载\n  - 路径：展示用途与风险提示 → 确认 → 下载\n  - 输出：下载文件；审计事件\n- 触发证书轮换（可选）\n  - 触发：点击“轮换”\n  - 路径：预检 → 二次确认（影响范围）→ 异步任务\n  - 输出：taskId；完成后刷新证书信息\n\n### 异常场景\n\n- 409：轮换任务进行中\n\n- 403：无权限或未授权范围，提示联系管理员授权；跨范围不可见按 404 处理\n- 404：资源不存在或不可见（避免越权探测），提示刷新/返回列表\n- 409：状态冲突（配额低于已用/任务冲突/窗口冲突等），提示冲突原因与建议动作\n- 429：触发限流，提示等待时间与重试策略\n- 5xx：系统错误，展示 requestId 并支持一键复制用于排障\n\n### 权限与边界\n\n- 下载根 CA：Operator 可读；轮换仅 SuperAdmin\n\n### 前置依赖与关联\n\n- 依赖：证书服务、任务服务、审计服务\n- 关联：告警（到期告警）、任务历史、操作审计\n\n### 状态与数据流\n\n- 初始化：加载默认筛选/时间范围 → 请求列表/概览数据 → 渲染表格/卡片\n- 筛选/排序/分页：筛选变化重置 pageNo=1；排序变化触发重新查询；pageSize 保持不变\n- 详情：打开详情抽屉先用列表行数据预填，再按主键拉取详情补全；失败则允许重试\n- 写操作：提交后刷新列表/详情；如返回 taskId 则进入“任务历史”追踪并轮询状态\n","docs/BOSS-API-功能与API.md":"# BOSS：功能与 API（管理端）\n\n## 0. 通用约定（对齐 Console）\n\n### 0.1 统一请求头（必填/建议）\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。管理端用户登录态。无效/过期返回 401。 |\n| X-Request-Id | string | `req_...` | 建议。请求唯一标识；用于日志/Trace/审计关联。若不传，后端生成并在响应中回传。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于创建/调整/触发等写操作幂等；同 Key 重复提交应返回同结果或 409。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。作用域租户上下文（建议由“租户选择器/目标租户”自动注入）。当接口显式针对某租户资源时可不传或与 Path/Query 的 tenantId 对齐。 |\n\n### 0.2 分页与排序（Query）\n\n**Headers（通用，继承 0.1）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。管理端用户登录态。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| pageNo | integer | `1` | 可选。页码，从 1 开始。 |\n| pageSize | integer | `20` | 可选。每页条数，建议 10~200。 |\n| sortBy | string | `createdAt` | 可选。排序字段；取值范围由各接口说明。 |\n| sortOrder | string | `desc` | 可选。`asc`/`desc`。 |\n\n### 0.3 通用错误码（建议）\n\n**Headers（通用，继承 0.1）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。管理端用户登录态。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| requestId | string | `req_...` | 与请求对应的 requestId。 |\n| code | string | `PERMISSION_DENIED` | 业务错误码（建议）。 |\n| message | string | `...` | 面向用户的错误说明（可国际化）。 |\n| details | object | `{...}` | 可选。字段级错误或冲突原因。 |\n\n### 0.4 通用状态码与处理\n\n**Headers（通用，继承 0.1）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。管理端用户登录态。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 400 | - | - | 参数校验失败；前端应做字段级提示。 |\n| 401 | - | - | 鉴权失败或登录态过期；引导重新登录。 |\n| 403 | - | - | 无权限；跨范围不可见按 404 处理（避免信息泄露）。 |\n| 404 | - | - | 资源不存在或不可见。 |\n| 409 | - | - | 状态冲突（任务冲突/窗口冲突/配额低于已使用等）。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；必须回传 requestId 用于排障。 |\n\n### 0.5 异步任务中心（统一契约，建议）\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n用于所有异步触发类接口（导出/GC/Drain/配额调整/升级/Skill 等）的统一闭环。\n\n**Task（摘要）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| taskId | string | `task_...` | 任务唯一标识。 |\n| status | string | `running` | `queued/running/succeeded/failed/canceled`。 |\n| type | string | `ops.skill` | 任务类型（建议业务域.动作）。 |\n| requestId | string | `req_...` | 触发请求唯一标识（与 X-Request-Id 对齐）。 |\n| progressPercent | integer | `60` | 可选。0~100。 |\n| createdAt | string | `2026-06-06T10:00:00Z` | ISO8601。 |\n| finishedAt | string | `2026-06-06T10:03:12Z` | 可选。 |\n| error | object | `{...}` | 可选。失败原因（标准化错误码）。 |\n\n**任务历史（建议统一入口）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Method | string | `GET` | 查询。 |\n| URL | string | `/api/v1/boss/tasks` | 任务列表。 |\n| pageNo | integer | `1` | 可选。 |\n| pageSize | integer | `20` | 可选。 |\n| status | string | `running` | 可选。 |\n| type | string | `ops.skill` | 可选。 |\n| targetTenantId | string | `tnt_...` | 可选。按目标租户过滤。 |\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Method | string | `GET` | 查询。 |\n| URL | string | `/api/v1/boss/tasks/{taskId}` | 任务详情。 |\n| taskId | string | `task_...` | 必填。 |\n\n---\n\n## 1. BOSS / 运营总览\n\n### 1.1 运营总览：API 请求参数\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n**Headers（通用，继承 0.1）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。管理端用户登录态。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n\n#### 获取运营总览（聚合）\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Method | string | `GET` | 读取。 |\n| URL | string | `/api/v1/boss/overview` | 平台运营总览聚合接口。 |\n\n**Headers（继承 0.1）**  \n\n**Query**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| timeRange | string | `last_24h` | 可选。`last_1h/last_6h/last_24h/last_7d/custom`。 |\n| startTime | string | `2026-06-01T00:00:00Z` | timeRange=custom 必填。ISO8601。 |\n| endTime | string | `2026-06-06T00:00:00Z` | timeRange=custom 必填。ISO8601。 |\n| refresh | boolean | `true` | 可选。是否强制从实时数据源刷新。 |\n\n**Response（摘要）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| platform | object | `{...}` | 平台状态摘要（分组健康）。 |\n| tenants | object | `{...}` | 租户总览（总数/活跃/停用）。 |\n| resources | object | `{...}` | 资源总览（GPU/CPU/内存/存储）。 |\n| services | object | `{...}` | 服务总览（推理服务/知识库/模型）。 |\n| alerts | object | `{...}` | 当前告警摘要（P0/P1）。 |\n| delivery | object | `{...}` | 交付/运维摘要。 |\n| trends | object | `{...}` | 用量趋势（按 timeRange）。 |\n\n#### 导出运营报表（异步）\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与       function escapeRegExp(s) {
        return String(s).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      }

      function sanitizeApiDoc(txt) {
        let out = String(txt || "");
        out = out.replace(/^---\nAIGC:[\s\S]*?---\n/m, "");
        out = out.replace(/^(\s*#{2,6}\s+)\d+(?:\.\d+)+\.\s+/gm, "$1");
        out = out.replace(/\n\*\（内容由AI生成，仅供参考）\*\s*$/g, "");
        out = out.replace(/\n\*\（内容由AI生成，仅供参考）\*\s*\n?/g, "\n");
        return out.trim() + "\n";
      }

      function loadDoc(src) {
        if (DOC_CACHE.has(src)) return DOC_CACHE.get(src);
        const hasEmbedded = Object.prototype.hasOwnProperty.call(EMBEDDED_DOCS, src);
        const p = (hasEmbedded
          ? Promise.resolve(EMBEDDED_DOCS[src])
          : fetch(src).then((r) => (r.ok ? r.text() : Promise.reject(new Error(String(r.status)))))
        )
          .then((t) => sanitizeApiDoc(t))
          .catch(() => "");
        DOC_CACHE.set(src, p);
        return p;
      }

      function extractSection(txt, heading) {
        const h = String(heading || "").trim();
        if (!h) return txt;
        const tryFind = (hh) => {
          const re = new RegExp(`^${escapeRegExp(hh)}\\s*$`, "m");
          const m = re.exec(txt);
          if (!m) return null;
          const start = m.index;
          const level = (hh.match(/^#+/) || ["##"])[0].length;
          const after = txt.slice(start + m[0].length);
          const next = after.search(new RegExp(`^#{1,${level}}\\s+`, "m"));
          const end = next === -1 ? txt.length : start + m[0].length + next;
          return txt.slice(start, end).trim() + "\n";
        };

        const direct = tryFind(h);
        if (direct) return direct;

        const normalized = h.replace(/^(\s*#{2,6}\s+)\d+(?:\.\d+)+\.\s+/, "$1");
        if (normalized !== h) {
          const retry = tryFind(normalized);
          if (retry) return retry;
        }
        return "";
      }

      function splitMdCells(line) {
        const raw = String(line || "").trim();
        if (!raw.startsWith("|")) return null;
        const parts = raw.split("|");
        if (parts.length < 3) return null;
        if (parts[0] === "") parts.shift();
        if (parts[parts.length - 1] === "") parts.pop();
        return parts.map((p) => p.trim());
      }

      function renderMarkdown(text) {
        const frag = document.createDocumentFragment();
        const lines = String(text || "").replace(/\r\n/g, "\n").split("\n");
        let i = 0;
        while (i < lines.length) {
          const line = lines[i];
          if (!line || !line.trim()) {
            i += 1;
            continue;
          }

          const h = line.match(/^(#{2,6})\s+(.+)$/);
          if (h) {
            const el = document.createElement("h3");
            let t = h[2].trim();
            t = t.replace(/^\d+(?:\.\d+)*\s+/, "");
            t = t.replace(/\s*\[M\d+\]\s*$/, "");
            el.textContent = t;
            frag.appendChild(el);
            i += 1;
            continue;
          }

          if (line.trim().startsWith(">")) {
            const parts = [];
            while (i < lines.length && lines[i].trim().startsWith(">")) {
              parts.push(lines[i].replace(/^\s*>\s?/, ""));
              i += 1;
            }
            const bq = document.createElement("blockquote");
            bq.textContent = parts.join("\n").trim();
            frag.appendChild(bq);
            continue;
          }

          const isBullet = (s) => /^[-*]\s+/.test(String(s || "").trim());
          if (isBullet(line)) {
            const ul = document.createElement("ul");
            ul.style.margin = "0";
            ul.style.paddingLeft = "18px";
            while (i < lines.length && isBullet(lines[i])) {
              const li = document.createElement("li");
              li.textContent = lines[i].trim().replace(/^[-*]\s+/, "");
              li.style.fontSize = "12px";
              li.style.margin = "6px 0";
              ul.appendChild(li);
              i += 1;
            }
            frag.appendChild(ul);
            continue;
          }

          const cells = splitMdCells(line);
          if (cells) {
            let sepIdx = i + 1;
            while (sepIdx < lines.length && !String(lines[sepIdx] || "").trim()) sepIdx += 1;
            const sepLine = sepIdx < lines.length ? lines[sepIdx] : "";
            const sepOk = /^\s*\|(?:\s*:?-+:?\s*\|)+\s*$/.test(String(sepLine || ""));
            if (sepOk) {
              const header = cells;
              i = sepIdx + 1;
              const rows = [];
              while (i < lines.length) {
                if (!String(lines[i] || "").trim()) {
                  i += 1;
                  continue;
                }
                const rowCells = splitMdCells(lines[i]);
                if (!rowCells) break;
                if (rowCells.length > header.length) {
                  rows.push([...rowCells.slice(0, header.length - 1), rowCells.slice(header.length - 1).join(" | ")]);
                } else {
                  rows.push(rowCells);
                }
                i += 1;
              }
              const table = document.createElement("table");
              table.className = `tbl tbl-${header.length}`;
            const thead = document.createElement("thead");
            const trh = document.createElement("tr");
            for (const c of header) {
              const th = document.createElement("th");
              th.textContent = c;
              trh.appendChild(th);
            }
            thead.appendChild(trh);
            table.appendChild(thead);
            const tbody = document.createElement("tbody");
            for (const r of rows) {
              const tr = document.createElement("tr");
              for (let j = 0; j < header.length; j += 1) {
                const td = document.createElement("td");
                td.textContent = r[j] ?? "";
                tr.appendChild(td);
              }
              tbody.appendChild(tr);
            }
            table.appendChild(tbody);
            frag.appendChild(table);
            continue;
            }
          }

          const pLines = [];
          while (i < lines.length) {
            const cur = lines[i];
            if (!cur || !cur.trim()) break;
            if (/^(#{2,6})\s+/.test(cur)) break;
            if (cur.trim().startsWith(">")) break;
            if (isBullet(cur)) break;
            const maybeCells = splitMdCells(cur);
            if (maybeCells) {
              let j = i + 1;
              while (j < lines.length && !String(lines[j] || "").trim()) j += 1;
              const maybeSep = j < lines.length ? lines[j] : "";
              const maybeSepOk = /^\s*\|(?:\s*:?-+:?\s*\|)+\s*$/.test(String(maybeSep || ""));
              if (maybeSepOk) break;
            }
            pLines.push(cur);
            i += 1;
          }
          const p = document.createElement("p");
          p.textContent = pLines.join("\n").trim();
          frag.appendChild(p);
          i += 1;
        }
        return frag;
      }

      function getDocContent(txt, b) {
        if (b.sections && Array.isArray(b.sections) && b.sections.length) {
          const parts = [];
          for (const h of b.sections) {
            const s = extractSection(txt, h);
            if (s) parts.push(s.trim());
          }
          return parts.length ? parts.join("\n\n") + "\n" : "";
        }
        if (b.section) return extractSection(txt, b.section);
        return txt;
      }

      function stripLegacyEndpointsTables(mdText) {

        if (/\bAuthorization\b|\bX-API-Key\b|SigV4|X-Amz-/i.test(t)) return t;

      };

      const FLAT = {
        boss: flatten(NAV.boss.nodes, ["BOSS"]),
      };

      let activeMode = "boss";
      let selectedPageId = "boss.overview";
      const COLLAPSED = {
        boss: new Set(),
      };

      const els = {
        treeTitle: document.getElementById("tree-title"),
        treeCount: document.getElementById("tree-count"),
        treeBody: document.getElementById("tree-body"),
        crumbs: document.getElementById("crumbs"),
        content: document.getElementById("content"),
        pillConsole: document.getElementById("pill-console"),
        pillBoss: document.getElementById("pill-boss"),
        pillRootNav: document.getElementById("pill-root-nav"),
        pillIaReport: document.getElementById("pill-ia-report"),
        search: document.getElementById("search"),
        tenant: document.getElementById("tenant"),
        copyLink: document.getElementById("copy-link"),
      };

      function refreshTreeOnly() {
        renderTree(activeMode, els.search.value);
        for (const node of document.querySelectorAll(".node")) {
          node.dataset.selected = node.dataset.nodeId === selectedPageId ? "true" : "false";
        }
      }

      function toggleCollapsed(mode, nodeId) {
        const set = COLLAPSED[mode];
        if (set.has(nodeId)) set.delete(nodeId);
        else set.add(nodeId);
        refreshTreeOnly();
      }

      function renderTree(mode, query = "") {
        const q = (query || "").trim().toLowerCase();
        const nodes = NAV[mode].nodes;
        els.treeTitle.textContent = `${NAV[mode].title} 导航`;
        const leafCount = FLAT[mode].filter((n) => n.type === "page").length;
        els.treeCount.textContent = `${leafCount} 页`;

        const filtered = q
          ? FLAT[mode]
              .filter((n) => n.type === "page")
              .filter((n) => `${n.path.join(" / ")} ${n.id}`.toLowerCase().includes(q))
              .slice(0, 60)
          : null;

        if (filtered) {
          const ul = document.createElement("ul");
          for (const n of filtered) {
            const li = document.createElement("li");
            li.appendChild(renderNode(n, true));
            ul.appendChild(li);
          }
          els.treeBody.innerHTML = "";
          els.treeBody.appendChild(ul);
          return;
        }

        function walk(list) {
          const ul = document.createElement("ul");
          for (const n of list) {
            const li = document.createElement("li");
            li.appendChild(renderNode(n));
            if (n.children) {
              const child = walk(n.children);
              if (COLLAPSED[mode].has(n.id)) child.style.display = "none";
              li.appendChild(child);
            }
            ul.appendChild(li);
          }
          return ul;
        }

        els.treeBody.innerHTML = "";
        els.treeBody.appendChild(walk(nodes));
      }

      function renderNode(n, showFullPath = false) {
        const div = document.createElement("div");
        div.className = "node";
        div.dataset.nodeId = n.id;
        div.dataset.selected = n.id === selectedPageId ? "true" : "false";
        const caret = document.createElement("span");
        caret.className = "caret";
        if (n.type === "group") {
          caret.textContent = "▾";
          caret.dataset.open = COLLAPSED[activeMode].has(n.id) ? "false" : "true";
        } else {
          caret.textContent = "";
          caret.dataset.open = "true";
        }
        const icon = document.createElement("span");
        const ic = iconFor(n);
        icon.className = `node-icon ${ic.cls}`;
        icon.textContent = ic.txt;
        const label = document.createElement("span");
        label.className = "node-label";
        label.textContent = n.title;
        const meta = document.createElement("span");
        meta.className = "node-meta";
        meta.textContent = showFullPath ? n.path.join("/") : n.type === "group" ? "Group" : "Page";
        div.appendChild(caret);
        div.appendChild(icon);
        div.appendChild(label);
        div.appendChild(meta);
        div.addEventListener("click", (e) => {
          if (n.type === "group") {
            e.preventDefault();
            toggleCollapsed(activeMode, n.id);
            return;
          }
          if (n.type === "page") navigateTo(n.id);
        });
        return div;
      }

      function renderCrumbs(pageId) {
        const mode = pageMode(pageId) || activeMode;
        const match = FLAT[mode].find((n) => n.id === pageId);
        const crumbs = match ? match.path : pageId.startsWith("root.") ? ["KuberCloud ANI", "一级导航图"] : [mode === "boss" ? "BOSS" : "Console", "未找到页面"];
        els.crumbs.innerHTML = "";
        for (const c of crumbs) {
          const span = document.createElement("span");
          span.className = "crumb";
          span.textContent = c;
          els.crumbs.appendChild(span);
        }
      }

      function renderContent(pageId) {
        const page = PAGE[pageId];
        els.content.innerHTML = "";
        if (!page) {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `<h1>页面缺失</h1><div class="empty">该页面在原型数据中未定义。</div>`;
          els.content.appendChild(card);
          return;
        }

        const header = document.createElement("div");
        header.className = "card hero";
        const tenant = els.tenant.value;
        const mode = pageMode(pageId) || activeMode;
        const modeLabel = mode === "boss" ? "Platform BOSS" : "Product Console";
        header.innerHTML = `
          <div class="hero-kicker">${escapeHtml(modeLabel)} / KuberCloud ANI</div>
          <div class="hero-grid">
            <div>
              <h1>${escapeHtml(page.title)}</h1>
              <p class="hero-summary">${escapeHtml(page.goal || "文档未展开")}</p>
            </div>
            <div class="hero-meta">
              <div class="hero-panel">
                <p class="hero-panel-label">页面入口</p>
                <p class="hero-panel-value">${escapeHtml(page.entry || "文档未展开")}</p>
              </div>
              <div class="hero-panel">
                <p class="hero-panel-label">运行上下文</p>
                <p class="hero-panel-value">tenantId=${escapeHtml(tenant)}</p>
              </div>
              <div class="hero-panel">
                <p class="hero-panel-label">路由状态</p>
                <p class="hero-panel-value">${escapeHtml(location.hash || "#")} / IA Prototype</p>
              </div>
            </div>
          </div>
        `;
        els.content.appendChild(header);

        let blocks = page.blocks || [];
        if (pageId === "console.compute.instances.container") {
          blocks = blocks.filter(
            (b) =>
              b &&
              b.title !== "资源对象（K8s）" &&
              !String(b.src || "").endsWith("容器服务模块_产品功能总结.md"),
          );
        }
        if (!blocks.length) {
          const card = document.createElement("div");
          card.className = "card section-card";
          card.innerHTML = `<h2>说明</h2><div class="empty">该页面在文档中未展开页面结构/字段，本原型仅保留导航入口。</div>`;
          els.content.appendChild(card);
          return;
        }

        for (const b of blocks) {
          const card = document.createElement("div");
          card.className = "card";
          const isApiMd = b.kind === "md" && /API 请求参数/.test(String(b.title || ""));
          if (!isApiMd) {
            const title = document.createElement("h2");
            title.textContent = b.title || "";
            card.appendChild(title);
          }

          if (b.kind === "code") {
            const pre = document.createElement("pre");
            pre.textContent = b.code || "";
            card.appendChild(pre);
          } else if (b.kind === "md") {
            if (isApiMd) {
              const details = document.createElement("details");
              details.className = "api";
              const summary = document.createElement("summary");
              const label = document.createElement("span");
              label.textContent = b.title || "";
              const chev = document.createElement("span");
              chev.className = "chev";
              chev.textContent = "展开/收起";
              summary.appendChild(label);
              summary.appendChild(chev);
              details.appendChild(summary);
              const body = document.createElement("div");
              body.className = "api-body";
              const md = document.createElement("div");
              md.className = "md";
              md.textContent = "点击展开加载…";
              body.appendChild(md);
              details.appendChild(body);
              const loadOnce = () => {
                if (details.dataset.loaded === "true") return;
                details.dataset.loaded = "true";
                const inline = API_MAPPING_OVERRIDES[b.title] ?? (typeof b.text === "string" ? b.text : "");
                if (inline) {
                  md.innerHTML = "";
                  md.appendChild(renderMarkdown(normalizeApiDoc(inline)));
                  return;
                }
                if (!b.src) {
                  md.textContent = "文档未展开";
                  return;
                }
                md.textContent = "加载中…";
                loadDoc(b.src).then((txt) => {
                  const content = normalizeApiDoc(getDocContent(txt, b));
                  md.innerHTML = "";
                  if (!content) {
                    const div = document.createElement("div");
                    div.className = "empty";
                    div.textContent = "文档未展开";
                    md.appendChild(div);
                  } else {
                    md.appendChild(renderMarkdown(content));
                  }
                });
              };
              details.addEventListener("toggle", () => {
                if (!details.open) return;
                loadOnce();
              });
              card.appendChild(details);
            } else {
              const md = document.createElement("div");
              md.className = "md";
              md.textContent = "加载中…";
              const inline = typeof b.text === "string" ? b.text : "";
              if (inline) {
                md.innerHTML = "";
                md.appendChild(renderMarkdown(inline));
              } else if (!b.src) {
                md.textContent = "文档未展开";
              } else {
                loadDoc(b.src).then((txt) => {
                  const content = getDocContent(txt, b);
                  md.innerHTML = "";
                  if (!content) {
                    const div = document.createElement("div");
                    div.className = "empty";
                    div.textContent = "文档未展开";
                    md.appendChild(div);
                  } else {
                    md.appendChild(renderMarkdown(content));
                  }
                });
              }
              card.appendChild(md);
            }
          } else if (b.kind === "iframe") {
            const iframe = document.createElement("iframe");
            iframe.className = "embed";
            iframe.src = b.src || "";
            iframe.loading = "lazy";
            iframe.referrerPolicy = "no-referrer";
            card.appendChild(iframe);
          } else if (b.kind === "list") {
            if (!b.items || !b.items.length) {
              const div = document.createElement("div");
              div.className = "empty";
              div.textContent = "文档未展开";
              card.appendChild(div);
            } else {
              const ul = document.createElement("ul");
              ul.style.margin = "0";
              ul.style.paddingLeft = "18px";
              for (const item of b.items) {
                const li = document.createElement("li");
                li.textContent = item;
                li.style.fontSize = "13px";
                li.style.margin = "6px 0";
                ul.appendChild(li);
              }
              card.appendChild(ul);
            }
          } else if (b.kind === "table") {
            const table = document.createElement("table");
            const thead = document.createElement("thead");
            const trh = document.createElement("tr");
            for (const h of b.header || []) {
              const th = document.createElement("th");
              th.textContent = h;
              trh.appendChild(th);
            }
            thead.appendChild(trh);
            table.appendChild(thead);
            const tbody = document.createElement("tbody");
            for (const row of b.rows || []) {
              const tr = document.createElement("tr");
              for (const cell of row) {
                const td = document.createElement("td");
                td.textContent = cell;
                tr.appendChild(td);
              }
              tbody.appendChild(tr);
            }
            table.appendChild(tbody);
            card.appendChild(table);
          } else {
            const div = document.createElement("div");
            div.className = "empty";
            div.textContent = "未知模块类型";
            card.appendChild(div);
          }
          els.content.appendChild(card);
        }
      }

      function navigateTo(pageId) {
        selectedPageId = pageId;
        const mode = pageMode(pageId);
        if (mode && activeMode !== mode) setMode(mode);
        location.hash = `#/${pageId}`;
        sync();
      }

      function sync() {
        const hash = location.hash || "";
        const match = hash.match(/^#\/(.+)$/);
        const pageId = match ? match[1] : selectedPageId;
        selectedPageId = PAGE[pageId] ? pageId : "boss.overview";

        refreshTreeOnly();
        renderCrumbs(selectedPageId);
        renderContent(selectedPageId);
      }

      function setMode(mode) {
        els.pillConsole.dataset.active = mode === "console" ? "true" : "false";
        els.pillBoss.dataset.active = mode === "boss" ? "true" : "false";
        if (!selectedPageId.startsWith(mode + ".") && !selectedPageId.startsWith("root.")) {
          location.hash = `#/${selectedPageId}`;
        }
        els.search.value = "";
        renderTree(activeMode, "");
        sync();
      }

      function pageMode(pageId) {
        if (pageId.startsWith("boss.")) return "boss";
        return null;
      }

      function escapeHtml(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      els.pillConsole.addEventListener("click", () => {
        if (activeMode === "console") setMode("console");
        else window.location.href = "prototypes/ani-services-prototype-console.html";
      });
      els.pillBoss.addEventListener("click", () => {
        if (activeMode === "boss") setMode("boss");
        else window.location.href = "prototypes/ani-services-prototype-console.html";
      });
      els.pillRootNav.addEventListener("click", () => navigateTo("root.nav"));
      els.pillIaReport.addEventListener("click", () => navigateTo("root.ia-report"));
      els.search.addEventListener("input", () => renderTree(activeMode, els.search.value));
      els.tenant.addEventListener("change", sync);
      els.copyLink.addEventListener("click", async () => {
        const url = location.href;
        try {
          await navigator.clipboard.writeText(url);
          els.copyLink.textContent = "已复制";
          setTimeout(() => (els.copyLink.textContent = "复制当前链接"), 900);
        } catch {
          prompt("复制失败，请手动复制：", url);
        }
      });

      window.addEventListener("hashchange", sync);
      window.addEventListener("keydown", (e) => {
        if (e.key === "/" && document.activeElement !== els.search) {
          e.preventDefault();
          els.search.focus();
        }
      });

      setMode("console");
      sync();
    </script>
  </body>
</html>
