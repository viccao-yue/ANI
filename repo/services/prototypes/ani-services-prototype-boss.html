置复杂度 |\n| **模板体系** | Code / Browser / Computer / Custom 四类模板 | Code / Browser / Computer 三类 | 无（标准容器镜像） | ANI 对齐火山引擎模板体系，增加 Custom 模板支持企业自定义 |\n| **存活时长** | 按需 + 定时（1h/6h/24h/自定义）+ 可延长 | 实例生命周期时长，超时销毁 | Pod 生命周期 | ANI 增加延长机制，适配长周期 AI 训练/调试场景 |\n| **安全监控** | 容器逃逸检测 + 异常连接/登录 + 系统调用审计 | 未公开披露（注：火山方舟另有此能力，非 veFaaS 沙箱） | 缺失安全沙箱 Pod 磁盘和网络监控 | ANI 安全监控维度补齐友商短板，内建安全可观测 |\n| **GPU 支持** | 支持 GPU 直通 + 共享调度 | 未明确 | 安全沙箱节点池仅裸金属，GPU 支持受限 | ANI 在安全沙箱中支持 GPU，覆盖 AI 推理沙箱化场景 |\n| **会话保持** | session_affinity 开关 | 支持有状态（请求共享同一沙箱） | 不支持 | ANI 对齐火山引擎有状态沙箱能力 |\n| **暂停/恢复** | 支持内存快照暂停恢复（Kata 级别） | 不支持 | 不支持 | ANI 差异化能力，降低长周期沙箱的空转成本 |\n| **文件系统** | 只读根文件系统（默认）+ 主机路径挂载策略 | 未明确 | 标准容器文件系统 | ANI 默认只读根文件系统，强化安全基线 |\n\n---\n\n## 6. 信息架构设计原则\n\n1. **安全默认值（Secure by Default）**：只读根文件系统、禁止特权模式、禁止主机路径挂载、默认开启安全监控——所有安全开关默认处于最严格位置，用户需主动放宽。\n\n2. **隔离梯度可视化**：三级隔离（runC → gVisor → Kata）在创建向导中以安全-性能光谱形式呈现，帮助非安全专家做出合理选择。\n\n3. **模板降低门槛**：Code / Browser / Computer 三类开箱即用模板，用户无需理解镜像构建即可快速创建沙箱。\n\n4. **生命周期灵活**：支持按需（手动销毁）、定时（自动过期）、延长三种模式，覆盖从短周期代码执行到长周期训练调试的全场景。\n\n5. **安全态势可观测**：详情页独立\"安全态势\"Tab + Dashboard 安全总览，将容器逃逸、异常连接等安全事件从 K8s Events 中提升为一级信息。\n\n6. **架构一致性**：所有 ANI 实例类型必须声明 `network_plane`（架构强制），Sandbox 在此基础上叠加网络隔离策略。\n\n7. **GPU 沙箱化**：支持在 Kata MicroVM 中直通 GPU，解决 AI 推理场景中\"既要 GPU 算力、又要安全隔离\"的矛盾需求。\n\n---\n\n## 7. API 响应状态码约定\n\n| 状态码 | 含义 |\n|--------|------|\n| 201 | 创建成功，返回实例 ID 与完整配置 |\n| 200 | 查询/更新/延长/暂停/恢复成功 |\n| 202 | 异步操作已接受（如批量创建） |\n| 204 | 销毁成功 |\n| 400 | 请求参数校验失败 |\n| 404 | 实例不存在 |\n| 409 | 状态冲突（如对已销毁的实例执行延长） |\n| 422 | 资源不足（如无可用的 Kata 节点） |\n| 423 | 实例已锁定（安全事件触发自动冻结） |\n| 500 | 服务端错误 |\n\n---\n\n*文档版本：v1.0.0-draft | 基于火山引擎 veFaaS 云沙箱 / 阿里云 ACK 安全沙箱 v2 / 华为云 CCI Kata 容器调研及 ANI 架构约束*  \n*下一步建议：确认 API 参数后，可继续定义各接口的 Request Body JSON Schema 与响应结构*\n*（内容由AI生成，仅供参考）*\n*（内容由AI生成，仅供参考）*\n","docs/知识库-功能与API.md":"# 知识库（Knowledge Base）模块：功能与 API（对齐推理服务规范）\n\n## 0. 统一规范（与推理服务一致）\n\n### 0.1 统一请求头（必填/推荐）\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Authorization | string | Bearer eyJ... | 必填；身份鉴权（JWT/OAuth） |\n| X-Tenant-Id | string | t-demo | 必填；租户标识（建议由网关注入或从 JWT claim 解析） |\n| X-Project-Id | string | p-demo | 可选；项目/空间标识 |\n| X-Request-Id | string | req-20260605-001 | 必填；请求唯一标识（用于排障、审计关联） |\n| X-Idempotency-Key | string | idem-20260605-001 | 可选；幂等键（创建/更新/删除/重试等写操作建议必填） |\n\n### 0.2 统一分页与排序（Query）\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| pageNo | integer | 1 | 可选；页码（从 1 开始） |\n| pageSize | integer | 20 | 可选；页大小（建议默认 20，最大 200） |\n| sortBy | string | createdAt | 可选；排序字段（不同接口支持字段不同，建议白名单） |\n| sortOrder | enum(string) | desc | 可选；排序方向：asc / desc |\n\n### 0.3 统一响应结构（建议）\n\n```json\n{\n  \"requestId\": \"req-20260605-001\",\n  \"code\": \"OK\",\n  \"message\": \"success\",\n  \"data\": {}\n}\n```\n\n### 0.4 统一错误码（建议最小集合）\n\n| Code | HTTP Status | Description |\n|---|---:|---|\n| OK | 200 | 成功 |\n| INVALID_ARGUMENT | 400 | 参数校验失败（需返回字段级错误） |\n| UNAUTHENTICATED | 401 | 未认证/Token 过期 |\n| PERMISSION_DENIED | 403 | 无权限 |\n| NOT_FOUND | 404 | 资源不存在 |\n| CONFLICT | 409 | 冲突（重名、状态冲突等） |\n| PRECONDITION_FAILED | 412 | 前置条件不满足（状态不允许、依赖未解除） |\n| RATE_LIMITED | 429 | 频率限制触发 |\n| INTERNAL_ERROR | 500 | 后端内部错误 |\n\n字段级错误（建议）：\n\n```json\n{\n  \"requestId\": \"req-20260605-001\",\n  \"code\": \"INVALID_ARGUMENT\",\n  \"message\": \"validation failed\",\n  \"details\": [\n    { \"field\": \"topK\", \"reason\": \"must be between 1 and 50\" }\n  ]\n}\n```\n\n---\n\n## 1. 模块概述\n\n知识库模块用于把企业知识文档转化为可检索的向量索引，并在问答场景中实现“检索增强生成（RAG）”。它与【推理服务】模块的关系如下：\n\n- 知识库检索：依赖向量存储/向量索引能力（可由平台托管或外部向量库实现）\n- Embedding：需要一个 Embedding 模型（可来自模型中心 + 推理服务或平台内置）\n- 生成回答：需要一个文本生成类推理服务（LLM 服务），通常由【推理服务】提供\n\n核心对象：\n- KnowledgeBase（kb）：知识库实体（名称、描述、参数、权限）\n- Document（doc）：文档实体（文件、解析状态、切片信息）\n- Chunk（chunk）：切片（可选展示）\n- Index（index）：索引构建与版本（可选）\n- QASession / QARequest：问答会话/请求（可选）\n\n---\n\n## 2. 核心功能清单（企业级）\n\n### 2.1 知识库生命周期\n- 创建知识库：选择 Embedding 模型、chunk 策略、召回参数、权限设置\n- 编辑知识库：更新名称/描述/召回参数；涉及索引参数变更时触发重建提示\n- 删除知识库：校验是否存在在用应用/问答会话引用（可选），支持 validateOnly\n\n### 2.2 文档管理（上传、解析、索引）\n- 文档上传：支持多文件批量、目录上传（可选），支持对象存储直传（推荐）\n- 解析与切片：支持解析进度、失败原因、重试\n- 索引构建：解析完成后入库向量；支持全量重建/增量更新（按实现）\n- 删除文档：删除后触发索引更新（或延迟清理）\n\n### 2.3 问答测试（RAG）\n- 基于知识库的检索：TopK、ScoreThreshold、过滤器、文档范围限定\n- 生成回答：调用推理服务（LLM），支持流式输出\n- 可解释性：展示命中文档、页码、相似度、引用片段、token 与耗时\n\n### 2.4 异常处理与恢复\n- 解析失败：失败原因标准化（格式不支持/解析超时/内容为空/权限/存储失败）\n- 索引失败：向量库不可用/Embedding 调用失败/配额不足\n- 问答失败：上游推理服务不可达/超时/限流/鉴权失败\n\n### 2.5 权限控制（对齐推理服务）\n\n建议角色：\n- Viewer：只读查看知识库与文档，允许问答测试（可选）\n- Developer：创建/上传/重试解析，允许导出（可选）\n- Owner：删除知识库、调整权限、触发重建\n- Admin：跨项目管理与审计\n\n关键操作需要审计：创建/删除知识库、上传/删除文档、重建索引、问答测试（可选记录摘要）\n\n---\n\n## 3. 详细操作流程（关键路径）\n\n### 3.1 创建知识库\n1) 填写名称/描述、选择 Embedding 模型（或 embeddingServiceId）\n2) 设置 chunk 参数（chunkSize、chunkOverlap）\n3) 设置默认召回参数（topK、scoreThreshold）\n4) 保存后进入知识库详情，提示“上传文档”\n\n前置校验（建议）：\n- 名称唯一（项目内唯一）\n- Embedding 模型可用（ready）或 embeddingServiceId 状态 running\n- chunkSize 范围合法（例如 128~4096）\n\n### 3.2 上传文档并完成索引\n1) 选择文件（校验格式/大小）\n2) 上传（推荐对象存储预签名直传）\n3) 解析与切片进度展示\n4) 索引完成后文档状态为 ready\n\n### 3.3 问答测试\n1) 输入问题，选择是否流式、topK、scoreThreshold\n2) 检索向量库，拿到候选 chunk\n3) 组合 Prompt（含引用片段）并调用推理服务生成回答\n4) 渲染回答与引用来源\n\n---\n\n## 4. 全量 API 接口文档\n\n### 4.1 知识库（KnowledgeBase）接口\n\n#### 4.1.1 查询知识库列表\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | GET | 必填；HTTP 方法 |\n| URL | string | /api/v1/knowledge-bases | 必填；请求 URL |\n| keyword | string | finance | 可选；名称/描述关键字 |\n| status | array<enum(string)> | [\"active\"] | 可选；active / rebuilding / deleted |\n| createdBy | string | u-123 | 可选；创建人过滤 |\n| createdAtStart | string | 2026-06-01T00:00:00Z | 可选；创建时间起（ISO8601） |\n| createdAtEnd | string | 2026-06-05T00:00:00Z | 可选；创建时间止（ISO8601） |\n| pageNo | integer | 1 | 可选；页码（从 1 开始） |\n| pageSize | integer | 20 | 可选；页大小（建议最大 200） |\n| sortBy | string | updatedAt | 可选；createdAt / updatedAt / name |\n| sortOrder | enum(string) | desc | 可选；asc / desc |\n\n请求示例：\n\n```http\nGET /api/v1/knowledge-bases?pageNo=1&pageSize=20&status=active HTTP/1.1\nAuthorization: Bearer eyJ...\nX-Tenant-Id: t-demo\nX-Request-Id: req-20260605-001\n```\n\n响应示例：\n\n```json\n{\n  \"requestId\": \"req-20260605-001\",\n  \"code\": \"OK\",\n  \"message\": \"success\",\n  \"data\": {\n    \"items\": [\n      {\n        \"kbId\": \"kb-1a2b\",\n        \"name\": \"finance-kb\",\n        \"displayName\": \"财务知识库\",\n        \"status\": \"active\",\n        \"docCount\": 128,\n        \"failedDocs\": 2,\n        \"embedding\": { \"mode\": \"service\", \"embeddingServiceId\": \"svc-emb-1\" },\n        \"createdAt\": \"2026-06-01T00:00:00Z\",\n        \"updatedAt\": \"2026-06-05T00:00:00Z\"\n      }\n    ],\n    \"page\": { \"pageNo\": 1, \"pageSize\": 20, \"total\": 1 }\n  }\n}\n```\n\n#### 4.1.2 查询知识库统计（顶部卡片）\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | GET | 必填；HTTP 方法 |\n| URL | string | /api/v1/knowledge-bases/stats | 必填；请求 URL |\n| createdAtStart | string | 2026-06-01T00:00:00Z | 可选；统计范围起（ISO8601） |\n| createdAtEnd | string | 2026-06-05T00:00:00Z | 可选；统计范围止（ISO8601） |\n\n响应示例：\n\n```json\n{\n  \"requestId\": \"req-20260605-002\",\n  \"code\": \"OK\",\n  \"message\": \"success\",\n  \"data\": { \"kbTotal\": 12, \"docTotal\": 520, \"qaToday\": 345, \"parseFailed\": 7 }\n}\n```\n\n#### 4.1.3 创建知识库\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | POST | 必填；HTTP 方法 |\n| URL | string | /api/v1/knowledge-bases | 必填；请求 URL |\n| name | string | finance-kb | 必填；机器名（项目内唯一） |\n| displayName | string | 财务知识库 | 必填；展示名 |\n| description | string | ... | 可选；描述 |\n| embeddingMode | enum(string) | service | 必填；service / builtin / model |\n| embeddingServiceId | string | svc-emb-1 | 条件必填；embeddingMode=service 时必填 |\n| embeddingModelId | string | m-emb-1 | 条件可选；embeddingMode=model 时可选 |\n| embeddingVersionId | string | v-emb-1 | 条件可选；embeddingMode=model 时可选 |\n| chunkSize | integer | 800 | 必填；切片大小（按实现：字符/Token），建议 128~4096 |\n| chunkOverlap | integer | 100 | 必填；重叠大小，需 < chunkSize |\n| defaultTopK | integer | 10 | 必填；默认召回 TopK，建议 1~50 |\n| defaultScoreThreshold | number | 0.35 | 必填；默认阈值（0~1） |\n| permission | object | {\"visibility\":\"project\"} | 可选；权限设置 |\n| labels | map<string,string> | {\"team\":\"finance\"} | 可选；标签 |\n| validateOnly | boolean | false | 可选；仅校验不创建 |\n\n依赖关系校验（建议）：\n- embeddingMode=service => embeddingServiceId 必填，且该推理服务 capability=embedding 且 status=running\n- chunkSize 必须在范围内（建议 128~4096）；chunkOverlap < chunkSize\n- defaultTopK 建议 1~50\n\n请求示例：\n\n```json\n{\n  \"name\": \"finance-kb\",\n  \"displayName\": \"财务知识库\",\n  \"embeddingMode\": \"service\",\n  \"embeddingServiceId\": \"svc-emb-1\",\n  \"chunkSize\": 800,\n  \"chunkOverlap\": 100,\n  \"defaultTopK\": 10,\n  \"defaultScoreThreshold\": 0.35,\n  \"labels\": { \"team\": \"finance\" }\n}\n```\n\n响应示例：\n\n```json\n{\n  \"requestId\": \"req-20260605-003\",\n  \"code\": \"OK\",\n  \"message\": \"created\",\n  \"data\": { \"kbId\": \"kb-1a2b\" }\n}\n```\n\n#### 4.1.4 获取知识库详情\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | GET | 必填；HTTP 方法 |\n| URL | string | /api/v1/knowledge-bases/{kbId} | 必填；请求 URL |\n| kbId | string | kb-1a2b | 必填；路径参数 |\n\n#### 4.1.5 更新知识库\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | PATCH | 必填；HTTP 方法 |\n| URL | string | /api/v1/knowledge-bases/{kbId} | 必填；请求 URL |\n| kbId | string | kb-1a2b | 必填；路径参数 |\n| updateMask | array<string> | [\"displayName\",\"defaultTopK\"] | 必填；变更字段白名单，需与 body 字段一致 |\n| displayName | string | 财务知识库（新版） | 可选；展示名 |\n| description | string | ... | 可选；描述 |\n| defaultTopK | integer | 20 | 可选；TopK，建议 1~50 |\n| defaultScoreThreshold | number | 0.3 | 可选；阈值（0~1） |\n| chunkSize | integer | 900 | 可选；变更后可能需要重建索引（提示/强制） |\n| chunkOverlap | integer | 150 | 可选；需 < chunkSize |\n\n校验建议：\n- updateMask 与 body 字段一致\n- 若 chunkSize/chunkOverlap/embedding 变更：返回 needRebuild=true（或直接创建 rebuild operation）\n\n#### 4.1.6 删除知识库\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | DELETE | 必填；HTTP 方法 |\n| URL | string | /api/v1/knowledge-bases/{kbId} | 必填；请求 URL |\n| kbId | string | kb-1a2b | 必填；路径参数 |\n| validateOnly | boolean | false | 可选；仅校验依赖 |\n| force | boolean | false | 可选；强制删除（高权限） |\n\n#### 4.1.7 重建索引（异步）\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排 g> | [\"pdf\"] | 可选；pdf/docx/xlsx/pptx/md...（按支持范围） |\n| createdAtStart | string | 2026-06-01T00:00:00Z | 可选；创建时间起（ISO8601） |\n| createdAtEnd | string | 2026-06-05T00:00:00Z | 可选；创建时间止（ISO8601） |\n| pageNo | integer | 1 | 可选；页码 |\n| pageSize | integer | 50 | 可选；页大小（建议最大 200） |\n| sortBy | string | createdAt | 可选；createdAt / parsedAt / fileName |\n| sortOrder | enum(string) | desc | 可选；asc / desc |\n\n#### 4.2.2 创建文档上传任务（推荐对象存储直传）\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | POST | 必填；HTTP 方法 |\n| URL | string | /api/v1/knowledge-bases/{kbId}/documents:upload | 必填；请求 URL |\n| kbId | string | kb-1a2b | 必填；路径参数 |\n| uploadMode | enum(string) | presigned | 必填；presigned / multipart / server_upload |\n| files | array<object> | [{\"path\":\"a.pdf\",\"sizeBytes\":12345,\"sha256\":\"...\"}] | 必填；文件清单（path 必填；sizeBytes 必填；sha256 建议必填） |\n| expiresInSec | integer | 1800 | 可选；预签名过期时间（秒） |\n| requestId | string | req-20260605-020 | 可选；幂等 |\n\n返回建议字段：\n- uploadId、strategy、presignedUrls（按文件返回 url + requiredHeaders）、maxFileSizeBytes、allowedTypes\n\n#### 4.2.3 提交上传完成并触发解析/索引\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_. -- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n#### 4.3.1 发起问答（RAG）\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | POST | 必填；HTTP 方法 |\n| URL | string | /api/v1/knowledge-bases/{kbId}/qa:ask | 必填；请求 URL |\n| kbId | string | kb-1a2b | 必填；路径参数 |\n| question | string | 今年预算是多少？ | 必填；用户问题 |\n| topK | integer | 10 | 可选；召回条数（建议 1~50，不传用知识库默认） |\n| scoreThreshold | number | 0.35 | 可选；阈值（0~1，不传用知识库默认） |\n| filter | object | {\"docIds\":[\"doc-1\"]} | 可选；文档范围过滤 |\n| stream | boolean | true | 可选；是否流式输出（建议默认 true） |\n| llmServiceId | string | svc-llm-1 | 可选；用于生成回答的推理服务（不传走默认） |\n| llmRequest | object | {\"temperature\":0.7,\"maxTokens\":512} | 可选；透传给推理服务的生成参数（白名单字段） |\n| sessionId | string | qa-77aa | 可选；会话 ID |\n| timeoutMs | integer | 60000 | 可选；超时（ms） |\n\n参数透传规则（建议）：\n- llmRequest 只允许白名单字段透传（temperature/top_p/max_tokens/stop/stream 等）\n- llmServiceId 必须 capability=text_generation 且 status=running\n\n响应示例（非流式）：\n\n```json\n{\n  \"requestId\": \"req-20260605-101\",\n  \"code\": \"OK\",\n  \"message\": \"success\",\n  \"data\": {\n    \"answer\": \"……\",\n    \"citations\": [\n      {\n        \"docId\": \"doc-9c10\",\n        \"fileName\": \"2025Q4预算.pdf\",\n        \"page\": 12,\n        \"score\": 0.72,\n        \"snippet\": \"……\"\n      }\n    ],\n    \"usage\": { \"inputTokens\": 123, \"outputTokens\": 456, \"latencyMs\": 1200 }\n  }\n}\n```\n\n---\n\n## 5. 频率限制（建议）\n\n对齐推理服务的限流理念，建议区分：\n- 控制台用户操作：较宽松（例如 60 req/min）\n- 问答请求（qa:ask）：更严格且按服务配额（例如 10 qps/用户、并发 5）\n- 文档上传签名：按对象存储压力控制（例如 30 req/min）\n\n建议后端在响应头返回：\n- X-RateLimit-Limit / X-RateLimit-Remaining / X-RateLimit-Reset（可选，便于前端提示）\n\n---\n\n## 6. 留存与清理策略（建议）\n\n- 文档原文件：按企业合规策略保留（建议可配置）\n- 解析中间产物（切片、OCR 等）：保留 7~30 天（可配置）\n- 向量索引：随文档删除或按版本化策略保留（可配置）\n- 问答记录：默认不保存全文（仅保存摘要/指标），若保存需显式开关与脱敏策略\n","docs/用量报表-功能与API.md":"# 用量报表（Usage Report）模块：功能与 API（对齐推理服务规范）\n\n## 0. 统一规范（与推理服务一致）\n\n### 0.1 统一请求头\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Authorization | string | Bearer eyJ... | 必填；身份鉴权 |\n| X-Tenant-Id | string | t-demo | 必填；租户标识 |\n| X-Project-Id | string | p-demo | 可选；项目/空间 |\n| X-Request-Id | string | req-20260605-201 | 必填；请求唯一标识 |\n\n### 0.2 时间与聚合口径（建议统一）\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| startTime | string | 2026-06-01T00:00:00Z | 必填；起始时间（ISO8601） |\n| endTime | string | 2026-06-05T00:00:00Z | 必填；结束时间（ISO8601） |\n| interval | enum(string) | 5m | 可选；聚合周期：realtime / 5m / 1h / 24h |\n| timezone | string | Asia/Shanghai | 可选；时区（默认租户时区） |\n\n跨度校验（建议）：\n- realtime：跨度 <= 1h\n- 5m：跨度 <= 7d\n- 1h：跨度 <= 30d\n- 24h：跨度 <= 180d\n\n---\n\n## 1. 模块概述\n\n用量报表用于在租户/项目维度对 AI 与资源消耗进行可视化与对账，包括但不限于：\n- 推理服务用量：请求次数、Token 用量、延迟与错误（用于成本核算与容量评估）\n- 知识库用量：问答次数、检索次数、引用命中（可选）\n- 资源用量：GPU-Hours、CPU/内存时长（可选）\n- 存储用量：对象存储/文件存储占用（可选）\n\n与推理服务的数据依赖：\n- 服务维度用量来自推理服务网关/日志与指标聚合\n- API Key 维度用量来自鉴权网关的 keyId 计量\n- 用户维度用量来自身份系统（userId）与请求审计\n\n---\n\n## 2. 核心功能清单（企业级）\n\n### 2.1 汇总卡片（可配置）\n- GPU-Hours：指定时间范围内 GPU 使用时长（按 GPU 数 * 运行时长聚合）\n- Input Tokens / Output Tokens：模型输入输出 token 汇总\n- KB Queries：知识库问答/检索次数\n- Storage：存储占用与增量（可选）\n\n### 2.2 趋势图（多指标叠加）\n- 支持指标切换：tokens、qps、latency、errorRate、gpuHours\n- 支持聚合周期切换：实时/5m/1h/24h\n- 支持对比：同比/环比（可选）\n\n### 2.3 明细（分组维度）\n支持按维度分组查看 TopN 与分页明细：\n- 按模型（modelId/versionId）\n- 按推理服务（serviceId）\n- 按知识库（kbId）\n- 按 API Key（keyId）\n- 按用户（userId）\n- 按实例（instanceId / node / gpuModel 可选）\n\n### 2.4 导出与对账\n- 支持 CSV/JSON/PDF（报告类可选）\n- 支持异步导出任务（operation/exportId）\n- 支持审计：谁导出、导出范围、导出时间\n\n### 2.5 权限控制\n- Viewer：可查看汇总与明细（可按项目隔离）\n- Developer：可导出（可选）\n- Owner/Admin：可查看 API Key 维度、用户维度的敏感明细（可选脱敏）\n\n异常处理：\n- 时间跨度过大：提示更换 interval 或缩小范围\n- 数据延迟：提示“近 5 分钟数据可能延迟”\n- 缺失维度：提示“该维度未启用计量/未接入”\n\n---\n\n## 3. 全量 API 接口文档\n\n### 3.1 查询汇总（顶部卡片）\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | GET | 必填；HTTP 方法 |\n| URL | string | /api/v1/usages/summary | 必填；请求 URL |\n| startTime | string | 2026-06-01T00:00:00Z | 必填；起始时间（ISO8601） |\n| endTime | string | 2026-06-05T00:00:00Z | 必填；结束时间（ISO8601） |\n| scope | enum(string) | tenant | 可选；tenant / project |\n| projectId | string | p-demo | 条件必填；scope=project 时按策略必填 |\n\n响应示例：\n\n```json\n{\n  \"requestId\": \"req-20260605-201\",\n  \"code\": \"OK\",\n  \"message\": \"success\",\n  \"data\": {\n    \"gpuHours\": 123.45,\n    \"inputTokens\": 123456,\n    \"outputTokens\": 234567,\n    \"kbQueries\": 3456,\n    \"storageBytesAvg\": 987654321\n  }\n}\n```\n\n### 3.2 查询趋势（时序）\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | GET | 必填；HTTP 方法 |\n| URL | string | /api/v1/usages/trends | 必填；请求 URL |\n| startTime | string | 2026-06-01T00:00:00Z | 必填；起始时间（ISO8601） |\n| endTime | string | 2026-06-05T00:00:00Z | 必填；结束时间（ISO8601） |\n| interval | enum(string) | 5m | 可选；realtime/5m/1h/24h |\n| metrics | array<string> | [\"gpuHours\",\"tokens\"] | 必填；指标列表（白名单） |\n| scope | enum(string) | tenant | 可选；tenant / project |\n| projectId | string | p-demo | 条件可选；scope=project 时按策略提供 |\n\n响应示例：\n\n```json\n{\n  \"requestId\": \"req-20260605-202\",\n  \"code\": \"OK\",\n  \"message\": \"success\",\n  \"data\": {\n    \"series\": [\n      { \"ts\": \"2026-06-01T00:00:00Z\", \"gpuHours\": 1.2, \"tokens\": 1234 },\n      { \"ts\": \"2026-06-01T00:05:00Z\", \"gpuHours\": 1.3, \"tokens\": 1500 }\n    ]\n  }\n}\n```\n\n### 3.3 查询分维度明细（分页）\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | GET | 必填；HTTP 方法 |\n| URL | string | /api/v1/usages/breakdown | 必填；请求 URL |\n| startTime | string | 2026-06-01T00:00:00Z | 必填；起始时间（ISO8601） |\n| endTime | string | 2026-06-05T00:00:00Z | 必填；结束时间（ISO8601） |\n| dimension | enum(string) | service | 必填；model/service/kb/user/api_key/instance |\n| interval | enum(string) | 1h | 可选；聚合周期（影响粒度） |\n| keyword | string | chat | 可选；名称关键字 |\n| pageNo | integer | 1 | 可选；页码（从 1 开始） |\n| pageSize | integer | 20 | 可选；页大小（建议最大 200） |\n| sortBy | string | tokens | 可选；tokens/gpuHours/errorRate/cost（白名单） |\n| sortOrder | enum(string) | desc | 可选；asc / desc |\n\n响应示例：\n\n```json\n{\n  \"requestId\": \"req-20260605-203\",\n  \"code\": \"OK\",\n  \"message\": \"success\",\n  \"data\": {\n    \"items\": [\n      {\n        \"dimension\": \"service\",\n        \"id\": \"svc-1a2b\",\n        \"name\": \"chat-prod\",\n        \"gpuHours\": 12.3,\n        \"inputTokens\": 12345,\n        \"outputTokens\": 23456,\n        \"requests\": 7890,\n        \"avgLatencyMs\": 800,\n        \"errorRate\": 0.01\n      }\n    ],\n    \"page\": { \"pageNo\": 1, \"pageSize\": 20, \"total\": 1 }\n  }\n}\n```\n\n权限与脱敏建议：\n- dimension=user/api_key：默认仅 Owner/Admin 可见，或返回脱敏字段（如 userName 仅显示前缀）\n\n### 3.4 导出（异步）\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | POST | 必填；HTTP 方法 |\n| URL | string | /api/v1/usages/exports | 必填；请求 URL |\n| startTime | string | 2026-06-01T00:00:00Z | 必填；起始时间（ISO8601） |\n| endTime | string | 2026-06-05T00:00:00Z | 必填；结束时间（ISO8601） |\n| exportType | enum(string) | breakdown | 必填；summary/trends/breakdown |\n| dimension | enum(string) | service | 条件必填；exportType=breakdown 时必填 |\n| format | enum(string) | csv | 必填；csv/json/pdf |\n| filters | object | {\"projectId\":\"p-demo\"} | 可选；过滤条件 |\n\n返回示例：\n\n```json\n{\n  \"requestId\": \"req-20260605-204\",\n  \"code\": \"OK\",\n  \"message\": \"exporting\",\n  \"data\": { \"exportId\": \"exp-77aa\", \"status\": \"running\" }\n}\n```\n\n#### 查询导出任务\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | GET | 必填；HTTP 方法 |\n| URL | string | /api/v1/usages/exports/{exportId} | 必填；请求 URL |\n| exportId | string | exp-77aa | 必填；导出任务 ID（路径参数） |\n\n返回建议字段：\n- status=running/succeeded/failed\n- downloadUrl（或 presignedUrl）\n- expiresInSec\n- errorCode/errorMessage（失败时）\n\n---\n\n## 4. 频率限制与合规（建议）\n\n- 汇总/趋势：较高频（例如 60 req/min/user）\n- 明细：中频（例如 30 req/min/user）\n- 导出：低频（例如 5 req/min/user），且限制并发导出任务数量\n\n数据留存与清理（建议）：\n- 原始明细：7~30 天（看成本与合规）\n- 聚合数据：90~180 天\n- 导出文件：24~72 小时自动过期\n","docs/任务中心-统一契约.md":"# 任务中心（统一契约）\n\n## 1. 适用范围\n\n用于所有“异步触发类”能力的统一承载，包括但不限于：\n- 配额调整（apply）\n- 导出报表/合规导出\n- 运维 Skill 执行（如 Drain/GC/节点运维）\n- 平台升级/证书轮换（若为异步）\n- 模型导入/推理服务部署（若为异步）\n\n## 2. 统一请求头（建议）\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Authorization | string | Bearer eyJ... | 必填；身份鉴权 |\n| X-Tenant-Id | string | t-demo | 可选；租户上下文（对 Console 必填；对 BOSS：当操作对象为某租户资源时必填/或以 targetTenantId 传入） |\n| X-Request-Id | string | req-20260606-001 | 必填；请求唯一标识（跨页面排障主键） |\n| X-Idempotency-Key | string | idem-20260606-001 | 可选；幂等键（触发异步任务类操作建议必填） |\n\n## 3. Task 数据模型（统一）\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| taskId | string | task-001 | 必填；任务唯一标识 |\n| type | string | quota.apply | 必填；任务类型（建议以业务域.动作命名） |\n| status | string | running | 必填；状态：queued / running / succeeded / failed / canceled |\n| progressPercent | integer | 60 | 可选；进度 0~100（未知可省略） |\n| targetRef | object | {\"kind\":\"Tenant\",\"id\":\"t-demo\"} | 可选；目标对象引用（用于跳转与审计） |\n| requestId | string | req-20260606-001 | 必填；触发请求唯一标识（与 X-Request-Id 一致） |\n| idempotencyKey | string | idem-20260606-001 | 可选；幂等键回显 |\n| operator | object | {\"userId\":\"u-001\",\"role\":\"Operator\"} | 可选；触发者信息（脱敏） |\n| createdAt | string | 2026-06-06T10:00:00Z | 必填；创建时间（ISO8601） |\n| startedAt | string | 2026-06-06T10:00:02Z | 可选；开始时间 |\n| finishedAt | string | 2026-06-06T10:03:12Z | 可选；结束时间 |\n| result | object | {\"summary\":\"OK\"} | 可选；成功结果摘要（避免超大返回） |\n| error | object | {\"code\":\"E_QUOTA\",\"message\":\"insufficient quota\"} | 可选；失败原因（标准化错误码） |\n| logsUrl | string | /api/v1/boss/tasks/task-001/logs | 可选；日志拉取入口（或 SSE/WS） |\n\n## 4. Console：任务中心 API（建议）\n\n### 4.1 查询任务列表\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | GET | 必填；HTTP 方法 |\n| URL | string | /api/v1/console/tasks | 必填；请求 URL |\n| status | string | running | 可选；状态过滤 |\n| type | string | model.import | 可选；类型过滤 |\n| timeFrom | string | 2026-06-01T00:00:00Z | 可选；开始时间（含） |\n| timeTo | string | 2026-06-06T23:59:59Z | 可选；结束时间（含） |\n| pageNo | integer | 1 | 可选；页码 |\n| pageSize | integer | 20 | 可选；页大小 |\n| sortBy | string | createdAt | 可选；排序字段 |\n| sortOrder | string | desc | 可选；排序方向 |\n\n### 4.2 查询任务详情\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | GET | 必填；HTTP 方法 |\n| URL | string | /api/v1/console/tasks/{taskId} | 必填；请求 URL |\n| taskId | string | task-001 | 必填；路径参数 |\n\n### 4.3 取消任务（可选）\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | POST | 必填；HTTP 方法 |\n| URL | string | /api/v1/console/tasks/{taskId}/cancel | 必填；请求 URL |\n| taskId | string | task-001 | 必填；路径参数 |\n| reason | string | user_cancel | 可选；取消原因（审计） |\n\n### 4.4 重试任务（可选）\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | POST | 必填；HTTP 方法 |\n| URL | string | /api/v1/console/tasks/{taskId}/retry | 必填；请求 URL |\n| taskId | string | task-001 | 必填；路径参数 |\n\n## 5. BOSS：任务中心 API（建议）\n\n### 5.1 查询任务列表\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | GET | 必填；HTTP 方法 |\n| URL | string | /api/v1/boss/tasks | 必填；请求 URL |\n| targetTenantId | string | t-demo | 可选；租户过滤（跨租户运维/稽核） |\n| status | string | running | 可选；状态过滤 |\n| type | string | ops.skill | 可选；类型过滤 |\n| timeFrom | string | 2026-06-01T00:00:00Z | 可选；开始时间（含） |\n| timeTo | string | 2026-06-06T23:59:59Z | 可选；结束时间（含） |\n| pageNo | integer | 1 | 可选；页码 |\n| pageSize | integer | 20 | 可选；页大小 |\n| sortBy | string | createdAt | 可选；排序字段 |\n| sortOrder | string | desc | 可选；排序方向 |\n\n### 5.2 查询任务详情\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | GET | 必填；HTTP 方法 |\n| URL | string | /api/v1/boss/tasks/{taskId} | 必填；请求 URL |\n| taskId | string | task-001 | 必填；路径参数 |\n\n### 5.3 取消任务（可选）\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | POST | 必填；HTTP 方法 |\n| URL | string | /api/v1/boss/tasks/{taskId}/cancel | 必填；请求 URL |\n| taskId | string | task-001 | 必填；路径参数 |\n| reason | string | safety_stop | 可选；取消原因（审计） |\n\n### 5.4 重试任务（可选）\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | POST | 必填；HTTP 方法 |\n| URL | string | /api/v1/boss/tasks/{taskId}/retry | 必填；请求 URL |\n| taskId | string | task-001 | 必填；路径参数 |\n\n## 6. 与页面的强制关联规则（闭环要求）\n\n| 场景 | 要求 |\n| --- | --- |\n| 任意异步触发 | 必须返回 taskId，且页面提供“查看任务”入口跳转到任务历史并携带 taskId |\n| 任意失败提示 | 必须展示 requestId，且支持复制 |\n| 幂等触发 | 若携带 X-Idempotency-Key，应返回同一 taskId（重复提交不产生多任务） |\n\n","docs/APIKey-功能与API.md":"# API Key 模块：功能与 API（对齐推理服务规范）\n\n## 0. 统一规范（与推理服务一致）\n\n### 0.1 统一请求头（控制台管理 API）\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Authorization | string | Bearer eyJ... | 必填；身份鉴权（用户维度） |\n| X-Tenant-Id | string | t-demo | 必填；租户标识 |\n| X-Project-Id | string | p-demo | 可选；项目/空间 |\n| X-Request-Id | string | req-20260605-301 | 必填；请求唯一标识 |\n| X-Idempotency-Key | string | idem-20260605-301 | 可选；幂等键（写操作建议必填） |\n\n### 0.2 业务调用鉴权头（SDK/业务系统调用推理服务）\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| X-API-Key | string | ak_live_xxx | 必填；API Key（只在创建时返回明文一次） |\n| X-Tenant-Id | string | t-demo | 可选；也可从 key 绑定关系推导 |\n| X-Request-Id | string | req-20260605-302 | 可选；建议透传便于排障 |\n\n---\n\n## 1. 模块概述\n\nAPI Key 用于对外部系统/SDK/CLI 的调用进行鉴权、限流与审计，是推理服务/知识库等模块的统一入口能力。\n\n核心目标：\n- 安全：Key 明文只展示一次，后续只展示前缀；支持吊销、轮换、过期\n- 可控：Scope（权限范围）+ RateLimit（限流）+ IP Allowlist（可选）\n- 可观测：最后使用时间、最近调用来源、按 key 维度用量统计（对接用量报表）\n\n---\n\n## 2. 核心功能清单（企业级）\n\n### 2.1 Key 生命周期管理\n- 创建 Key：配置名称、scope、过期时间、限流策略\n- 查看 Key：仅展示前缀与元数据，明文不可回显\n- 更新 Key：更新名称、过期时间、限流（不支持修改 secret）\n- 吊销 Key：立即失效（不可恢复），可选保留元数据以便审计\n- 删除 Key：仅对已吊销 key 允许删除（建议）\n- 轮换 Key：生成新 key，旧 key 进入“即将过期/吊销”状态（可选）\n\n### 2.2 Scope（权限范围）\n建议按资源域定义 scope：\n- inference.services.read / inference.services.write\n- inference.test.execute\n- knowledge_bases.read / knowledge_bases.write / knowledge_bases.qa\n- usage.read / usage.export\n\nScope 还可增加资源约束：\n- 限制可访问的 serviceId/kbId（可选）\n- 限制环境 env（dev/staging/prod）\n\n### 2.3 RateLimit（限流）\n建议同时支持：\n- QPS 限制：每秒请求数\n- 并发限制：并发在途请求数\n- 每日配额：tokens/day、requests/day（可选）\n\n### 2.4 风险控制（可选）\n- IP Allowlist：只允许指定 IP 段调用\n- Referer/UA 策略：Web 场景（可选）\n- 二次确认：创建高权限 scope 的 key 需要 Owner/Admin\n\n### 2.5 异常与提示规范\n- Key 失效：提示 revoked/expired\n- Scope 不足：明确提示缺少的 scope\n- 限流触发：返回剩余额度（可选）与重试建议\n\n---\n\n## 3. 全量 API 接口文档（控制台管理）\n\n### 3.1 查询 Key 列表\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| X-API-Key | string | `ak_...` | 必填。客户端 API Key。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | GET | 必填；HTTP 方法 |\n| URL | string | /api/v1/api-keys | 必填；请求 URL |\n| keyword | string | payment | 可选；名称关键字 |\n| status | array<enum(string)> | [\"active\"] | 可选；active/revoked/expired |\n| expiresAtStart | string | 2026-06-01T00:00:00Z | 可选；过期时间起（ISO8601） |\n| expiresAtEnd | string | 2026-06-30T00:00:00Z | 可选；过期时间止（ISO8601） |\n| pageNo | integer | 1 | 可选；页码（从 1 开始） |\n| pageSize | integer | 20 | 可选；页大小（建议最大 200） |\n| sortBy | string | lastUsedAt | 可选；createdAt/expiresAt/lastUsedAt |\n| sortOrder | enum(string) | desc | 可选；asc/desc |\n\n响应示例：\n\n```json\n{\n  \"requestId\": \"req-20260605-301\",\n  \"code\": \"OK\",\n  \"message\": \"success\",\n  \"data\": {\n    \"items\": [\n      {\n        \"keyId\": \"key-1a2b\",\n        \"name\": \"billing-service\",\n        \"prefix\": \"ak_live_3F9A\",\n        \"status\": \"active\",\n        \"scopes\": [\"inference.test.execute\", \"usage.read\"],\n        \"rateLimit\": { \"qps\": 20, \"concurrency\": 5 },\n        \"lastUsedAt\": \"2026-06-05T00:00:00Z\",\n        \"expiresAt\": \"2026-12-31T00:00:00Z\",\n        \"createdAt\": \"2026-06-01T00:00:00Z\"\n      }\n    ],\n    \"page\": { \"pageNo\": 1, \"pageSize\": 20, \"total\": 1 }\n  }\n}\n```\n\n### 3.2 创建 API Key（明文只返回一次）\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| X-API-Key | string | `ak_...` | 必填。客户端 API Key。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | POST | 必填；HTTP 方法 |\n| URL | string | /api/v1/api-keys | 必填；请求 URL |\n| name | string | billing-service | 必填；名称 |\n| scopes | array<string> | [\"usage.read\"] | 必填；scope 列表（必须在白名单内） |\n| rateLimit | object | {\"qps\":20,\"concurrency\":5} | 可选；限流策略 |\n| expiresAt | string | 2026-12-31T00:00:00Z | 可选；过期时间（ISO8601） |\n| ipAllowlist | array<string> | [\"10.0.0.0/8\"] | 可选；IP 白名单 |\n| note | string | used by billing | 可选；备注 |\n| validateOnly | boolean | false | 可选；仅校验不创建 |\n\n校验建议：\n- scopes 必须在白名单内；包含 write 类 scope 需要更高权限\n- rateLimit.qps/concurrency 必须在允许范围内（防止滥用）\n- expiresAt 必须晚于当前时间\n\n响应示例（仅此处返回明文 key）：\n\n```json\n{\n  \"requestId\": \"req-20260605-302\",\n  \"code\": \"OK\",\n  \"message\": \"created\",\n  \"data\": {\n    \"keyId\": \"key-1a2b\",\n    \"prefix\": \"ak_live_3F9A\",\n    \"apiKey\": \"ak_live_3F9A0e8c1f...<secret>\",\n    \"expiresAt\": \"2026-12-31T00:00:00Z\"\n  }\n}\n```\n\n### 3.3 获取 Key 详情\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| X-API-Key | string | `ak_...` | 必填。客户端 API Key。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | GET | 必填；HTTP 方法 |\n| URL | string | /api/v1/api-keys/{keyId} | 必填；请求 URL |\n| keyId | string | key-1a2b | 必填；路径参数 |\n\n### 3.4 更新 Key（不修改 secret）\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| X-API-Key | string | `ak_...` | 必填。客户端 API Key。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | PATCH | 必填；HTTP 方法 |\n| URL | string | /api/v1/api-keys/{keyId} | 必填；请求 URL |\n| keyId | string | key-1a2b | 必填；路径参数 |\n| updateMask | array<string> | [\"name\",\"rateLimit\",\"expiresAt\"] | 必填；变更字段，需与 body 字段一致 |\n| name | string | billing-service-v2 | 可选；名称 |\n| rateLimit | object | {\"qps\":10,\"concurrency\":3} | 可选；限流策略 |\n| expiresAt | string | 2026-12-31T00:00:00Z | 可选；过期时间（ISO8601） |\n| ipAllowlist | array<string> | [\"10.0.0.0/8\"] | 可选；IP 白名单 |\n\n### 3.5 吊销 Key（立即失效）\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| X-API-Key | string | `ak_...` | 必填。客户端 API Key。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | POST | 必填；HTTP 方法 |\n| URL | string | /api/v1/api-keys/{keyId}:revoke | 必填；请求 URL |\n| keyId | string | key-1a2b | 必填；路径参数 |\n| reason | string | rotated | 可选；吊销原因 |\n\n### 3.6 删除 Key（建议仅 revoked/expired 可删）\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| X-API-Key | string | `ak_...` | 必填。客户端 API Key。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | DELETE | 必填；HTTP 方法 |\n| URL | string | /api/v1/api-keys/{keyId} | 必填；请求 URL |\n| keyId | string | key-1a2b | 必填；路径参数 |\n| validateOnly | boolean | false | 可选；仅校验不删除 |\n\n### 3.7 查询可用 Scope 列表（用于创建弹窗）\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| X-API-Key | string | `ak_...` | 必填。客户端 API Key。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | GET | 必填；HTTP 方法 |\n| URL | string | /api/v1/api-keys/scopes | 必填；请求 URL |\n\n响应示例：\n\n```json\n{\n  \"requestId\": \"req-20260605-303\",\n  \"code\": \"OK\",\n  \"message\": \"success\",\n  \"data\": {\n    \"scopes\": [\n      { \"name\": \"inference.services.read\", \"description\": \"查看推理服务\" },\n      { \"name\": \"inference.test.execute\", \"description\": \"调用测试/执行推理请求\" }\n    ]\n  }\n}\n```\n\n---\n\n## 4. 业务调用侧错误码（建议）\n\n当业务系统用 X-API-Key 调用推理服务/知识库时，建议统一返回：\n\n| Code | HTTP Status | 场景 | 提示信息示例 |\n|---|---:|---|---|\n| UNAUTHENTICATED | 401 | key 不存在/格式错误 | API Key 无效 |\n| PERMISSION_DENIED | 403 | scope 不足 | 缺少 scope：inference.test.execute |\n| PRECONDITION_FAILED | 412 | key 已吊销/已过期 | API Key 已过期或已吊销 |\n| RATE_LIMITED | 429 | 触发限流 | 已触发限流（qps=20） |\n\n建议透出（可选）响应头：\n- X-RateLimit-Limit / Remaining / Reset\n\n---\n\n## 5. 频率限制与审计（建议）\n\n### 5.1 限流优先级与合并规则（建议）\n\n同一次调用可能同时命中多层限流，建议从严生效：\n1) API Key 级：rateLimit（qps/concurrency/quota）\n2) 用户级：控制台/个人级保护\n3) 租户级：租户总配额（防止单 key 绕过）\n4) 服务级：推理服务自身限流（concurrencyLimit/qps）\n\n返回建议（可选）：\n- X-RateLimit-Limit / Remaining / Reset\n- X-RateLimit-Scope: api_key / tenant / service\n\n### 5.2 建议默认值（可按租户策略覆盖）\n\n| 项 | Type | Example | Description |\n|---|---|---|---|\n| defaultQps | integer | 10 | 新建 Key 默认 QPS |\n| defaultConcurrency | integer | 3 | 新建 Key 默认并发 |\n| maxQps | integer | 200 | 单 key 最大 QPS（上限） |\n| maxConcurrency | integer | 50 | 单 key 最大并发（上限） |\n| dailyRequestsQuota | integer | 100000 | 每日请求数配额（可选） |\n| dailyTokensQuota | integer | 10000000 | 每日 token 配额（可选） |\n\n### 5.3 审计记录（建议）\n\n需要审计的事件：\n- 创建 Key、更新 Key、吊销 Key、删除 Key、轮换 Key（若支持）\n- scope 变更、限流策略变更、IP 白名单变更\n\n审计字段建议：\n- requestId、actorUserId、actorRole、tenantId、keyId、action、before/after、createdAt\n","docs/设置-功能与API.md":"# 设置（Settings）模块：功能与 API（对齐推理服务规范）\n\n## 0. 统一规范（与推理服务一致）\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Authorization | string | Bearer eyJ... | 必填；身份鉴权 |\n| X-Tenant-Id | string | t-demo | 必填；租户标识 |\n| X-Request-Id | string | req-20260605-401 | 必填；请求唯一标识 |\n| X-Idempotency-Key | string | idem-20260605-401 | 可选；幂等键（写操作建议必填） |\n\n统一错误码建议沿用推理服务（INVALID_ARGUMENT / PERMISSION_DENIED / NOT_FOUND / CONFLICT / PRECONDITION_FAILED / RATE_LIMITED / INTERNAL_ERROR）。\n\n---\n\n## 1. 模块概述\n\n设置模块承载租户级配置入口，目标是：\n- 保持与【推理服务】一致的权限体系与审计能力\n- 所有关键变更可追溯（谁在何时改了什么）\n- 配置变更对线上推理服务、知识库、API Key 等模块生效规则清晰\n\n建议 Tabs（与原型一致）：\n- 租户信息\n- 用户与成员\n- 角色权限\n- SSO 配置\n- 密钥管理\n- 通知 Webhook\n\n---\n\n## 2. 详细功能内容（企业级）\n\n### 2.1 租户信息\n\n核心字段（建议）：\n- tenantId、tenantName、displayName、行业/用途、联系人、计费信息（可选）\n- 默认时区、默认语言\n- 默认推理服务策略（可选）：默认 LLM serviceId、默认 embedding serviceId\n- 合规开关（可选）：是否保存问答记录、是否允许导出日志、脱敏策略\n\n操作流程：\n- 查看：所有角色可见（按策略）\n- 修改：Owner/Admin\n  - 修改后实时生效（无需重启），但涉及默认服务策略可能影响新创建资源\n\n异常处理：\n- 名称冲突（CONFLICT）\n- 禁止修改系统保留字段（INVALID_ARGUMENT）\n\n### 2.2 用户与成员\n\n能力：\n- 成员列表：按角色/状态筛选\n- 邀请成员：邮件/链接邀请（可选），支持批量\n- 移除成员：需校验是否拥有关键资源 Owner 身份（前置转移）\n- 冻结成员：可选（用于安全事件）\n\n关键校验：\n- 禁止移除最后一个 Owner（PRECONDITION_FAILED）\n- 被移除成员若拥有资源所有权，需要转移或拒绝（按策略）\n\n### 2.3 角色权限\n\n建议预置角色（可扩展）：\n- Viewer / Developer / Owner / Admin\n\n权限点建议与推理服务对齐：\n- inference.services.*、inference.test.*、inference.obs.*\n- knowledge_bases.*、usage.*、api_keys.*、settings.*\n\n操作：\n- 查看权限矩阵\n- 为成员分配角色（支持项目级与租户级）\n- 自定义角色（可选，V2）\n\n### 2.4 SSO 配置\n\n支持：\n- OIDC / SAML（二选一或都支持）\n- 强制 SSO 登录开关\n- 域名白名单（可选）\n\n关键校验：\n- 启用前必须完成回调 URL/元数据校验\n- 强制 SSO 前必须保留一个 break-glass Admin（应急账号）\n\n### 2.5 密钥管理\n\n范围（建议）：\n- 平台侧加密密钥（KMS Key）：用于模型/文档等敏感产物加密（如启用）\n- Webhook 签名密钥（可选）\n\n能力：\n- 查看密钥列表（仅展示 metadata，不展示 secret）\n- 创建/轮换密钥（异步可选）\n- 设置默认密钥\n\n### 2.6 通知 Webhook\n\n用途：\n- 告警/审计事件推送（与推理服务告警规则联动）\n- 导出完成通知（用量报表导出）\n\n能力：\n- 创建 webhook：url、事件类型、签名方式、重试策略\n- 启用/停用 webhook\n- 查看投递历史（可选）\n\n---\n\n## 3. 全量 API 接口文档\n\n### 3.1 租户信息\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n#### 获取租户信息\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | GET | 必填；HTTP 方法 |\n| URL | string | /api/v1/settings/tenant | 必填；请求 URL |\n\n响应示例：\n\n```json\n{\n  \"requestId\": \"req-20260605-401\",\n  \"code\": \"OK\",\n  \"message\": \"success\",\n  \"data\": {\n    \"tenantId\": \"t-demo\",\n    \"displayName\": \"Demo Tenant\",\n    \"timezone\": \"Asia/Shanghai\",\n    \"defaults\": {\n      \"defaultLlmServiceId\": \"svc-llm-1\",\n      \"defaultEmbeddingServiceId\": \"svc-emb-1\"\n    },\n    \"compliance\": { \"saveQaHistory\": false, \"allowLogExport\": true }\n  }\n}\n```\n\n#### 更新租户信息\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | PATCH | 必填；HTTP 方法 |\n| URL | string | /api/v1/settings/tenant | 必填；请求 URL |\n| updateMask | array<string> | [\"displayName\",\"timezone\"] | 必填；变更字段，需与 body 字段一致 |\n| displayName | string | Demo Tenant (New) | 可选；租户展示名 |\n| timezone | string | Asia/Shanghai | 可选；时区 |\n| defaults | object | {\"defaultLlmServiceId\":\"svc-llm-1\"} | 可选；默认策略 |\n| compliance | object | {\"saveQaHistory\":false} | 可选；合规开关 |\n\n### 3.2 成员管理\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或
