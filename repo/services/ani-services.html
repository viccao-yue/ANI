<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ANI产品信息架构</title>
    <style>
      :root {
        --bg: #faf9f6;
        --panel: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --border: rgba(17, 24, 39, 0.12);
        --shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
        --accent: #b45309;
        --accent-2: #0f766e;
        --danger: #b91c1c;
        --radius: 14px;
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background: radial-gradient(1200px 700px at 15% 10%, rgba(180, 83, 9, 0.08), transparent 50%),
          radial-gradient(900px 600px at 80% 20%, rgba(15, 118, 110, 0.08), transparent 55%),
          var(--bg);
        color: var(--text);
        font-family: var(--sans);
        line-height: 1.5;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      .app {
        display: grid;
        grid-template-columns: 320px 1fr;
        height: 100%;
      }
      .sidebar {
        border-right: 1px solid var(--border);
        padding: 18px 16px;
        overflow: auto;
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
      }
      .brand {
        padding: 10px 10px 14px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: var(--shadow);
      }
      .brand-title {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.2px;
      }
      .mode-switch {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 12px;
      }
      .quick-links {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        margin-top: 10px;
      }
      .pill {
        cursor: pointer;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 9px 10px;
        font-size: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: #fff;
      }
      .pill[data-active="true"] {
        border-color: rgba(180, 83, 9, 0.35);
        background: rgba(180, 83, 9, 0.08);
        color: #7c2d12;
        font-weight: 650;
      }
      .search {
        margin-top: 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 12px;
        background: #fff;
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .search input {
        width: 100%;
        border:  0;
        outline: none;
        font-size: 13px;
        background: transparent;
        color: var(--text);
      }
      .search-kbd {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 2px 6px;
      }
      .tree {
        margin-top: 14px;
        padding: 10px 8px 14px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: var(--shadow);
      }
      .tree-title {
        padding: 6px 8px 10px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: baseline;
      }
      .tree-title strong {
        font-size: 13px;
      }
      .tree-title span {
        font-size: 12px;
        color: var(--muted);
      }
      .tree ul {
        list-style: none;
        padding-left: 12px;
        margin: 0;
      }
      .tree li {
        margin: 2px 0;
      }
      .caret {
        width: 14px;
        height: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-size: 12px;
        flex: 0 0 auto;
        border-radius: 6px;
      }
      .caret[data-open="false"] {
        transform: rotate(-90deg);
      }
      .node {
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 7px 8px;
        border-radius: 10px;
        cursor: pointer;
        user-select: none;
        border: 1px solid transparent;
      }
      .node:hover {
        background: rgba(15, 23, 42, 0.03);
        border-color: rgba(17, 24, 39, 0.08);
      }
      .node[data-selected="true"] {
        background: rgba(15, 118, 110, 0.08);
        border-color: rgba(15, 118, 110, 0.25);
      }
      .node-icon {
        width: 18px;
        height: 18px;
        border-radius: 6px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: #ffffff;
        flex: 0 0 auto;
      }
      .icon-group {
        background: var(--accent-2);
      }
      .icon-page {
        background: var(--accent);
      }
      .node-label {
        font-size: 13px;
        line-height: 1.2;
      }
      .node-meta {
        margin-left: auto;
        font-size: 11px;
        color: var(--muted);
        font-family: var(--mono);
      }
      .main {
        overflow: auto;
        padding: 18px 18px 28px;
      }
      .topbar {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
        box-shadow: var(--shadow);
      }
      .crumbs {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .crumb {
        font-size: 12px;
        color: var(--muted);
        border: 1px solid rgba(17, 24, 39, 0.12);
        padding: 4px 8px;
        border-radius: 999px;
        background: #fff;
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .select {
        border: 1px solid var(--border);
        background: #fff;
        border-radius: 12px;
        padding: 9px 10px;
        font-size: 12px;
        color: var(--text);
        outline: none;
      }
      .btn {
        cursor: pointer;
        border: 1px solid var(--border);
        background: #fff;
        border-radius: 12px;
        padding: 9px 10px;
        font-size: 12px;
      }
      .btn:hover {
        background: rgba(15, 23, 42, 0.03);
      }
      .content {
        margin-top: 14px;
        display: grid;
        gap: 12px;
      }
      .card {
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: var(--radius);
        padding: 14px 14px;
        box-shadow: var(--shadow);
      }
      .card h1 {
        font-size: 18px;
        margin: 0 0 6px;
      }
      .card h2 {
        font-size: 13px;
        margin: 0 0 8px;
        color: var(--muted);
        font-weight: 600;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .kv {
        display: grid;
        gap: 8px;
      }
      .kv-row {
        display: grid;
        grid-template-columns: 96px 1fr;
        gap: 10px;
        align-items: baseline;
      }
      .kv-row dt {
        color: var(--muted);
        font-size: 12px;
      }
      .kv-row dd {
        margin: 0;
        font-size: 13px;
      }
      .tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(17, 24, 39, 0.12);
        font-size: 12px;
        background: #fff;
      }
      .tag strong {
        font-weight: 650;
      }
      pre {
        margin: 0;
        padding: 12px;
        background: rgba(15, 23, 42, 0.04);
        border: 1px solid rgba(17, 24, 39, 0.08);
        border-radius: 12px;
        overflow: auto;
        font-family: var(--mono);
        font-size: 12px;
        line-height: 1.5;
        color: #0f172a;
      }
      .md {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .md h3 {
        margin: 0;
        font-size: 13px;
        font-weight: 700;
        color: #0f172a;
      }
      .md p {
        margin: 0;
        font-size: 12px;
        line-height: 1.6;
        color: #0f172a;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .md blockquote {
        margin: 0;
        padding: 10px 12px;
        border-left: 3px solid rgba(15, 23, 42, 0.18);
        background: rgba(15, 23, 42, 0.03);
        border-radius: 10px;
        color: var(--muted);
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 12px;
      }
      .md table {
        table-layout: fixed;
      }
      .md td,
      .md th {
        word-break: break-word;
        white-space: pre-wrap;
      }
      .md table.tbl-4 th:nth-child(1),
      .md table.tbl-4 td:nth-child(1) {
        width: 18%;
      }
      .md table.tbl-4 th:nth-child(2),
      .md table.tbl-4 td:nth-child(2) {
        width: 14%;
      }
      .md table.tbl-4 th:nth-child(3),
      .md table.tbl-4 td:nth-child(3) {
        width: 22%;
      }
      .md table.tbl-4 th:nth-child(4),
      .md table.tbl-4 td:nth-child(4) {
        width: 46%;
      }
      .md table.tbl-2 th:nth-child(1),
      .md table.tbl-2 td:nth-child(1) {
        width: 28%;
      }
      .md table.tbl-2 th:nth-child(2),
      .md table.tbl-2 td:nth-child(2) {
        width: 72%;
      }
      details.api {
        border: 1px solid rgba(17, 24, 39, 0.12);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.6);
        overflow: hidden;
      }
      details.api[open] {
        background: rgba(255, 255, 255, 1);
      }
      details.api summary {
        cursor: pointer;
        list-style: none;
        padding: 10px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        font-size: 13px;
        font-weight: 700;
        color: #0f172a;
      }
      details.api summary::-webkit-details-marker {
        display: none;
      }
      details.api summary .chev {
        color: var(--muted);
        font-size: 12px;
      }
      details.api .api-body {
        padding: 12px;
        border-top: 1px solid rgba(17, 24, 39, 0.08);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        overflow: hidden;
        border-radius: 12px;
        border: 1px solid rgba(17, 24, 39, 0.12);
      }
      th,
      td {
        padding: 10px 10px;
        text-align: left;
        font-size: 12px;
        border-bottom: 1px solid rgba(17, 24, 39, 0.08);
        vertical-align: top;
      }
      th {
        background: rgba(15, 23, 42, 0.03);
        color: var(--muted);
        font-weight: 650;
      }
      tr:last-child td {
        border-bottom: 0;
      }
      .empty {
        color: var(--muted);
        font-size: 13px;
      }
      .embed {
        width: 100%;
        height: 72vh;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #fff;
      }
      @media (max-width: 980px) {
        .app {
          grid-template-columns: 1fr;
        }
        .sidebar {
          display: none;
        }
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-title">ANI产品信息架构</div>
          <div class="mode-switch">
            <button class="pill" id="pill-console" data-active="true" type="button">Console</button>
            <button class="pill" id="pill-boss" data-active="false" type="button">BOSS</button>
          </div>
          <div class="quick-links">
            <button class="pill" id="pill-root-nav" type="button">一级导航图</button>
            <button class="pill" id="pill-ia-report" type="button">IA完整性分析</button>
          </div>
          <div class="search">
            <input id="search" placeholder="搜索页面（例如：推理服务、告警、API Key）" autocomplete="off" />
            <span class="search-kbd">/</span>
          </div>
        </div>
        <div class="tree" id="tree">
          <div class="tree-title">
            <strong id="tree-title">Console 导航</strong>
            <span id="tree-count"></span>
          </div>
          <div id="tree-body"></div>
        </div>
      </aside>
      <main class="main">
        <div class="topbar">
          <div class="crumbs" id="crumbs"></div>
          <div class="toolbar">
            <select class="select" id="tenant">
              <option value="t-demo">租户：Demo</option>
              <option value="t-acme">租户：ACME</option>
              <option value="t-foo">租户：Foo</option>
            </select>
            <button class="btn" id="copy-link" type="button">复制当前链接</button>
          </div>
        </div>
        <div class="content" id="content"></div>
      </main>
    </div>
    <script>
      const NAV = {
        console: {
          title: "Console",
          nodes: [
            { id: "console.home", title: "首页", type: "page" },
            {
              id: "console.compute",
              title: "算力资源",
              type: "group",
              children: [
                {
                  id: "console.compute.instances",

                  type: "group",
                  children: [
                    { id: "console.compute.instances.vm", title: "VM", type: "page" },

                    { id: "console.compute.instances.sandbox", title: "Sandbox", type: "page" },

                },

            {

      const PAGE = {

          blocks: [

### S3 兼容实现差异点（落地时需确认）

以下差异在 MinIO / Ceph RGW / 各云厂商 S3 兼容网关中较常见，Console 可以将其做成“租户/集群级配置”：
- **URL 风格**：是否支持 Virtual-hosted-style（需要泛域名证书与 DNS），否则只能用 Path-style。
- **Region/LocationConstraint**：CreateBucket 是否必须带 \`LocationConstraint\`；部分实现忽略或要求固定值。
- **ACL 支持**：很多企业落地会禁用 ACL（忽略 \`x-amz-acl\`），统一用 Bucket Policy/IAM 控制权限。
- **Bucket Policy 支持度**：是否支持 \`PutBucketPolicy\` / Policy 语法是否完全兼容 AWS（部分实现支持子集）。
- **ListBuckets 开关**：有的兼容实现会限制 \`ListBuckets\`（只允许管理员）或返回为空；此时 Console 需要“已知 Bucket 列表”来源（例如创建记录/登记）。
- **生命周期（Lifecycle）**：是否完整支持转储/过期/多条件过滤；很多实现仅支持到期删除等基础能力。
- **服务端加密**：是否支持 \`AES256\`；是否支持 \`aws:kms\` 与 KMS Key；不支持时应在 UI 隐藏相关选项。
- **分片/断点上传**：是否支持 Multipart Upload（\`CreateMultipartUpload/UploadPart/CompleteMultipartUpload\`）；大文件上传通常依赖该能力。
- **版本控制**：是否支持 \`Versioning\`；以及 DeleteObject 的 versionId 语义是否一致。
- **CORS**：浏览器直传（PUT/POST）通常需要 Bucket CORS；兼容实现对规则字段的支持可能不同。

### Ceph RGW（RADOSGW）落地建议（按常见实践，仍需以集群配置为准）

如果后端确定是 Ceph RGW，Console 可以优先按以下方向收敛设计，减少“到处都是可选项”的复杂度：
- **URL 风格**：优先 Path-style；如果 RGW 网关已配置泛域名（wildcard DNS + 证书），再启用 Virtual-hosted-style。
- **鉴权**：默认 SigV4。是否使用 STS 临时凭证，取决于 RGW 是否启用/开放 STS 能力；未启用时先用 AK/SK（建议按租户/项目拆分账号，并配合配额/最小权限）。
- **Bucket 列表来源**：优先使用 ListBuckets；如果安全策略禁用了 ListBuckets，则 Console 应以“创建记录/登记”为 Bucket 列表来源，并提供“导入已有 Bucket（只读）”的能力。
- **ACL 与 Policy**：优先不使用 ACL（UI 默认隐藏 ACL 开关），以 Bucket Policy/IAM 为主；若 RGW 未启用/不支持完整 Policy 能力，则退化为“凭证隔离 + 私有桶 + 预签名 URL”。
- **大文件上传**：默认走 Multipart Upload（Console 的直传/SDK 示例也应以 Multipart 为默认路径）；若发现网关限制较严，再通过 UI 暴露单对象大小限制提示。
- **生命周期**：先落地“前缀过滤 + 到期删除（Expiration）”这一类基础规则；转储/归档等高级动作作为可选能力（需确认 RGW 的实现与后端策略）。
- **加密**：优先 SSE-S3（\`AES256\`）若集群启用；SSE-KMS 是否可用取决于 RGW 的 KMS 集成与集群策略，建议作为“能力探测后再展示”的开关。
- **跨域与浏览器直传**：如需前端直传（PUT/POST），必须配置 Bucket CORS；Console 可以提供“推荐 CORS 模板”并提示风险（避免 \`*\` 过宽）。

### 推荐落地组合（Console 产品建议）

在“不确定兼容细节”的情况下，建议先落地一套最通用、最稳的组合：
- **访问风格**：优先 Path-style（不依赖泛域名）；后续有条件再升级 Virtual-hosted-style。
- **鉴权方式**：统一 SigV4（SDK 生成），并优先使用 STS 临时凭证（降低 AK/SK 泄露风险）。
- **权限模型**：默认全部 Bucket 私有，尽量**不使用 ACL**，统一使用 Bucket Policy/IAM（若实现不支持 Policy，则退化为“凭证隔离 + 私有桶 + 预签名 URL”）。
- **上传/下载**：对外分发统一采用 Pre-signed URL；大文件上传优先使用 Multipart Upload（若不支持则限制单文件大小并提示）。
- **生命周期**：先提供“前缀 + 到期删除（天数）”的基础策略；高级转储能力作为可选项。
- **加密**：默认开启 SSE-S3（\`AES256\`）若后端支持；不支持时 UI 仅展示“未开启/后端不支持”。

### 分片上传（Multipart Upload，推荐用于大文件/目录）

对于大模型权重文件（数 GB 以上）建议采用“分片上传 + 预签名 URL”的方式，前端直传对象存储（Ceph RGW），后端只负责签发上传地址与最终入库。

#### 关键原则（对接时建议明确）
- 前端只拿到预签名 URL，不接触 AK/SK。
- 导入任务接口要支持幂等（同一个 requestId 重复提交不应产生重复任务）。
- 完成上传后，后端要基于对象存储的 ETag/PartETag 做 complete，并校验文件清单与 checksum（若提供）。

### Ceph RGW 预签名直传：前端实现注意事项（建议写入对接清单）

#### 1) 预签名 URL 与 Header 必须匹配
- 如果后端在预签名时把某些 Header 参与了签名（例如 \`Content-Type\`、\`x-amz-server-side-encryption\`），前端上传时必须携带**完全一致**的 Header 值；否则 RGW 会返回 403（SignatureDoesNotMatch）。
- 前端上传时不要“顺手加一堆 Header”（尤其是 \`Content-Type\`），除非后端明确要求并已参与签名；推荐后端把必须携带的 Header 通过 \`headers\` 字段返回给前端。

#### 2) ETag 的获取与保存（用于 complete）
- 对于分片上传，前端每次 PUT 分片后，需要从响应头读取 \`ETag\` 并保存，最终按 \`partNumber + etag\` 提交到 complete。
- 浏览器跨域场景下，若要读取 \`ETag\`，RGW 的 CORS 需要暴露该头（\`ExposeHeader: ETag\`）。

前端保存 ETag 的建议逻辑（伪代码，缩进表示代码块）：
    const resp = await fetch(url, { method: "PUT", body: partBlob, headers })
    const etag = resp.headers.get("ETag") || resp.headers.get("etag")
    parts.push({ partNumber, etag })

#### 3) CORS（浏览器直传必配）
- 若 Console 前端直接 PUT 到 RGW，需要 RGW Bucket CORS 允许：
  - AllowedOrigin：Console 域名（避免 \`*\` 过宽）
  - AllowedMethod：GET/PUT/POST/DELETE/HEAD（按实际需求）
  - AllowedHeader：\`*\` 或至少包含 \`content-type\`、\`x-amz-*\`、\`authorization\`（视签名方式）
  - ExposeHeader：\`ETag\`、\`x-amz-request-id\`（建议）
- 预签名 URL 方式通常不需要浏览器携带 \`Authorization\` 头，但仍可能需要 \`x-amz-*\` 相关头（取决于签名策略）。

#### 4) 分片大小与并发（体验与稳定性）
- 建议后端在 init 返回推荐的 \`partSizeBytes\` 与 \`totalParts\`，前端按此切片，避免超过 RGW 的 part 数量限制（典型上限 10000）。
- 前端并发上传分片建议控制在 3~8（按网络与网关负载调优），并支持失败分片重传。

#### 5) 响应定位（便于排障）

yKfzc4ZrIyrUIvDbXMWyLUyo8WsWOsd6eAntoPuZkRCTjNm+gguogJwp8q6SRIO16dH4m9uPi9OrnaTQ/uAR2eLV6M1HPyCbgrIm8peOU0Ak4PnGQZL0m01jSzVxeas=\n    ContentPropagator: 001191440300708461136T1XGW3\n    PropagateID: c72617e261c135873d99d20a0e47172a_f9e89dd35f5b11f1b0435254007bceed\n    ReservedCode2: IrfHj6WSg8o6uoIM/Nix4Pb4GI42DVbvGrV/NnWWxrjzB7ve9MKMjyv+VnCIyKfzc4ZrIyrUIvDbXMWyLUyo8WsWOsd6eAntoPuZkRCTjNm+gguogJwp8q6SRIO16dH4m9uPi9OrnaTQ/uAR2eLV6M1HPyCbgrIm8peOU0Ak4PnGQZL0m01jSzVxeas=\n---\n\n# 模块产品设计：容器\n\n## 1. 基本信息\n\n| 字段 | 内容 |\n|---|---|\n| 模块名称 | 容器 |\n| 关联 Epic/WBS | 容器工作负载与编排 / WBS-04 |\n| 关联需求 ID | FR-CONTAINER-001 至 FR-CONTAINER-030 |\n| 用户角色 | 平台管理员、租户管理员、开发者、运维人员、安全审计员、只读用户 |\n| 优先级 | P0/P1 |\n| 目标里程碑 | M1 完成基础工作负载（Deployment/StatefulSet/DaemonSet/Job/CronJob）+ 服务与发现 + 配置管理 + 存储卷 + 镜像仓库；M2 完成弹性伸缩（HPA/VPA/KEDA）+ DevOps 流水线 + 应用市场；M3 完成微服务治理 + 灰度发布 + 网络策略可视化 |\n| 设计状态 | 草稿 |\n\n## 2. 模块定位\n\n容器模块是 ANI AI 专有云平台的核心工作负载管理入口。它承接集群资源模块提供的底层节点、网络、存储和 GPU 能力，向租户开发者交付一致的应用管理体验。\n\n本模块覆盖容器化应用的全生命周期：从镜像选择、资源配置、存储挂载、服务暴露，到弹性伸缩、日志监控和持续部署。与集群资源（底层基础设施管理）严格解耦，与 GPU 容器和 Sandbox 模块通过实例类型体系协同。\n\n### 2.1 核心用户\n\n| 用户 | 关注点 | 典型问题 |\n|---|---|---|\n| 开发者 | 创建和部署应用、配置环境变量、暴露服务、查看日志 | 如何部署一个微服务？如何配置健康检查？如何查看 Pod 日志？ |\n| 租户管理员 | 工作负载配额、资源使用、权限分配 | 哪些项目占用资源最多？是否接近配额上限？ |\n| 运维人员 | 弹性伸缩策略、监控告警、事件排查、Pod 故障恢复 | 为什么 Pod 一直 CrashLoopBackOff？如何配置 HPA？ |\n| 平台管理员 | 全局容量规划、安全策略、审计追踪 | 集群容器密度是否合理？是否存在特权容器风险？ |\n| 安全审计员 | 特权模式使用、镜像来源、网络策略合规 | 哪些工作负载使用了特权模式？镜像是否来自可信仓库？ |\n| 只读用户 | 授权范围内的应用状态和资源 | 我能看到哪些服务的运行状态？ |\n\n### 2.2 业务目标\n\n- 3 步内完成无状态应用部署（选择镜像 → 配置资源 → 部署）\n- 支持 5 种标准工作负载类型（Deployment、StatefulSet、DaemonSet、Job、CronJob）\n- 与 GPU 容器、Sandbox 实例类型无缝衔接\n- Pod 日志实时流式展示，延迟 < 3 秒\n- 资源使用监控图表实时刷新\n- 弹性伸缩策略配置分钟级生效\n- DevOps 流水线从代码提交到部署全流程可视化\n\n### 2.3 与兄弟模块的关系\n\n```\n集群资源（节点/GPU/网络/存储类）\n    │\n    ├── 容器（本模块）── 工作负载/服务/配置/存储卷/镜像/伸缩/DevOps\n    │       ├── GPU 容器（独立模块）── GPU 专用工作负载\n    │       └── Sandbox（独立模块）── 安全沙箱工作负载\n    │\n    ├── VM\n    ├── 训练任务\n    └── 推理服务\n```\n\n## 3. 范围边界\n\n| 类型 | 内容 |\n|---|---|\n| 范围内 | 工作负载管理（Deployment/StatefulSet/DaemonSet/Job/CronJob）、服务与发现（Service/Ingress）、配置管理（ConfigMap/Secret）、存储卷管理（PVC/PV/StorageClass/快照）、镜像仓库集成、弹性伸缩（HPA/VPA/KEDA）、可观测性（监控/日志/事件/告警）、DevOps 流水线、应用市场（Helm Charts）、微服务治理（Istio 集成，M3） |\n| M1 必须交付 | 工作负载创建/列表/详情、基本 Service（ClusterIP/NodePort）、ConfigMap/Secret 管理、PVC 创建与挂载、镜像仓库接入、Pod 日志与监控、事件列表 |\n| M2 增强 | 弹性伸缩（HPA/VPA/KEDA）、DevOps 流水线（CI/CD）、Helm 应用商店、Ingress 路由管理、存储快照 |\n| M3 增强 | 微服务治理（Istio 流量管理/灰度发布）、网络策略可视化、多集群应用管理 |\n| 范围外 | 底层节点管理（集群资源模块）、GPU 设备分配详情（GPU 容器模块）、Sandbox 安全策略详情（Sandbox 模块）、物理网络配置、完整成本计费、Kubernetes 集群本身的安装和升级 |\n| 强依赖 | Kubernetes 集群、IAM/RBAC、审计中心、告警中心、监控中心（Prometheus）、镜像仓库服务、存储插件（CSI） |\n\n## 4. 信息架构\n\n```text\n可扩展容器平台                    ← Console 扩展市场入口（M2）\n  - 扩展组件市场                  ← 即插即用的扩展组件管理（M2）\n\n算力资源\n  - 概览与驾驶舱\n  - 集群资源\n  - 容器  ← 本模块\n    - 容器概览（Dashboard）        [M1]\n    - 工作负载\n      - Deployments              [M1]\n      - StatefulSets             [M1]\n      - DaemonSets               [M1]\n      - Jobs                     [M1]\n      - CronJobs                 [M1]\n    - 服务与发现\n      - Services                 [M1]\n      - Ingresses                [M2]\n    - 配置管理\n      - ConfigMaps               [M1]\n      - Secrets                  [M1]\n    - 存储\n      - 持久卷声明（PVC）          [M1]\n      - 持久卷（PV）              [M1]\n      - 存储类（StorageClass）    [M1]\n      - 卷快照                   [M2]\n    - 镜像仓库                    [M1]\n    - 弹性伸缩\n      - HPA 策略                 [M2]\n      - VPA 策略                 [M2]\n      - KEDA 事件驱动伸缩         [M2]\n    - DevOps\n      - 流水线                   [M2]\n      - 代码仓库                 [M2]\n    - 应用市场                    [M2]\n    - 微服务治理                  [M3]\n      - 流量管理\n      - 灰度发布\n      - 熔断降级\n  - GPU 容器（独立模块）\n  - Sandbox（独立模块）\n  - VM\n  - 训练任务\n  - 推理服务\n```\n\n## 5. 友商调研摘要\n\n### 5.1 友商功能矩阵\n\n| 功能域 | KubeSphere 4.2（青云） | 灵雀云 ACP 3.0 | Kite |\n|---|---|---|---|\n| 架构特征 | LuBan 可扩展开放架构，积木式模块化，扩展市场即插即用 | 全栈开放平台，5大产品线16大子产品，容器原生架构 | 轻量级运维协作平台，Dashboard+定位 |\n| 工作负载 | Deployment/StatefulSet/DaemonSet/Job/CronJob + 联邦多集群统一管理 | Deployment/StatefulSet/DaemonSet/Job/CronJob + 应用编排 | Pods/Deployments/Services + CRD 支持 |\n| 服务与发现 | Service(ClusterIP/NodePort/LoadBalancer) + Ingress + 三级网关 | Service + 4/7层负载均衡 + API管理平台(AMP) | Service 管理 + Kube Proxy 直连 |\n| 弹性伸缩 | HPA + VPA + KEDA（事件驱动） | HPA + 秒级弹性伸缩 | 未明确支持 |\n| 镜像仓库 | 集成 Docker Hub + 私有仓库 + 镜像安全扫描 | 企业级镜像中心 + 第三方安全扫描集成 | 基于 Docker/容器镜像仓库 API |\n| 配置管理 | ConfigMap/Secret + 配置字典批量挂载 | ConfigMap/Secret | ConfigMap/Secret + Monaco YAML 编辑 |\n| 存储 | PVC/PV/StorageClass + PVC 自动扩容 + 快照 + Fluid 加速 | PVC/PV + GlusterFS/Ceph + 存储卷快照 | PVC/PV 管理 |\n| DevOps | CI/CD 流水线 + S2I/B2I + 持续部署 + 代码仓库 | 开放式工具链集成编排(Jenkins/Clair/SonarQube) | 无 |\n| 微服务治理 | Istio + SpringCloud + 灰度发布 + 链路追踪 | Service Mesh + SpringCloud 双架构 | 无 |\n| 可观测性 | WhizardTelemetry：监控/告警/通知/日志/审计/事件 + 链路追踪 | 多层级多维度监控 + 自定义面板 + 一站式日志 + 多元化告警 | Prometheus 实时图表 + 实时日志 + Web 终端 |\n| 安全 | Gatekeeper(OPA) + 镜像安全加固 + 二次认证 + 多租户 + 细粒度 RBAC | 金融级安全体系 + 镜像扫描 + 网络防护 + 运行时监控 + 安全左移 | OAuth + RBAC + 用户管理 |\n| 应用市场 | OpenPitrix 应用商店 + Helm Charts | 未明确独立应用市场 | Helm Releases 管理 |\n| AI 能力 | 算力设备管理(GPU/NPU) + Volcano 调度器 | MLOps + GPU 算力调度 + AI 任务管理 | AI 助手 |\n| 多集群 | 多集群管理 + 联邦项目 + Solo/Federation 模式 | 混合云/多云统一控制平面 | 多集群切换 + kubeconfig 自动发现 |\n\n### 5.2 关键洞察与 ANI 差异化策略\n\n| 洞察 | 来源 | ANI 策略 |\n|---|---|---|\n| KubeSphere 的扩展市场机制实现了平台能力的灵活组合，避免了一次性交付的臃肿 | KubeSphere | M2 引入\"可扩展容器平台\"概念，支持组件按需启用 |\n| 灵雀云将数据服务（MySQL/Redis/Kafka）作为平台组件直接集成，降低中间件运维门槛 | 灵雀云 | ANI 容器模块聚焦应用编排，中间件服务由独立的数据服务产品线承接 |\n| Kite 的 Web 终端 + 内置 kubectl 控制台降低了运维学习成本 | Kite | M2 在 Pod 详情中提供 Web 终端入口，面向高级用户可选暴露 kubectl |\n| KubeSphere 的多集群联邦管理已较成熟 | KubeSphere | ANI 先聚焦单集群场景，多集群管理作为 M3 扩展 |\n| 三家均未在容器模块层面显式设计面向 AI 场景的 GPU 亲和调度 UI | 三家 | ANI 在创建向导的\"资源配置\"步骤显式提供 GPU 选择，与 GPU 容器模块协同 |\n| KubeSphere 的工作负载创建向导维持了较高 K8s 原生语义，新手仍有认知负担 | KubeSphere | ANI 创建向导采用\"应用开发者\"语言：实例名称 → 选镜像 → 配资源 → 挂存储 → 开放服务 |\n| 灵雀云的金融级安全体系（安全左移、镜像扫描、运行时监控）可作为 ANI 安全设计对标 | 灵雀云 | ANI 安全体系与平台 IAM/审计中心深度集成，镜像扫描集成到镜像仓库环节 |\n| Kite 的 CRD 快捷入口和 Monaco YAML 编辑器对平台管理员友好 | Kite | M2 为高级用户提供 YAML 编辑模式（开关控制，默认隐藏） |\n\n## 6. 页面设计\n\n### 6.1 容器概览（Dashboard）[M1]\n\n入口：左侧导航 `算力资源 -> 容器 -> 容器概览`。\n\n概览卡片：\n\n| 卡片 | 内容 |\n|---|---|\n| 资源总览 | 集群总数、命名空间数、运行中 Pod 数、总 CPU/内存使用率 |\n| 工作负载健康 | 运行中/异常/就绪 Pod 比例，各工作负载类型分布 |\n| 服务状态 | Service 总数、Ingress 总数、外部可访问服务数 |\n| 存储概览 | PVC 总数、已挂载/未挂载、存储使用率 |\n| 近期事件 | 最近 24 小时 Warning 级事件摘要 |\n| 资源配额 | 当前租户/项目的 CPU/内存/存储/GPU 配额使用率 |\n\n### 6.2 工作负载列表 [M1]\n\n入口：左侧导航 `算力资源 -> 容器 -> 工作负载 -> Deployments`（以此类推，每种工作负载独立列表页）。\n\n列表字段：\n\n| 字段 | 说明 |\n|---|---|\n| 名称 | 工作负载名称 + 别名 |\n| 状态 | 运行中、更新中、异常、暂停 |\n| Pod 状态 | 就绪/期望副本数（如 3/3） |\n| 实例类型 | Deployment / StatefulSet / DaemonSet / Job / CronJob |\n| CPU/内存 | 当前使用 / 请求值 / 限制值 |\n| 所属命名空间 | 项目/命名空间 |\n| 镜像 | 主容器镜像 |\n| 标签 | 自动标签（实例类型等）+ 自定义标签 |\n| 更新时间 | 最近一次更新时间 |\n\n筛选条件：状态、实例类型、命名空间、标签、镜像名称。\n\n### 6.3 创建工作负载向导 [M1]\n\n5 步向导：基本信息 → 容器设置 → 存储设置 → 服务与发现 → 高级设置。\n\n#### 第一步：基本信息\n\n| 参数 | 说明 | 是否必填 |\n|---|---|---|\n| 实例类型 | 单选：Deployment / StatefulSet / DaemonSet / Job / CronJob / GPU容器（跳转）/ Sandbox（跳转）。选后两类时跳转到对应独立模块 | 是 |\n| 名称 | 符合 K8s 命名规范 | 是 |\n| 别名 | 中文可读名称 | 否 |\n| 命名空间 | 下拉选择当前租户有权限的项目 | 是 |\n| 副本数 | 默认 2，DaemonSet 自动为每节点 1 | Deployment/StatefulSet 必填 |\n| 描述 | 自由文本 | 否 |\n\n#### 第二步：容器设置\n\n| 参数 | 说明 | 是否必填 |\n|---|---|---|\n| 镜像 | 从镜像仓库选择或手动输入 `registry/image:tag` | 是 |\n| 镜像拉取策略 | Always / IfNotPresent / Never | 否（默认 IfNotPresent） |\n| 资源请求 | CPU（核）、内存（GiB）、GPU（张），仅 GPU容器 实例类型显示 GPU | 是 |\n| 资源限制 | CPU（核）、内存（GiB）、GPU（张） | 否（不设即时资源请求） |\n| 启动命令 | 覆盖镜像默认 ENTRYPOINT | 否 |\n| 命令参数 | 附加参数 | 否 |\n| 环境变量 | 键值对，支持引用 ConfigMap/Secret | 否 |\n| 端口 | 容器端口列表（名称/端口号/协议） | 否 |\n| 健康检查 | 就绪探针 / 存活探针 / 启动探针（HTTP/TCP/命令） | 否 |\n| 特权模式 | 开关，默认关闭，开启时二次确认 | 否 |\n| 时区同步 | 与主机时区同步 | 否（默认开启） |\n\n#### 第三步：存储设置\n\n| 参数 | 说明 | 是否必填 |\n|---|---|---|\n| 挂载卷 | 选择已有 PVC 挂载到指定路径，或即时创建 PVC | 否 |\n| 挂载 ConfigMap | 选择 ConfigMap 并指定挂载路径 | 否 |\n| 挂载 Secret | 选择 Secret 并指定挂载路径 | 否 |\n| 临时存储 | 使用 emptyDir（Pod 生命周期内有效） | 否 |\n\n#### 第四步：服务与发现\n\n| 参数 | 说明 | 是否必填 |\n|---|---|---|\n| 创建 Service | 开关，开启时自动为工作负载创建 Service | 否 |\n| Service 类型 | ClusterIP / NodePort / LoadBalancer | 创建 Service 时必填 |\n| 会话保持 | 开启/关闭 + 超时时间 | 否 |\n| 外部流量策略 | Local / Cluster | 否 |\n| 端口映射 | Service 端口 → 容器端口 | 创建 Service 时必填 |\n\n#### 第五步：高级设置\n\n| 参数 | 说明 | 是否必填 |\n|---|---|---|\n| 更新策略 | 滚动更新 / 重新创建，滚动更新可设置 maxSurge/maxUnavailable | 否（默认滚动更新） |\n| 调度策略 | 节点选择器（key=value）、容忍（Toleration）、亲和性/反亲和性 | 否 |\n| DNS 策略 | Default / ClusterFirst / ClusterFirstWithHostNet / None | 否（默认 ClusterFirst） |\n| 终止等待时间 | Pod 优雅终止等待秒数，默认 30 | 否 |\n| 标签/注解 | 自定义 labels 和 annotations | 否 |\n| Job/CronJob 配置 | 仅 Job/CronJob 类型显示：并行度、完成数、重启策略、Cron 表达式、并发策略、历史保留数 | 实例类型为 Job/CronJob 时必填 |\n\n#### 向导交互行为\n\n- 每步可\"上一步\"/\"下一步\"导航\n- 右侧实时预览 YAML（高级用户可选展开）\n- 最后一步提供\"创建\"按钮，点击后提交 API\n- 创建成功后跳转到工作负载详情页\n\n### 6.4 工作负载详情 [M1]\n\n包含 8 个 Tab：\n\n| Tab | 内容 |\n|---|---|\n| 概览 | 基本信息卡片（名称/命名空间/实例类型/创建时间/标签）+ 资源使用趋势图 + Pod 状态饼图 + 关联 Service/Ingress 列表 |\n| 资源状态 | Deployment → ReplicaSet → Pod 的树形关系视图，展示每个 Pod 的状态/节点/IP/CPU/内存/重启次数 |\n| Pod 列表 | 扁平 Pod 表格，支持筛选、查看日志、Web 终端（M2）、删除 Pod |\n| 事件 | Kubernetes Events 时间线，按类型（Normal/Warning）筛选 |\n| 监控 | CPU/内存/网络/磁盘 IO 指标图表，时间范围可选 |\n| 日志 | 实时日志流 + 历史日志搜索，支持容器选择 |\n| 配置 | ConfigMap/Secret 挂载详情 + 环境变量列表 |\n| 修订历史 | 滚动更新历史记录，支持回滚到指定版本（Deployment/StatefulSet/DaemonSet） |\n| 弹性伸缩 | HPA/VPA 策略配置与当前状态（M2） |\n\n### 6.5 服务与发现 [M1/M2]\n\n#### 6.5.1 Service 列表 [M1]\n\n| 字段 | 说明 |\n|---|---|\n| 名称 | Service 名称 |\n| 类型 | ClusterIP / NodePort / LoadBalancer |\n| Cluster IP | 集群内部 IP |\n| 外部 IP | LoadBalancer 或 NodePort 的外部访问地址 |\n| 端口 | 协议/端口/目标端口 |\n| 关联工作负载 | 通过 Selector 关联的 Deployment/StatefulSet 等 |\n| 命名空间 | 所属项目 |\n| 创建时间 | - |\n\n#### 6.5.2 Ingress 列表 [M2]\n\n| 字段 | 说明 |\n|---|---|\n| 名称 | Ingress 名称 |\n| 域名 | 路由域名 |\n| 路径规则 | 路径 → 后端 Service:Port |\n| TLS | 是否启用 HTTPS |\n| 命名空间 | 所属项目 |\n| 创建时间 | - |\n\n### 6.6 配置管理 [M1]\n\n#### 6.6.1 ConfigMap 列表\n\n| 字段 | 说明 |\n|---|---|\n| 名称 | ConfigMap 名称 |\n| 键数量 | 数据键值对数量 |\n| 命名空间 | 所属项目 |\n| 创建时间 | - |\n| 关联工作负载 | 引用此 ConfigMap 的工作负载数 |\n\n支持操作：新建（键值对编辑器）、编辑、删除、YAML 编辑。\n\n#### 6.6.2 Secret 列表\n\n与 ConfigMap 类似，Value 默认掩码显示，支持点击查看明文（需权限）。类型标识：Opaque / kubernetes.io/dockerconfigjson / kubernetes.io/tls。\n\n### 6.7 存储卷管理 [M1/M2]\n\n#### 6.7.1 PVC 列表 [M1]\n\n| 字段 | 说明 |\n|---|---|\n| 名称 | PVC 名称 |\n| 状态 | Bound / Pending / Lost |\n| 容量 | 请求存储大小 |\n| 访问模式 | RWO / ROX / RWX |\n| StorageClass | 关联存储类 |\n| 关联 PV | 绑定的 PV 名称 |\n| 关联工作负载 | 挂载此 PVC 的工作负载数 |\n| 命名空间 | 所属项目 |\n\n支持操作：创建 PVC（选择 StorageClass → 设置容量 → 选择访问模式）、扩容（需 SC 支持）、删除。\n\n#### 6.7.2 PV 列表 [M1]\n\n只读视图，展示所有 PV 的状态、容量、回收策略、StorageClass、关联 PVC。\n\n#### 6.7.3 StorageClass 列表 [M1]\n\n只读视图（由平台管理员在集群资源模块配置），展示存储类名称、Provisioner、回收策略、是否默认。\n\n#### 6.7.4 卷快照 [M2]\n\nPVC 快照的创建、列表与恢复。\n\n### 6.8 镜像仓库 [M1]\n\n| 功能 | 说明 |\n|---|---|\n| 镜像搜索 | 搜索公开镜像仓库（Docker Hub 等）和私有镜像仓库中的镜像 |\n| 镜像列表 | 按仓库分组展示镜像 + Tag 列表 + 大小 + 更新时间 |\n| 镜像详情 | 镜像层信息、漏洞扫描结果（M2）、部署历史 |\n| 私有仓库管理 | 添加/编辑/删除私有镜像仓库凭据 |\n| 安全扫描 | M2：集成镜像漏洞扫描，高危漏洞阻止部署 |\n\n### 6.9 弹性伸缩 [M2]\n\n#### 6.9.1 HPA 策略\n\n创建 HPA 策略时配置：\n\n| 参数 | 说明 |\n|---|---|\n| 目标工作负载 | 选择 Deployment / StatefulSet |\n| 最小/最大副本数 | 伸缩范围 |\n| 指标类型 | CPU 使用率 / 内存使用率 / 自定义指标（Prometheus） |\n| 阈值 | 触发伸缩的目标值（如 CPU > 70%） |\n| 冷却时间 | 扩缩容间隔 |\n\nHPA 策略列表展示：关联工作负载、当前副本数/最小/最大、当前指标值、触发状态。\n\n#### 6.9.2 VPA 策略 [M2]\n\n自动优化 Pod 资源请求，配置：目标工作负载、更新模式（Auto/Initial/Off）、资源策略（CPU/内存上下界）。\n\n#### 6.9.3 KEDA 事件驱动伸缩 [M2]\n\n基于事件源（Kafka 消息堆积、Redis 队列长度、Prometheus 指标等）触发扩缩容。\n\n### 6.10 可观测性 [M1]\n\n与 ANI 平台监控中心/告警中心/审计中心集成：\n\n| 能力 | 说明 |\n|---|---|\n| 容器监控 | CPU/内存/网络/磁盘 IO 图表，支持集群/命名空间/工作负载/Pod 多级下钻 |\n| 日志 | 实时日志流 + 历史日志检索，支持容器级别过滤、关键字搜索 |\n| 事件 | Kubernetes Events 聚合展示，支持类型/时间/对象筛选 |\n| 告警规则 | M2：自定义容器级告警规则（Pod 重启次数 > N、CPU > 阈值、OOMKilled 等） |\n| 审计 | 所有工作负载/Service/配置变更自动记录，对接 ANI 审计中心 |\n\n### 6.11 DevOps 流水线 [M2]\n\n| 功能 | 说明 |\n|---|---|\n| 流水线列表 | 流水线名称、状态、最近执行时间、成功率 |\n| 创建流水线 | 图形化编排（拉代码 → 构建镜像 → 推送仓库 → 部署到 K8s）或 Jenkinsfile 导入 |\n| 流水线详情 | 阶段视图（Stage View）+ 日志输出 + 产物管理 |\n| 代码仓库集成 | 对接 Git 仓库（GitHub/GitLab/工蜂等） |\n| 触发器 | 代码 Push / PR / 定时 / 手动触发 |\n\n### 6.12 应用市场 [M2]\n\n基于 Helm Charts 的应用商店：\n\n| 功能 | 说明 |\n|---|---|\n| 应用目录 | 分类展示（AI 框架/数据库/中间件/工具 等） |\n| 应用详情 | Chart 信息、版本、配置参数、README |\n| 一键部署 | 选择 Chart 版本 → 填写 values → 部署到目标命名空间 |\n| 已部署应用 | 管理 Helm Release：查看状态、升级、回滚、卸载 |\n| 应用上传 | 平台管理员可上传自定义 Helm Chart 包 |\n\n### 6.13 微服务治理 [M3]\n\n基于 Istio 的可选扩展：\n\n| 能力 | 说明 |\n|---|---|\n| 流量管理 | 金丝雀发布、蓝绿部署、流量镜像、故障注入 |\n| 灰度发布 | 按权重/Header/Cookie 分流 |\n| 服务拓扑 | 服务间调用关系拓扑图 |\n| 链路追踪 | Jaeger/Zipkin 集成 |\n| 熔断降级 | 连接池管理、异常检测、断路策略 |\n| 网关策略 | 限流、重试、超时、负载均衡算法 |\n\n## 7. API 请求参数\n\n### 7.1 创建 Deployment\n\n```\nPOST /api/v1/namespaces/{namespace}/deployments\n```\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| name | Required | String | 工作负载名称，小写字母+数字+连字符，最长 253 字符 |\n| alias | Optional | String | 中文别名，最长 63 字符 |\n| instance_type | Required | String | 实例类型：\"Deployment\" |\n| namespace | Required | String | 目标命名空间 |\n| replicas | Required | Integer | 副本数，最小值 1，最大值受配额限制 |\n| description | Optional | String | 描述信息，最长 256 字符 |\n| containers | Required | Array[Container] | 容器列表，至少 1 个 |\n| containers[].name | Required | String | 容器名称 |\n| containers[].image | Required | String | 镜像地址，格式 registry/repo:tag |\n| containers[].image_pull_policy | Optional | String | Always / IfNotPresent / Never，默认 IfNotPresent |\n| containers[].resources.requests.cpu | Required | String | CPU 请求，如 \"500m\" 或 \"1\" |\n| containers[].resources.requests.memory | Required | String | 内存请求，如 \"512Mi\" 或 \"1Gi\" |\n| containers[].resources.limits.cpu | Optional | String | CPU 限制，不设即无上限 |\n| containers[].resources.limits.memory | Optional | String | 内存限制 |\n| containers[].command | Optional | Array[String] | 启动命令，覆盖镜像 ENTRYPOINT |\n| containers[].args | Optional | Array[String] | 命令参数 |\n| containers[].env | Optional | Array[EnvVar] | 环境变量列表 |\n| containers[].env[].name | Required | String | 环境变量名 |\n| containers[].env[].value | Optional | String | 环境变量值（与 valueFrom 二选一） |\n| containers[].env[].value_from.configmap_key_ref | Optional | Object | 从 ConfigMap 引用值 |\n| containers[].env[].value_from.secret_key_ref | Optional | Object | 从 Secret 引用值 |\n| containers[].ports | Optional | Array[Port] | 容器端口列表 |\n| containers[].ports[].name | Optional | String | 端口名称 |\n| containers[].ports[].container_port | Required | Integer | 容器端口号 |\n| containers[].ports[].protocol | Optional | String | TCP / UDP，默认 TCP |\n| containers[].readiness_probe | Optional | Probe | 就绪探针 |\n| containers[].liveness_probe | Optional | Probe | 存活探针 |\n| containers[].startup_probe | Optional | Probe | 启动探针（K8s 1.18+） |\n| containers[].security_context.privileged | Optional | Boolean | 特权模式，默认 false |\n| containers[].security_context.read_only_root_filesystem | Optional | Boolean | 根文件系统只读 |\n| containers[].security_context.run_as_non_root | Optional | Boolean | 仅允许非 root 运行 |\n| containers[].volume_mounts | Optional | Array[VolumeMount] | 卷挂载列表 |\n| containers[].volume_mounts[].name | Required | String | 卷名称 |\n| containers[].volume_mounts[].mount_path | Required | String | 容器内挂载路径 |\n| containers[].volume_mounts[].read_only | Optional | Boolean | 只读挂载，默认 false |\n| containers[].volume_mounts[].sub_path | Optional | String | 子路径映射 |\n| volumes | Optional | Array[Volume] | 卷定义列表 |\n| volumes[].name | Required | String | 卷名称 |\n| volumes[].persistent_volume_claim.claim_name | Optional | String | PVC 引用 |\n| volumes[].config_map.name | Optional | String | ConfigMap 引用 |\n| volumes[].secret.secret_name | Optional | String | Secret 引用 |\n| volumes[].empty_dir | Optional | Object | 临时卷 |\n| service | Optional | ServiceSpec | 同时创建的 Service 配置 |\n| service.type | Optional | String | ClusterIP / NodePort / LoadBalancer |\n| service.ports | Optional | Array[ServicePort] | Service 端口映射列表 |\n| update_strategy.type | Optional | String | RollingUpdate / Recreate，默认 RollingUpdate |\n| update_strategy.rolling_update.max_surge | Optional | String | 最大超出副本数，默认 \"25%\" |\n| update_strategy.rolling_update.max_unavailable | Optional | String | 最大不可用副本数，默认 \"25%\" |\n| node_selector | Optional | Object | 节点选择器 key:value |\n| tolerations | Optional | Array[Toleration] | 容忍列表 |\n| affinity | Optional | Affinity | 亲和性/反亲和性规则 |\n| dns_policy | Optional | String | Default / ClusterFirst / ClusterFirstWithHostNet / None |\n| termination_grace_period_seconds | Optional | Integer | 终止等待秒数，默认 30 |\n| labels | Optional | Object | 自定义标签 key:value |\n| annotations | Optional | Object | 自定义注解 key:value |\n\n### 7.2 创建 Service\n\n```\nPOST /api/v1/namespaces/{namespace}/services\n```\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| name | Required | String | Service 名称 |\n| namespace | Required | String | 目标命名空间 |\n| type | Required | String | ClusterIP / NodePort / LoadBalancer |\n| ports | Required | Array[ServicePort] | 端口映射列表 |\n| ports[].name | Optional | String | 端口名称 |\n| ports[].protocol | Optional | String | TCP / UDP / SCTP，默认 TCP |\n| ports[].port | Required | Integer | Service 端口 |\n| ports[].target_port | Required | Integer | 目标容器端口 |\n| ports[].node_port | Optional | Integer | 节点端口（NodePort 类型必填，30000-32767） |\n| selector | Required | Object | 标签选择器 key:value |\n| session_affinity | Optional | String | 会话保持：None / ClientIP |\n| session_affinity_config.client_ip.timeout_seconds | Optional | Integer | 会话保持超时秒数 |\n| external_traffic_policy | Optional | String | Local / Cluster |\n| labels | Optional | Object | 自定义标签 |\n| annotations | Optional | Object | 自定义注解（如 LoadBalancer 配置） |\n\n### 7.3 创建 HPA\n\n```\nPOST /api/v1/namespaces/{namespace}/horizontalpodautoscalers\n```\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| name | Required | String | HPA 名称 |\n| namespace | Required | String | 目标命名空间 |\n| scale_target_ref.kind | Required | String | 目标类型：Deployment / StatefulSet |\n| scale_target_ref.name | Required | String | 目标工作负载名称 |\n| min_replicas | Required | Integer | 最小副本数 |\n| max_replicas | Required | Integer | 最大副本数 |\n| metrics | Required | Array[Metric] | 指标列表 |\n| metrics[].type | Required | String | Resource / Pods / Object / External |\n| metrics[].resource.name | Optional | String | 资源指标名：cpu / memory |\n| metrics[].resource.target.type | Required | String | Utilization / AverageValue |\n| metrics[].resource.target.average_utilization | Optional | Integer | 目标利用率百分比 |\n| metrics[].resource.target.average_value | Optional | String | 目标平均值 |\n| behavior.scale_down.stabilization_window_seconds | Optional | Integer | 缩容稳定窗口秒数 |\n| behavior.scale_up.stabilization_window_seconds | Optional | Integer | 扩容稳定窗口秒数 |\n\n## 8. 关键设计决策对比表\n\n| 维度 | KubeSphere 4.2 | 灵雀云 ACP 3.0 | Kite | ANI 容器模块 | 决策依据 |\n|---|---|---|---|---|---|\n| 创建工作负载向导步骤数 | 5步（基本信息→容器组设置→存储设置→高级设置） | 4步（基本→容器→存储→高级） | 无向导（YAML/表单直接创建） | 5步（基本→容器→存储→服务发现→高级） | 参考KubeSphere，增加\"服务与发现\"步骤，降低应用开发者认知负担 |\n| 实例类型统一入口 | 通过部署/有状态副本集/守护进程集三个独立创建入口 | 统一入口+类型选择 | 资源类型独立管理 | 统一入口 + 类型下拉（含GPU容器和Sandbox跳转） | 参考灵雀云统一入口思路，并将GPU容器/Sandbox纳入类型体系 |\n| 标签选择器暴露方式 | 手动输入 key=value | 图形化选择已有工作负载标签 | 无图形化标签选择器 | 列表选择（展示可匹配的工作负载），高级模式可手动输入 | 自研：降低标签概念暴露，面向非K8s专家的开发者 |\n| Namespace 语义 | 企业空间 → 项目 → 部署 | 租户 → 项目 → 应用 | 直接使用 K8s Namespace | 租户 → 项目 → 命名空间（默认 1:1 映射） | 参考KubeSphere层级，对齐ANI多租户模型 |\n| GPU 设备配置 | 独立扩展组件\"算力设备管理\"，在工作负载表单中展示GPU选项 | 通过数智平台独立配置 | 不支持 | 创建向导\"容器设置\"中显式GPU选择（仅GPU容器实例类型），与GPU容器模块协同 | 自研差异化：AI场景优先，GPU亲和调度内置 |\n| 健康检查配置 | 就绪探针/存活探针/启动探针，三种模式（HTTP/TCP/命令） | 存活探针/就绪探针 | 无 | 三种探针 + HTTP/TCP/命令 + 推荐默认值 | 对齐KubeSphere，补充推荐值降低配置门槛 |\n| Service 创建方式 | 独立创建入口 | 独立创建入口 | Service 独立管理 | 可在创建向导第四步直接创建，也可独立创建 | 参考KubeSphere，增强关联创建体验 |\n| Ingress 网关 | 集群/项目/企业空间三级网关 | 4/7层负载均衡 + API管理 | Kube Proxy 直连 | 集群级 Ingress Controller + 项目级路由规则 | 对齐KubeSphere网关模型，简化层级 |\n| 弹性伸缩 | HPA + VPA + KEDA（扩展组件） | HPA + 秒级弹性伸缩 | 不支持 | M2交付 HPA+VPA+KEDA，统一策略管理页 | 参考KubeSphere三件套，以 KEDA 覆盖 AI 批处理事件驱动场景 |\n| 镜像安全 | 集成扫描（扩展组件） | 金融级镜像安全扫描 | 无 | M2集成镜像漏洞扫描，高危漏洞阻止部署 | 参考灵雀云安全左移理念，接入ANI安全扫描中心 |\n| 日志和监控 | WhizardTelemetry 统一可观测平台（监控/日志/审计/事件/告警） | 多层级监控 + 一站式日志 + 多元化告警 | Prometheus 实时图表 + 日志流 | 通过 API 对接 ANI 统一直播\"监控中心/日志中心/告警中心\"，容器模块内嵌轻量视图 | 自研：统一平台可观测入口，避免容器模块内建完整可观测栈 |\n| DevOps 流水线 | CI/CD + S2I/B2I + 代码仓库 | 开放式工具链集成编排（Jenkins/Clair/SonarQube） | 无 | M2 交付集成化流水线，支持 Jenkinsfile + 图形化编排 | 参考KubeSphere流水线形态，图形化编排降低门槛 |\n| 应用市场 | OpenPitrix 应用商店 + Helm Charts | 无独立应用市场 | Helm Releases 管理 | M2 交付 Helm 应用商店，预置 AI 框架/训练/推理 Chart | 参考KubeSphere OpenPitrix，差异化预置AI场景Chart |\n| 安全上下文默认值 | 未默认开启安全约束 | 安全左移，默认非 root | RBAC + OAuth | 默认非特权模式、非 root、只读根文件系统可选 | 参考灵雀云安全左移，ANKI 安全优先原则 |\n| 多集群管理 | 成熟的多集群联邦管理 | 混合云/多云统一控制平面 | 多集群切换 | M3 扩展 | 先聚焦单集群，降低M1交付复杂度 |\n| YAML 编辑模式 | 所有创建表单支持\"编辑 YAML\"切换 | 部分表单支持 YAML 编辑 | Monaco 编辑器实时编辑 | 创建向导右侧可选展开 YAML 预览，M2 增加 YAML 直接创建模式（默认关闭） | 参考 Kite Monaco 编辑器体验，保持创建向导为主路径 |\n| Web 终端 | 容器终端（扩展组件） | 未明确 | Pod/Node Web 终端 + kubectl 控制台 | M2 在 Pod 详情提供 Web 终端入口，高级用户可选 kubectl | 参考 Kite 运维协作平台定位，降低 SSH 依赖 |\n\n## 9. 信息架构设计原则\n\n1. **应用视角优先**：页面语言面向应用开发者，使用\"实例名称/镜像/端口/环境变量/健康检查\"，而非 Kubernetes 原生术语。资源对象名称（Deployment/ConfigMap 等）仅在专家模式中暴露。\n\n2. **场景闭环**：创建工作负载时同步完成服务暴露和存储挂载，避免创建后跳转多个页面补配。一个向导完成\"部署 + 挂载 + 暴露\"的完整场景。\n\n3. **渐进式复杂度**：每步只展示最常用选项，复杂配置（调度策略、容忍、亲和性）折叠在\"高级设置\"中。默认提供业界最佳实践值。\n\n4. **安全内置**：非特权模式为默认，高危操作（特权容器、hostPath 挂载）需二次确认。镜像安全扫描集成在镜像选择阶段，阻止高危镜像部署。\n\n5. **与平台统一可观测体系协同**：容器模块嵌入轻量级监控/日志视图，但底层数据源对接 ANI 统一监控中心和日志中心，确保一致的数据模型和告警能力。\n\n6. **可扩展架构**：M2 引入\"可扩展容器平台\"概念，支持按需启用扩展组件（DevOps/Helm/Istio），避免 M1 交付臃肿。\n\n7. **AI 场景内置**：GPU 设备选择作为容器资源配置的自然延伸（而非额外扩展组件），调度策略（节点亲和→GPU节点）在向导中可视化配置。\n\n8. **操作可审计可回滚**：所有变更记录到审计中心，Deployment 支持修订历史与一键回滚，配置变更前展示差异对比。\n\n## 10. HTTP 状态码约定\n\n| 状态码 | 说明 | 使用场景 |\n|---|---|---|\n| 200 OK | 请求成功 | GET/PUT 操作成功 |\n| 201 Created | 资源创建成功 | POST 创建工作负载/Service/ConfigMap/Secret/HPA |\n| 202 Accepted | 异步任务已接受 | 工作负载滚动更新、回滚操作、应用部署 |\n| 204 No Content | 成功且无返回体 | DELETE 删除资源成功 |\n| 400 Bad Request | 请求参数校验失败 | 名称不符合规范、镜像格式错误、资源配置超过上限 |\n| 401 Unauthorized | 未认证或 Token 过期 | 缺少有效认证凭据 |\n| 403 Forbidden | 无权限执行操作 | 跨租户创建资源、非管理员编辑平台级资源 |\n| 404 Not Found | 资源不存在 | 查询/修改/删除不存在的 Deployment 或命名空间 |\n| 409 Conflict | 资源冲突 | 同名资源已存在、更新版本冲突（resourceVersion 不匹配） |\n| 422 Unprocessable Entity | 语义正确但无法处理 | 镜像拉取失败、StorageClass 不支持扩容、PVC 容量小于当前使用量 |\n| 429 Too Many Requests | 请求频率超限 | API 调用频率超过配额 |\n| 500 Internal Server Error | 服务器内部错误 | API Server 或控制器异常 |\n| 503 Service Unavailable | 服务暂时不可用 | K8s API Server 不可达、依赖服务降级 |\n\n## 11. 竞品功能差异矩阵\n\n| 功能 | KubeSphere 4.2 | 灵雀云 ACP 3.0 | Kite | ANI M1 | ANI M2 | ANI M3 |\n|---|---|---|---|---|---|---|\n| Deployment 管理 | ✓ | ✓ | ✓ | ✓ | ✓ | ✓ |\n| StatefulSet 管理 | ✓ | ✓ | ✗ | ✓ | ✓ | ✓ |\n| DaemonSet 管理 | ✓ | ✓ | ✗ | ✓ | ✓ | ✓ |\n| Job/CronJob 管理 | ✓ | ✓ | ✗ | ✓ | ✓ | ✓ |\n| GPU 工作负载 | △（算力设备扩展） | ✓（MLOps） | ✗ | △（GPU容器独立模块） | ✓ | ✓ |\n| 多集群管理 | ✓（联邦+Solo） | ✓ | ✓ | ✗ | ✗ | △ |\n| Service（ClusterIP/NodePort/LoadBalancer） | ✓ | ✓ | ✓ | ✓ | ✓ | ✓ |\n| Ingress 路由 | ✓（三级网关） | ✓（AMP） | ✗ | ✗ | ✓ | ✓ |\n| ConfigMap/Secret | ✓ | ✓ | ✓ | ✓ | ✓ | ✓ |\n| PVC/PV/StorageClass | ✓ | ✓ | ✓ | ✓ | ✓ | ✓ |\n| 存储快照 | ✓ | ✓ | ✗ | ✗ | ✓ | ✓ |\n| HPA 水平伸缩 | ✓ | ✓ | ✗ | ✗ | ✓ | ✓ |\n| VPA 垂直伸缩 | ✓ | ✗ | ✗ | ✗ | ✓ | ✓ |\n| KEDA 事件驱动 | ✓ | ✗ | ✗ | ✗ | ✓ | ✓ |\n| 镜像仓库集成 | ✓ | ✓ | △（API 选择器） | ✓ | ✓ | ✓ |\n| 镜像安全扫描 | △（扩展组件） | ✓ | ✗ | ✗ | ✓ | ✓ |\n| 监控图表（CPU/内存/网络） | ✓（WhizardTelemetry） | ✓ | ✓（Prometheus） | ✓ | ✓ | ✓ |\n| 日志流式展示 | ✓ | ✓ | ✓ | ✓ | ✓ | ✓ |\n| 统一告警 | ✓ | ✓ | ✗ | ✗ | ✓ | ✓ |\n| Web 终端 | △（扩展组件） | ✗ | ✓（内置） | ✗ | ✓ | ✓ |\n| YAML 编辑 | ✓ | △（部分支持） | ✓（Monaco） | ✗ | ✓ | ✓ |\n| DevOps 流水线 | ✓（CI/CD+S2I/B2I） | ✓（开放式工具链） | ✗ | ✗ | ✓ | ✓ |\n| 应用市场（Helm） | ✓（OpenPitrix） | ✗ | ✓（Release 管理） | ✗ | ✓ | ✓ |\n| 微服务治理（Istio） | ✓ | ✓（双架构） | ✗ | ✗ | ✗ | ✓ |\n| 灰度发布 | ✓ | ✓ | ✗ | ✗ | ✗ | ✓ |\n| 链路追踪 | ✓ | ✗ | ✗ | ✗ | ✗ | ✓ |\n| 网络策略 | ✓（Calico+NP） | ✓ | ✗ | ✗ | ✗ | ✓ |\n| RBAC 细粒度权限 | ✓ | ✓ | ✓ | ✓ | ✓ | ✓ |\n| 审计日志 | ✓ | ✓ | △（审计日志） | ✓ | ✓ | ✓ |\n\n## 12. 用户故事与验收标准\n\n| Story ID | 用户故事 | 验收标准 | 关联需求 |\n|---|---|---|---|\n| US-CONTAINER-001 | 作为开发者，我希望通过向导快速创建一个 Deployment，填写名 eployment |\n\n---\n\n## 3. 信息架构 — 控制台页面层级\n\n```\nConsole\n └── 算力资源\n      └── 实例\n           ├── GPU 容器（列表页）\n           │    ├── 搜索/筛选：名称、命名空间、GPU 卡型、状态\n           │    ├── 列表列：名称 | 状态 | GPU 规格 | 副本数 | 镜像 | 创建时间 | 操作\n           │    └── 操作：创建 / 详情 / 扩缩容 / 更新 / 回滚 / 删除\n           │\n           ├── 创建 GPU 容器（向导页）\n           │    ├── 步骤 1：基本信息\n           │    │    ├── 实例名称\n           │    │    ├── 命名空间（项目）\n           │    │    ├── 工作负载类型：Deployment | StatefulSet | 守护进程集(DaemonSet) | 任务(Job/CronJob)\n           │    │    ├── 副本数量\n           │    │    └── 标签 / 注解\n           │    │\n           │    ├── 步骤 2：容器镜像与资源\n           │    │    ├── 镜像地址（支持公共镜像库 / 私有仓库）\n           │    │    ├── 镜像拉取策略：Always | IfNotPresent | Never\n           │    │    ├── 启动命令与参数\n           │    │    ├── GPU 资源规格\n           │    │    │    ├── GPU 调度模式：整卡独占 | 共享调度\n           │    │    │    ├── [整卡] GPU 卡型：不限制 | A100 | V100 | T4 | 昇腾NPU | 海光DCU\n           │    │    │    ├── [整卡] GPU 数量：1 / 2 / 4 / 8\n           │    │    │    ├── [共享] GPU 算力：10% ~ 100%（步长 5%）\n           │    │    │    ├── [共享] GPU 显存：≥ 1 GiB（步长 1 GiB）\n           │    │    │    ├── [共享] 分配策略：固定配额 | 可争抢 | 纯争抢\n           │    │    │    └── [共享] 多卡共享：开启/关闭\n           │    │    ├── CPU 资源：request / limit\n           │    │    └── 内存资源：request / limit\n           │    │\n           │    ├── 步骤 3：网络与端口\n           │    │    ├── 网络平面：租户VPC | 基础网络 | 存储网络 | 管理网络\n           │    │    ├── 端口映射：容器端口 → 服务端口，协议(TCP/UDP)\n           │    │    └── 服务类型：ClusterIP | NodePort | LoadBalancer\n           │    │\n           │    ├── 步骤 4：存储挂载\n           │    │    ├── 持久卷声明（PVC）：选择已有 / 新建\n           │    │    ├── 挂载路径\n           │    │    ├── 临时存储（emptyDir）\n           │    │    └── 主机路径（hostPath）\n           │    │\n           │    ├── 步骤 5：环境变量与配置\n           │    │    ├── 环境变量：键值对 / 引用 ConfigMap / 引用 Secret\n           │    │    ├── 保密字典挂载\n           │    │    └── 配置字典挂载\n           │    │\n           │    ├── 步骤 6：健康检查与生命周期\n           │    │    ├── 存活探针（Liveness）：HTTP | TCP | 命令\n           │    │    ├── 就绪探针（Readiness）：HTTP | TCP | 命令\n           │    │    ├── 启动探针（Startup）\n           │    │    ├── 启动后回调（PostStart）\n           │    │    └── 停止前回调（PreStop）\n           │    │\n           │    └── 步骤 7：高级配置\n           │         ├── 节点亲和性 / 反亲和性\n           │         ├── GPU 拓扑感知调度（开启/关闭，建议性功能，需确认 HAMi/Volcano 可行性）\n           │         ├── 容忍（Tolerations）\n           │         ├── 安全上下文（runAsUser/fsGroup）\n           │         └── 日志采集配置\n           │\n           ├── GPU 容器详情页\n           │    ├── 基本信息 Tab：名称、命名空间、状态、创建时间\n           │    ├── Pod 列表 Tab：Pod 名称 | 节点 | IP | 状态 | 重启次数\n           │    ├── GPU 监控 Tab：GPU 利用率 | 显存使用 | 算力使用 | 温度\n           │    ├── 事件 Tab：K8s Events\n           │    ├── 日志 Tab：实时日志流\n           │    ├── 版本历史 Tab：Revision | 镜像 | 更新时间 | 操作(回滚)\n           │    └── 操作：扩缩容 | 滚动更新 | 回滚 | 重启 | 删除\n           │\n           └── GPU 资源总览（Dashboard）\n                ├── GPU 节点概览：节点数 | GPU 总卡数 | 已分配 | 可用\n                ├── GPU 利用率排行\n                └── GPU 实例分布（按命名空间 / 卡型）\n```\n\n---\n\n## 4. API 请求参数设计\n\n### 4.1 创建 GPU 容器实例 (POST /api/v1/gpu-containers)\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|------|------|-------|-------------|\n| Method | string | POST | 必填；HTTP 方法 |\n| URL | string | /api/v1/gpu-containers | 必填；请求 URL |\n| name | String | `\"my-gpu-app\"` | GPU 容器实例名称，需符合 K8s 资源命名规范（小写字母、数字、连字符，最长 63 字符） |\n| namespace | String | `\"default\"` | 命名空间 / 项目 ID |\n| workload_type | String | `\"Deployment\"` | 工作负载类型：Deployment / StatefulSet / DaemonSet / Job / CronJob |\n| replicas | Integer | `2` | 副本数量，默认 1，范围 1~100 |\n| labels | Object | `{\"app\":\"nginx\"}` | 标签键值对 |\n| annotations | Object | `{\"desc\":\"推理服务\"}` | 注解键值对 |\n| image | String | `\"nvcr.io/nim/meta/llama3:1.0\"` | 容器镜像地址 |\n| image_pull_policy | String | `\"IfNotPresent\"` | 镜像拉取策略：Always / IfNotPresent / Never |\n| image_pull_secrets | String[] | `[\"regcred\"]` | 私有镜像仓库拉取凭据名称列表 |\n| command | String[] | `[\"/bin/bash\"]` | 容器启动命令 |\n| args | String[] | `[\"-c\",\"python app.py\"]` | 容器启动命令参数 |\n| working_dir | String | `\"/app\"` | 容器工作目录 |\n| gpu_mode | String | `\"exclusive\"` | GPU 调度模式：exclusive（整卡独占）/ shared（共享调度） |\n| gpu_model | String | `\"A100\"` | GPU 卡型，传空表示不限制。可选：A100 / V100 / T4 / Ascend910B / HygonDCU |\n| gpu_count | Integer | `1` | [gpu_mode=exclusive] GPU 整卡数量，范围 1~8 |\n| gpu_core_percent | Integer | `30` | [gpu_mode=shared] GPU 算力百分比，范围 10~100，步长 5 |\n| gpu_memory_gib | Integer | `4` | [gpu_mode=shared] GPU 显存大小（GiB），最小 1，步长 1 |\n| gpu_share_policy | String | `\"guaranteed\"` | [gpu_mode=shared] 共享分配策略：guaranteed（固定配额）/ burstable（可争抢）/ best_effort（纯争抢） |\n| gpu_multi_card_share | Boolean | `false` | [gpu_mode=shared] 是否启用多卡共享 |\n| cpu_request | String | `\"4\"` | CPU 请求量（核），支持小数 |\n| cpu_limit | String | `\"8\"` | CPU 限制量（核），支持小数 |\n| memory_request | String | `\"16Gi\"` | 内存请求量 |\n| memory_limit | String | `\"32Gi\"` | 内存限制量 |\n| network_plane | String | `\"tenant_vpc\"` | 网络平面类型：tenant_vpc / foundation_mesh / storage / management |\n| ports | Object[] | `[{\"name\":\"http\",\"containerPort\":8080,\"protocol\":\"TCP\"}]` | 容器端口列表，每个元素含 name / containerPort / protocol |\n| service_type | String | `\"ClusterIP\"` | Service 暴露类型：ClusterIP / NodePort / LoadBalancer |\n| service_ports | Object[] | `[{\"port\":80,\"targetPort\":8080,\"protocol\":\"TCP\"}]` | Service 端口映射 |\n| volumes | Object[] | `[{\"name\":\"data\",\"type\":\"pvc\",\"pvcName\":\"my-pvc\",\"mountPath\":\"/data\"}]` | 存储卷挂载列表，type 可选：pvc / emptyDir / hostPath / configMap / secret |\n| env | Object[] | `[{\"name\":\"MODEL_PATH\",\"value\":\"/models/llama3\"}]` | 环境变量列表，value 直接赋值 |\n| env_from_configmap | String[] | `[\"app-config\"]` | 从 ConfigMap 注入环境变量的名称列表 |\n| env_from_secret | String[] | `[\"db-cred\"]` | 从 Secret 注入环境变量的名称列表 |\n| liveness_probe | Object | `{\"type\":\"httpGet\",\"path\":\"/health\",\"port\":8080}` | 存活探针配置，type：httpGet / tcpSocket / exec |\n| readiness_probe | Object | `{\"type\":\"httpGet\",\"path\":\"/ready\",\"port\":8080}` | 就绪探针配置 |\n| startup_probe | Object | `{\"type\":\"tcpSocket\",\"port\":8080}` | 启动探针配置 |\n| lifecycle | Object | `{\"postStart\":{\"exec\":{\"command\":[\"echo\",\"started\"]}},\"preStop\":{\"exec\":{\"command\":[\"sleep\",\"30\"]}}}` | 生命周期钩子 |\n| node_selector | Object | `{\"gpu-type\":\"nvidia-a100\"}` | 节点选择器 |\n| node_affinity | Object | — | 节点亲和性规则（完整 K8s NodeAffinity 结构） |\n| tolerations | Object[] | — | 容忍规则列表（完整 K8s Toleration 结构） |\n| gpu_topology_aware | Boolean | `false` | 是否开启 GPU 拓扑感知调度（建议性功能，需与基础设施团队确认可行性） |\n| gpu_scheduler | String | `\"volcano\"` | GPU 调度器：volcano / default-scheduler |\n| security_context | Object | `{\"runAsUser\":1000,\"fsGroup\":2000}` | 安全上下文配置 |\n| log_enabled | Boolean | `true` | 是否开启日志采集 |\n| description | String | `\"Llama3-8B 推理服务\"` | 实例描述 |\n\n### 4.2 查询 GPU 容器列表 (GET /api/v1/gpu-containers)\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | t | fixed-share / guaranteed-burst-share / native-burst-share | share-pool / static | 三档策略对齐行业实践，术语更白话 |\n| **GPU 卡型** | Nvidia 全系 + 昇腾NPU + 海光DCU | Nvidia 系列 | Nvidia GU8TF / GU8TEF / L20 / L20X / P16EN / T4 / A10 / G28Ti / G49E / G59 / L20N / L20NE 共 12 种规格族 | ANI 信创适配是核心差异化 |\n| **网络平面** | tenant_vpc / foundation_mesh / storage / management | VPC-CNI / Flannel | VPC | ANI 四网络平面为自身架构强制约束（ANI-05），非竞品对标结果 |\n| **工作负载类型** | Deployment + StatefulSet + DaemonSet + Job/CronJob，统一创建向导 | Deployment + StatefulSet | Deployment + StatefulSet（ACS 因 Serverless 形态不支持 DaemonSet） | ANI 将多种工作负载整合进同一向导，降低认知负担；竞品（ACK/VKE 托管集群）也支持 DaemonSet+GPU，差异在管理入口的统一性 |\n| **GPU 调度器** | volcano / default | volcano 集成 | 自定义 scheduler | ANI 显式暴露调度器选择，支持 Volcano |\n| **拓扑感知** | gpu_topology_aware 开关（**建议性功能**） | Binpack/Spread | 部分支持 | ANI 将拓扑感知抽象为布尔开关；当前调研未在 HAMi/Volcano 中找到显式的 NVLINK 亲和调度，需与基础设施团队确认可行性 |\n| **QoS** | 通过 gpu_share_policy 隐式控制 | 节点标签配置 | default / best-effort 显式选择 | ANI 将 QoS 融入共享策略，减少概念暴露 |\n\n---\n\n## 6. 信息架构设计原则\n\n1. **屏蔽 K8s 复杂性**：GPU 容器向导页将 Deployment YAML 的 100+ 字段收敛为 7 步骤约 40 个可配置项，业务人员无需理解 K8s 概念即可完成部署。\n\n2. **GPU 资源为一级概念**：GPU 规格（模式、卡型、数量/算力）独立为步骤 2 的核心子区块，突出其与普通容器的差异。\n\n3. **信创友好**：GPU 卡型下拉框默认并列展示 Nvidia 系列与国产 GPU（昇腾/海光），消除国产硬件的\"二等公民\"感知。\n\n4. **架构一致性**：所有 ANI 实例类型必须声明 `network_plane`（架构强制），GPU 容器不例外。\n\n5. **渐进披露**：GPU 拓扑感知、节点亲和性等高级配置放在\"高级配置\"可折叠区域，P0 用户无需感知。\n\n6. **监控先行**：GPU 容器详情页的 GPU 监控 Tab 提供利用率/显存/算力/温度，呼应 M1-INSTANCE-V 的\"GPU 调度原因/利用率展示\"需求。\n\n---\n\n## 7. API 响应状态码约定\n\n| 状态码 | 含义 |\n|--------|------|\n| 201 | 创建成功，返回实例 ID 与完整配置 |\n| 200 | 查询/更新/回滚成功 |\n| 202 | 异步操作已接受（如扩缩容中） |\n| 204 | 删除成功 |\n| 400 | 请求参数校验失败 |\n| 404 | 实例不存在 |\n| 409 | 状态冲突（如对正在回滚的实例再次发起回滚） |\n| 422 | GPU 资源不足 |\n| 500 | 服务端错误 |\n\n---\n\n*文档版本：v1.0.0-draft | 基于火山引擎 VKE / 阿里云 ACS / 华为云 CCI 调研及 ANI 架构约束*  \n*下一步建议：确认 API 参数后，可继续定义各接口的 Request Body JSON Schema 与响应结构*\n*（内容由AI生成，仅供参考）*\n","Sandbox_功能信息架构与API设计.md":"---\nAIGC:\n    Label: \"1\"\n    ContentProducer: 001191440300708461136T 开披露（注：火山方舟平台另有任务级动态网络隔离能力，非 veFaaS 云沙箱自身功能） | Flannel / Terway（部分模式） | VPC 网络 |\n| **核心场景** | RL 训练、AI Agent 代码执行 | 不可信应用隔离、多租户、故障隔离 | Serverless 容器、AI 训练推理、批量计算 |\n| **模板/镜像** | Code / Browser / Computer 三种开箱即用模板 + 自定义镜像 | 标准容器镜像 | 标准容器镜像 |\n| **生命周期** | 沙箱应用 → 沙箱实例，支持自定义存活时长 | Pod 生命周期（Deployment/StatefulSet） | Pod 生命周期 |\n| **监控** | 未公开披露（注：火山方舟平台另有沙箱异常连接/登录/逃逸检测能力，非 veFaaS 云沙箱自身功能） | 缺失安全沙箱 Pod 磁盘和网络监控 | 容器状态监控 |\n| **GPU 支持** | 未明确 | 官方文档未涉及 GPU 能力，裸金属规格限制隐含 GPU 沙箱场景受限 | 支持 GPU 直通 |\n\n### 2.1 三种主流沙箱技术对比\n\n> **数据来源说明**：以下对比数据综合自社区技术分析文章（kaiyuanapp.cn, 2026-02）及各项目官方文档（gvisor.dev、katacontainers.io），非厂商官方基准测试报告，数据值存在版本差异，仅供参考。\n\n| 维度 | Kata Containers | gVisor | Firecracker |\n|------|----------------|--------|-------------|\n| **隔离技术** | 硬件虚拟化（KVM/QEMU） | 用户态内核拦截（Sentry） | 极简硬件虚拟化（KVM） |\n| **安全性** | 极高（VM 级隔离） | 高（减少攻击面） | 极高（极简 VMM） |\n| **性能损耗** | 低（计算），中（I/O） | 高（系统调用频繁时） | 极低 |\n| **启动时间** | ~100-200ms | < 1s | < 150ms |\n| **内存足迹** | 15-80MB/Pod | 适中 | 约 5MB/实例 |\n| **应用兼容性** | 优秀（完整 Linux 内核） | 一般（部分系统调用不兼容） | 良好（设备支持少，FaaS 优化） |\n| **典型场景** | 多租户云、Serverless、CI/CD | 高密度微服务、嵌套虚拟化 | FaaS、边缘计算 |\n| **K8s 集成** | RuntimeClass 深度集成 | RuntimeClass 深度集成 | 通常作为底层引擎被集成 |\n\n---\n\n## 3. 信息架构 — 控制台页面层级\n\n```\nConsole\n └── 算力资源\n      └── 实例\n           ├── Sandbox（列表页）\n           │    ├── 搜索/筛选：名称、命名空间、隔离级别、状态\n           │    ├── 列表列：名称 | 状态 | 隔离级别 | 运行时 | 镜像 | 创建时间 | 存活时长 | 操作\n           │    └── 操作：创建 / 详情 / 延长存活 / 销毁\n           │\n           ├── 创建 Sandbox（向导页）\n           │    ├── 步骤 1：基本信息\n           │    │    ├── 实例名称\n           │    │    ├── 命名空间（项目）\n           │    │    ├── 实例数量\n           │    │    ├── 标签 / 注解\n           │    │    └── 描述\n           │    │\n           │    ├── 步骤 2：沙箱镜像与模板\n           │    │    ├── 镜像来源：公共模板 | 自定义镜像\n           │    │    ├── [公共模板] 模板类型：Code（代码执行）| Browser（浏览器自动化）| Computer（桌面操作）| Custom（自定义）\n           │    │    ├── [自定义] 镜像地址\n           │    │    ├── 镜像拉取策略：Always | IfNotPresent | Never\n           │    │    ├── 镜像拉取凭据\n           │    │    └── 启动命令与参数\n           │    │\n           │    ├── 步骤 3：隔离与安全配置\n           │    │    ├── 隔离级别：标准容器（runC）| 进程级隔离（gVisor）| 内核级隔离（Kata MicroVM）\n           │    │    ├── [内核级] Hypervisor 类型：Firecracker | Cloud Hypervisor | QEMU\n           │    │    ├── 网络策略：完全隔离 | 仅出站 | 指定 CIDR 白名单 | 继承命名空间策略\n           │    │    ├── 出站域名白名单\n           │    │    ├── 文件系统权限：只读根文件系统 | 可写\n           │    │    ├── 系统调用过滤（Seccomp Profile）：默认 | 严格 | 自定义\n           │    │    ├── 特权模式：开启/关闭（默认关闭）\n           │    │    └── 主机路径挂载：禁止 | 只读 | 读写\n           │    │\n           │    ├── 步骤 4：资源配置\n           │    │    ├── CPU 资源：request / limit\n           │    │    ├── 内存资源：request / limit\n           │    │    ├── GPU 资源（可选）：卡型 / 数量 / 共享算力\n           │    │    ├── 临时存储（Ephemeral Storage）\n           │    │    └── 实例存活时长：按需（手动销毁）| 定时（1h / 6h / 24h / 自定义）\n           │    │\n           │    ├── 步骤 5：存储挂载\n           │    │    ├── 持久卷声明（PVC）：选择已有 / 新建\n           │    │    ├── 挂载路径\n           │    │    ├── 临时存储（emptyDir）\n           │    │    └── 保密字典 / 配置字典挂载\n           │    │\n           │    ├── 步骤 6：环境变量与配置\n           │    │    ├── 环境变量：键值对 / 引用 ConfigMap / 引用 Secret\n           │    │    └── 实例元信息（Label，用于关联用户会话/存储自定义数据）\n           │    │\n           │    └── 步骤 7：高级配置\n           │         ├── 节点亲和性 / 反亲和性\n           │         ├── 容忍（Tolerations）\n           │         ├── 安全上下文（runAsUser / fsGroup / seLinuxOptions）\n           │         ├── 日志采集配置\n           │         └── 会话保持（多请求共享同一沙箱实例）\n           │\n           ├── Sandbox 详情页\n           │    ├── 基本信息 Tab：名称、命名空间、隔离级别、运行时、状态、创建时间、存活时长\n           │    ├── 安全态势 Tab：容器逃逸检测 | 异常连接告警 | 异常登录告警 | 系统调用审计\n           │    ├── 资源监控 Tab：CPU / 内存 / 磁盘 / 网络 IO\n           │    ├── 事件 Tab：K8s Events + 安全事件\n           │    ├── 日志 Tab：实时日志流\n           │    └── 操作：延长存活 | 暂停/恢复 | 销毁\n           │\n           └── Sandbox 安全总览（Dashboard）\n                ├── 安全态势概览：活跃沙箱数 | 安全事件数 | 逃逸检测数\n                ├── 安全事件趋势图（按时间）\n                ├── 风险沙箱 Top N\n                └── 隔离级别分布（runC / gVisor / Kata）\n```\n\n---\n\n## 4. API 请求参数设计\n\n### 4.1 创建 Sandbox 实例 (POST /api/v1/sandboxes)\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n| Name | Type | Value | Description |\n|------|------|-------|-------------|\n| Method | string | POST | 必填；HTTP 方法 |\n| URL | string | /api/v1/sandboxes | 必填；请求 URL |\n| name | String | `\"my-sandbox\"` | Sandbox 实例名称，需符合 K8s 资源命名规范（小写字母、数字、连字符，最长 63 字符） |\n| namespace | String | `\"default\"` | 命名空间 / 项目 ID |\n| replicas | Integer | `1` | 实例数量，默认 1，范围 1~50 |\n| labels | Object | `{\"app\":\"code-executor\"}` | 标签键值对 |\n| annotations | Object | `{\"desc\":\"用户代码执行沙箱\"}` | 注解键值对 |\n| description | String | `\"Python 代码执行环境\"` | 实例描述 |\n| image_source | String | `\"template\"` | 镜像来源：template（公共模板）/ custom（自定义镜像） |\n| template_type | String | `\"code\"` | [image_source=template] 模板类型：code（代码执行）/ browser（浏览器自动化）/ computer（桌面操作）/ custom（自定义） |\n| image | String | `\"ani-registry/sandbox-python:3.11\"` | [image_source=custom] 容器镜像地址 |\n| image_pull_policy | String | `\"IfNotPresent\"` | 镜像拉取策略：Always / IfNotPresent / Never |\n| image_pull_secrets | String[] | `[\"regcred\"]` | 私有镜像仓库拉取凭据名称列表 |\n| command | String[] | `[\"/bin/bash\"]` | 容器启动命令 |\n| args | String[] | `[\"-c\",\"python sandbox_server.py\"]` | 容器启动命令参数 |\n| working_dir | String | `\"/workspace\"` | 容器工作目录 |\n| isolation_level | String | `\"kata\"` | 隔离级别：runc（标准容器）/ gvisor（进程级隔离）/ kata（内核级隔离，MicroVM） |\n| hypervisor | String | `\"firecracker\"` | [isolation_level=kata] Hypervisor 类型：firecracker / cloud_hypervisor / qemu |\n| network_policy | String | `\"namespace_default\"` | 网络策略：isolated（完全隔离）/ egress_only（仅出站）/ cidr_whitelist（CIDR 白名单）/ namespace_default（继承命名空间策略） |\n| egress_cidr_whitelist | String[] | `[\"10.0.0.0/8\"]` | [network_policy=cidr_whitelist] 出站 CIDR 白名单 |\n| egress_domain_whitelist | String[] | `[\"api.example.com\"]` | 出站域名白名单 |\n| read_only_rootfs | Boolean | `true` | 是否只读根文件系统，默认 true |\n| seccomp_profile | String | `\"default\"` | Seccomp 系统调用过滤策略：default（默认）/ strict（严格）/ custom（自定义） |\n| seccomp_profile_content | String | — | [seccomp_profile=custom] 自定义 Seccomp Profile JSON 内容 |\n| privileged | Boolean | `false` | 是否特权模式，默认 false |\n| host_path_policy | String | `\"deny\"` | 主机路径挂载策略：deny（禁止）/ readonly（只读）/ readwrite（读写） |\n| cpu_request | String | `\"2\"` | CPU 请求量（核），支持小数 |\n| cpu_limit | String | `\"4\"` | CPU 限制量（核），支持小数 |\n| memory_request | String | `\"4Gi\"` | 内存请求量 |\n| memory_limit | String | `\"8Gi\"` | 内存限制量 |\n| gpu_enabled | Boolean | `false` | 是否启用 GPU |\n| gpu_model | String | `\"T4\"` | [gpu_enabled=true] GPU 卡型，传空表示不限制 |\n| gpu_count | Integer | `1` | [gpu_enabled=true] GPU 数量，范围 1~4 |\n| gpu_core_percent | Integer | — | [gpu_enabled=true] GPU 共享算力百分比，范围 10~100，步长 5。不传表示整卡独占 |\n| gpu_memory_gib | Integer | — | [gpu_enabled=true] GPU 共享显存（GiB），最小 1，步长 1 |\n| ephemeral_storage | String | `\"10Gi\"` | 临时存储大小 |\n| ttl_seconds | Integer | `3600` | 实例存活时长（秒），0 表示按需手动销毁。预设：3600（1h）/ 21600（6h）/ 86400（24h） |\n| volumes | Object[] | `[{\"name\":\"data\",\"type\":\"pvc\",\"pvcName\":\"my-pvc\",\"mountPath\":\"/data\"}]` | 存储卷挂载列表，type 可选：pvc / emptyDir / configMap / secret |\n| env | Object[] | `[{\"name\":\"PYTHON_VERSION\",\"value\":\"3.11\"}]` | 环境变量列表 |\n| env_from_configmap | String[] | `[\"sandbox-config\"]` | 从 ConfigMap 注入环境变量的名称列表 |\n| env_from_secret | String[] | `[\"sandbox-cred\"]` | 从 Secret 注入环境变量的名称列表 |\n| instance_metadata | Object | `{\"user_id\":\"2100******\"}` | 实例元信息（Label），用于关联用户会话或存储自定义数据 |\n| node_selector | Object | `{\"sandbox-type\":\"kata\"}` | 节点选择器 |\n| node_affinity | Object | — | 节点亲和性规则（完整 K8s NodeAffinity 结构） |\n| tolerations | Object[] | — | 容忍规则列表（完整 K8s Toleration 结构） |\n| security_context | Object | `{\"runAsUser\":1000,\"fsGroup\":2000}` | 安全上下文配置 |\n| session_affinity | Boolean | `false` | 是否启用会话保持（多请求共享同一沙箱实例） |\n| log_enabled | Boolean | `true` | 是否开启日志采集 |\n| security_monitoring | Boolean | `true` | 是否开启安全监控（容器逃逸检测、异常连接/登录告警） |\n\n### 4.2 查询 Sandbox 列表 (GET /api/v1/sandboxes)\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|------|------|-------|-------------|\n| Method | string | GET | 必填；HTTP 方法 |\n| URL | string | /api/v1/sandboxes | 必填；请求 URL |\n| namespace | String | `\"default\"` | 命名空间筛选 |\n| name | String | `\"my-sandbox\"` | 实例名称模糊搜索 |\n| isolation_level | String | `\"kata\"` | 隔离级别筛选：runc / gvisor / kata |\n| template_type | String | `\"code\"` | 模板类型筛选：code / browser / computer / custom |\n| status | String | `\"Running\"` | 实例状态筛选：Pending / Running / Succeeded / Failed / Unknown / Terminated |\n| labels | String | `\"app=code-executor\"` | 标签筛选（key=value 格式，逗号分隔多组） |\n| instance_metadata | String | `\"user_id=2100******\"` | 实例元信息筛选 |\n| page | Integer | `1` | 页码 |\n| page_size | Integer | `20` | 每页条数，最大 100 |\n| sort_by | String | `\"created_at\"` | 排序字段：name / created_at / ttl_seconds |\n| sort_order | String | `\"desc\"` | 排序方向：asc / desc |\n\n### 4.3 查询 Sandbox 详情 (GET /api/v1/sandboxes/{id})\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- 置复杂度 |\n| **模板体系** | Code / Browser / Computer / Custom 四类模板 | Code / Browser / Computer 三类 | 无（标准容器镜像） | ANI 对齐火山引擎模板体系，增加 Custom 模板支持企业自定义 |\n| **存活时长** | 按需 + 定时（1h/6h/24h/自定义）+ 可延长 | 实例生命周期时长，超时销毁 | Pod 生命周期 | ANI 增加延长机制，适配长周期 AI 训练/调试场景 |\n| **安全监控** | 容器逃逸检测 + 异常连接/登录 + 系统调用审计 | 未公开披露（注：火山方舟另有此能力，非 veFaaS 沙箱） | 缺失安全沙箱 Pod 磁盘和网络监控 | ANI 安全监控维度补齐友商短板，内建安全可观测 |\n| **GPU 支持** | 支持 GPU 直通 + 共享调度 | 未明确 | 安全沙箱节点池仅裸金属，GPU 支持受限 | ANI 在安全沙箱中支持 GPU，覆盖 AI 推理沙箱化场景 |\n| **会话保持** | session_affinity 开关 | 支持有状态（请求共享同一沙箱） | 不支持 | ANI 对齐火山引擎有状态沙箱能力 |\n| **暂停/恢复** | 支持内存快照暂停恢复（Kata 级别） | 不支持 | 不支持 | ANI 差异化能力，降低长周期沙箱的空转成本 |\n| **文件系统** | 只读根文件系统（默认）+ 主机路径挂载策略 | 未明确 | 标准容器文件系统 | ANI 默认只读根文件系统，强化安全基线 |\n\n---\n\n## 6. 信息架构设计原则\n\n1. **安全默认值（Secure by Default）**：只读根文件系统、禁止特权模式、禁止主机路径挂载、默认开启安全监控——所有安全开关默认处于最严格位置，用户需主动放宽。\n\n2. **隔离梯度可视化**：三级隔离（runC → gVisor → Kata）在创建向导中以安全-性能光谱形式呈现，帮助非安全专家做出合理选择。\n\n3. **模板降低门槛**：Code / Browser / Computer 三类开箱即用模板，用户无需理解镜像构建即可快速创建沙箱。\n\n4. **生命周期灵活**：支持按需（手动销毁）、定时（自动过期）、延长三种模式，覆盖从短周期代码执行到长周期训练调试的全场景。\n\n5. **安全态势可观测**：详情页独立\"安全态势\"Tab + Dashboard 安全总览，将容器逃逸、异常连接等安全事件从 K8s Events 中提升为一级信息。\n\n6. **架构一致性**：所有 ANI 实例类型必须声明 `network_plane`（架构强制），Sandbox 在此基础上叠加网络隔离策略。\n\n7. **GPU 沙箱化**：支持在 Kata MicroVM 中直通 GPU，解决 AI 推理场景中\"既要 GPU 算力、又要安全隔离\"的矛盾需求。\n\n---\n\n## 7. API 响应状态码约定\n\n| 状态码 | 含义 |\n|--------|------|\n| 201 | 创建成功，返回实例 ID 与完整配置 |\n| 200 | 查询/更新/延长/暂停/恢复成功 |\n| 202 | 异步操作已接受（如批量创建） |\n| 204 | 销毁成功 |\n| 400 | 请求参数校验失败 |\n| 404 | 实例不存在 |\n| 409 | 状态冲突（如对已销毁的实例执行延长） |\n| 422 | 资源不足（如无可用的 Kata 节点） |\n| 423 | 实例已锁定（安全事件触发自动冻结） |\n| 500 | 服务端错误 |\n\n---\n\n*文档版本：v1.0.0-draft | 基于火山引擎 veFaaS 云沙箱 / 阿里云 ACK 安全沙箱 v2 / 华为云 CCI Kata 容器调研及 ANI 架构约束*  \n*下一步建议：确认 API 参数后，可继续定义各接口的 Request Body JSON Schema 与响应结构*\n*（内容由AI生成，仅供参考）*\n*（内容由AI生成，仅供参考）*\n","docs/知识库-功能与API.md":"# 知识库（Knowledge Base）模块：功能与 API（对齐推理服务规范）\n\n## 0. 统一规范（与推理服务一致）\n\n### 0.1 统一请求头（必填/推荐）\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Authorization | string | Bearer eyJ... | 必填；身份鉴权（JWT/OAuth） |\n| X-Tenant-Id | string | t-demo | 必填；租户标识（建议由网关注入或从 JWT claim 解析） |\n| X-Project-Id | string | p-demo | 可选；项目/空间标识 |\n| X-Request-Id | string | req-20260605-001 | 必填；请求唯一标识（用于排障、审计关联） |\n| X-Idempotency-Key | string | idem-20260605-001 | 可选；幂等键（创建/更新/删除/重试等写操作建议必填） |\n\n### 0.2 统一分页与排序（Query）\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| pageNo | integer | 1 | 可选；页码（从 1 开始） |\n| pageSize | integer | 20 | 可选；页大小（建议默认 20，最大 200） |\n| sortBy | string | createdAt | 可选；排序字段（不同接口支持字段不同，建议白名单） |\n| sortOrder | enum(string) | desc | 可选；排序方向：asc / desc |\n\n### 0.3 统一响应结构（建议）\n\n```json\n{\n  \"requestId\": \"req-20260605-001\",\n  \"code\": \"OK\",\n  \"message\": \"success\",\n  \"data\": {}\n}\n```\n\n### 0.4 统一错误码（建议最小集合）\n\n| Code | HTTP Status | Description |\n|---|---:|---|\n| OK | 200 | 成功 |\n| INVALID_ARGUMENT | 400 | 参数校验失败（需返回字段级错误） |\n| UNAUTHENTICATED | 401 | 未认证/Token 过期 |\n| PERMISSION_DENIED | 403 | 无权限 |\n| NOT_FOUND | 404 | 资源不存在 |\n| CONFLICT | 409 | 冲突（重名、状态冲突等） |\n| PRECONDITION_FAILED | 412 | 前置条件不满足（状态不允许、依赖未解除） |\n| RATE_LIMITED | 429 | 频率限制触发 |\n| INTERNAL_ERROR | 500 | 后端内部错误 |\n\n字段级错误（建议）：\n\n```json\n{\n  \"requestId\": \"req-20260605-001\",\n  \"code\": \"INVALID_ARGUMENT\",\n  \"message\": \"validation failed\",\n  \"details\": [\n    { \"field\": \"topK\", \"reason\": \"must be between 1 and 50\" }\n  ]\n}\n```\n\n---\n\n## 1. 模块概述\n\n知识库模块用于把企业知识文档转化为可检索的向量索引，并在问答场景中实现“检索增强生成（RAG）”。它与【推理服务】模块的关系如下：\n\n- 知识库检索：依赖向量存储/向量索引能力（可由平台托管或外部向量库实现）\n- Embedding：需要一个 Embedding 模型（可来自模型中心 + 推理服务或平台内置）\n- 生成回答：需要一个文本生成类推理服务（LLM 服务），通常由【推理服务】提供\n\n核心对象：\n- KnowledgeBase（kb）：知识库实体（名称、描述、参数、权限）\n- Document（doc）：文档实体（文件、解析状态、切片信息）\n- Chunk（chunk）：切片（可选展示）\n- Index（index）：索引构建与版本（可选）\n- QASession / QARequest：问答会话/请求（可选）\n\n---\n\n## 2. 核心功能清单（企业级）\n\n### 2.1 知识库生命周期\n- 创建知识库：选择 Embedding 模型、chunk 策略、召回参数、权限设置\n- 编辑知识库：更新名称/描述/召回参数；涉及索引参数变更时触发重建提示\n- 删除知识库：校验是否存在在用应用/问答会话引用（可选），支持 validateOnly\n\n### 2.2 文档管理（上传、解析、索引）\n- 文档上传：支持多文件批量、目录上传（可选），支持对象存储直传（推荐）\n- 解析与切片：支持解析进度、失败原因、重试\n- 索引构建：解析完成后入库向量；支持全量重建/增量更新（按实现）\n- 删除文档：删除后触发索引更新（或延迟清理）\n\n### 2.3 问答测试（RAG）\n- 基于知识库的检索：TopK、ScoreThreshold、过滤器、文档范围限定\n- 生成回答：调用推理服务（LLM），支持流式输出\n- 可解释性：展示命中文档、页码、相似度、引用片段、token 与耗时\n\n### 2.4 异常处理与恢复\n- 解析失败：失败原因标准化（格式不支持/解析超时/内容为空/权限/存储失败）\n- 索引失败：向量库不可用/Embedding 调用失败/配额不足\n- 问答失败：上游推理服务不可达/超时/限流/鉴权失败\n\n### 2.5 权限控制（对齐推理服务）\n\n建议角色：\n- Viewer：只读查看知识库与文档，允许问答测试（可选）\n- Developer：创建/上传/重试解析，允许导出（可选）\n- Owner：删除知识库、调整权限、触发重建\n- Admin：跨项目管理与审计\n\n关键操作需要审计：创建/删除知识库、上传/删除文档、重建索引、问答测试（可选记录摘要）\n\n---\n\n## 3. 详细操作流程（关键路径）\n\n### 3.1 创建知识库\n1) 填写名称/描述、选择 Embedding 模型（或 embeddingServiceId）\n2) 设置 chunk 参数（chunkSize、chunkOverlap）\n3) 设置默认召回参数（topK、scoreThreshold）\n4) 保存后进入知识库详情，提示“上传文档”\n\n前置校验（建议）：\n- 名称唯一（项目内唯一）\n- Embedding 模型可用（ready）或 embeddingServiceId 状态 running\n- chunkSize 范围合法（例如 128~4096）\n\n### 3.2 上传文档并完成索引\n1) 选择文件（校验格式/大小）\n2) 上传（推荐对象存储预签名直传）\n3) 解析与切片进度展示\n4) 索引完成后文档状态为 ready\n\n### 3.3 问答测试\n1) 输入问题，选择是否流式、topK、scoreThreshold\n2) 检索向量库，拿到候选 chunk\n3) 组合 Prompt（含引用片段）并调用推理服务生成回答\n4) 渲染回答与引用来源\n\n---\n\n## 4. 全量 API 接口文档\n\n### 4.1 知识库（KnowledgeBase）接口\n\n#### 4.1.1 查询知识库列表\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | GET | 必填；HTTP 方法 |\n| URL | string | /api/v1/knowledge-bases | 必填；请求 URL |\n| keyword | string | finance | 可选；名称/描述关键字 |\n| status | array<enum(string)> | [\"active\"] | 可选；active / rebuilding / deleted |\n| createdBy | string | u-123 | 可选；创建人过滤 |\n| createdAtStart | string | 2026-06-01T00:00:00Z | 可选；创建时间起（ISO8601） |\n| createdAtEnd | string | 2026-06-05T00:00:00Z | 可选；创建时间止（ISO8601） |\n| pageNo | integer | 1 | 可选；页码（从 1 开始） |\n| pageSize | integer | 20 | 可选；页大小（建议最大 200） |\n| sortBy | string | updatedAt | 可选；createdAt / updatedAt / name |\n| sortOrder | enum(string) | desc | 可选；asc / desc |\n\n请求示例：\n\n```http\nGET /api/v1/knowledge-bases?pageNo=1&pageSize=20&status=active HTTP/1.1\nAuthorization: Bearer eyJ...\nX-Tenant-Id: t-demo\nX-Request-Id: req-20260605-001\n```\n\n响应示例：\n\n```json\n{\n  \"requestId\": \"req-20260605-001\",\n  \"code\": \"OK\",\n  \"message\": \"success\",\n  \"data\": {\n    \"items\": [\n      {\n        \"kbId\": \"kb-1a2b\",\n        \"name\": \"finance-kb\",\n        \"displayName\": \"财务知识库\",\n        \"status\": \"active\",\n        \"docCount\": 128,\n        \"failedDocs\": 2,\n        \"embedding\": { \"mode\": \"service\", \"embeddingServiceId\": \"svc-emb-1\" },\n        \"createdAt\": \"2026-06-01T00:00:00Z\",\n        \"updatedAt\": \"2026-06-05T00:00:00Z\"\n      }\n    ],\n    \"page\": { \"pageNo\": 1, \"pageSize\": 20, \"total\": 1 }\n  }\n}\n```\n\n#### 4.1.2 查询知识库统计（顶部卡片）\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | GET | 必填；HTTP 方法 |\n| URL | string | /api/v1/knowledge-bases/stats | 必填；请求 URL |\n| createdAtStart | string | 2026-06-01T00:00:00Z | 可选；统计范围起（ISO8601） |\n| createdAtEnd | string | 2026-06-05T00:00:00Z | 可选；统计范围止（ISO8601） |\n\n响应示例：\n\n```json\n{\n  \"requestId\": \"req-20260605-002\",\n  \"code\": \"OK\",\n  \"message\": \"success\",\n  \"data\": { \"kbTotal\": 12, \"docTotal\": 520, \"qaToday\": 345, \"parseFailed\": 7 }\n}\n```\n\n#### 4.1.3 创建知识库\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | POST | 必填；HTTP 方法 |\n| URL | string | /api/v1/knowledge-bases | 必填；请求 URL |\n| name | string | finance-kb | 必填；机器名（项目内唯一） |\n| displayName | string | 财务知识库 | 必填；展示名 |\n| description | string | ... | 可选；描述 |\n| embeddingMode | enum(string) | service | 必填；service / builtin / model |\n| embeddingServiceId | string | svc-emb-1 | 条件必填；embeddingMode=service 时必填 |\n| embeddingModelId | string | m-emb-1 | 条件可选；embeddingMode=model 时可选 |\n| embeddingVersionId | string | v-emb-1 | 条件可选；embeddingMode=model 时可选 |\n| chunkSize | integer | 800 | 必填；切片大小（按实现：字符/Token），建议 128~4096 |\n| chunkOverlap | integer | 100 | 必填；重叠大小，需 < chunkSize |\n| defaultTopK | integer | 10 | 必填；默认召回 TopK，建议 1~50 |\n| defaultScoreThreshold | number | 0.35 | 必填；默认阈值（0~1） |\n| permission | object | {\"visibility\":\"project\"} | 可选；权限设置 |\n| labels | map<string,string> | {\"team\":\"finance\"} | 可选；标签 |\n| validateOnly | boolean | false | 可选；仅校验不创建 |\n\n依赖关系校验（建议）：\n- embeddingMode=service => embeddingServiceId 必填，且该推理服务 capability=embedding 且 status=running\n- chunkSize 必须在范围内（建议 128~4096）；chunkOverlap < chunkSize\n- defaultTopK 建议 1~50\n\n请求示例：\n\n```json\n{\n  \"name\": \"finance-kb\",\n  \"displayName\": \"财务知识库\",\n  \"embeddingMode\": \"service\",\n  \"embeddingServiceId\": \"svc-emb-1\",\n  \"chunkSize\": 800,\n  \"chunkOverlap\": 100,\n  \"defaultTopK\": 10,\n  \"defaultScoreThreshold\": 0.35,\n  \"labels\": { \"team\": \"finance\" }\n}\n```\n\n响应示例：\n\n```json\n{\n  \"requestId\": \"req-20260605-003\",\n  \"code\": \"OK\",\n  \"message\": \"created\",\n  \"data\": { \"kbId\": \"kb-1a2b\" }\n}\n```\n\n#### 4.1.4 获取知识库详情\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | GET | 必填；HTTP 方法 |\n| URL | string | /api/v1/knowledge-bases/{kbId} | 必填；请求 URL |\n| kbId | string | kb-1a2b | 必填；路径参数 |\n\n#### 4.1.5 更新知识库\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | PATCH | 必填；HTTP 方法 |\n| URL | string | /api/v1/knowledge-bases/{kbId} | 必填；请求 URL |\n| kbId | string | kb-1a2b | 必填；路径参数 |\n| updateMask | array<string> | [\"displayName\",\"defaultTopK\"] | 必填；变更字段白名单，需与 body 字段一致 |\n| displayName | string | 财务知识库（新版） | 可选；展示名 |\n| description | string | ... | 可选；描述 |\n| defaultTopK | integer | 20 | 可选；TopK，建议 1~50 |\n| defaultScoreThreshold | number | 0.3 | 可选；阈值（0~1） |\n| chunkSize | integer | 900 | 可选；变更后可能需要重建索引（提示/强制） |\n| chunkOverlap | integer | 150 | 可选；需 < chunkSize |\n\n校验建议：\n- updateMask 与 body 字段一致\n- 若 chunkSize/chunkOverlap/embedding 变更：返回 needRebuild=true（或直接创建 rebuild operation）\n\n#### 4.1.6 删除知识库\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | DELETE | 必填；HTTP 方法 |\n| URL | string | /api/v1/knowledge-bases/{kbId} | 必填；请求 URL |\n| kbId | string | kb-1a2b | 必填；路径参数 |\n| validateOnly | boolean | false | 可选；仅校验依赖 |\n| force | boolean | false | 可选；强制删除（高权限） |\n\n#### 4.1.7 重建索引（异步）\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排 g> | [\"pdf\"] | 可选；pdf/docx/xlsx/pptx/md...（按支持范围） |\n| createdAtStart | string | 2026-06-01T00:00:00Z | 可选；创建时间起（ISO8601） |\n| createdAtEnd | string | 2026-06-05T00:00:00Z | 可选；创建时间止（ISO8601） |\n| pageNo | integer | 1 | 可选；页码 |\n| pageSize | integer | 50 | 可选；页大小（建议最大 200） |\n| sortBy | string | createdAt | 可选；createdAt / parsedAt / fileName |\n| sortOrder | enum(string) | desc | 可选；asc / desc |\n\n#### 4.2.2 创建文档上传任务（推荐对象存储直传）\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_...` | 建议（写操作）。用于幂等。 |\n\n**错误分支/状态码（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| 401 | - | - | 未认证/登录过期。 |\n| 403 | - | - | 无权限。 |\n| 409 | - | - | 冲突/状态不一致。 |\n| 429 | - | - | 触发限流；提示等待与重试策略。 |\n| 5xx | - | - | 系统错误；请携带 requestId 排障。 |\n\n| Name | Type | Value | Description |\n|---|---|---|---|\n| Method | string | POST | 必填；HTTP 方法 |\n| URL | string | /api/v1/knowledge-bases/{kbId}/documents:upload | 必填；请求 URL |\n| kbId | string | kb-1a2b | 必填；路径参数 |\n| uploadMode | enum(string) | presigned | 必填；presigned / multipart / server_upload |\n| files | array<object> | [{\"path\":\"a.pdf\",\"sizeBytes\":12345,\"sha256\":\"...\"}] | 必填；文件清单（path 必填；sizeBytes 必填；sha256 建议必填） |\n| expiresInSec | integer | 1800 | 可选；预签名过期时间（秒） |\n| requestId | string | req-20260605-020 | 可选；幂等 |\n\n返回建议字段：\n- uploadId、strategy、presignedUrls（按文件返回 url + requiredHeaders）、maxFileSizeBytes、allowedTypes\n\n#### 4.2.3 提交上传完成并触发解析/索引\n\n**Headers（建议）**\n\n| Name | Type | Value | Description |\n| --- | --- | --- | --- |\n| Authorization | string | `Bearer <access_token>` | 必填。登录态鉴权。 |\n| X-Request-Id | string | `req_...` | 建议。用于日志/Trace/审计关联。 |\n| X-Tenant-Id | string | `tnt_...` | 可选。用于限定或指定作用域租户。 |\n| X-Idempotency-Key | string | `idem_.
