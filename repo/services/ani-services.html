      };

      function refreshTreeOnly() {
        renderTree(activeMode, els.search.value);
        for (const node of document.querySelectorAll(".node")) {
          node.dataset.selected = node.dataset.nodeId === selectedPageId ? "true" : "false";
        }
      }

      function toggleCollapsed(mode, nodeId) {
        const set = COLLAPSED[mode];
        if (set.has(nodeId)) set.delete(nodeId);
        else set.add(nodeId);
        refreshTreeOnly();
      }

      function renderTree(mode, query = "") {
        const q = (query || "").trim().toLowerCase();
        const nodes = NAV[mode].nodes;
        els.treeTitle.textContent = `${NAV[mode].title} 导航`;
        const leafCount = FLAT[mode].filter((n) => n.type === "page").length;
        els.treeCount.textContent = `${leafCount} 页`;

        const filtered = q
          ? FLAT[mode]
              .filter((n) => n.type === "page")
              .filter((n) => `${n.path.join(" / ")} ${n.id}`.toLowerCase().includes(q))
              .slice(0, 60)
          : null;

        if (filtered) {
          const ul = document.createElement("ul");
          for (const n of filtered) {
            const li = document.createElement("li");
            li.appendChild(renderNode(n, true));
            ul.appendChild(li);
          }
          els.treeBody.innerHTML = "";
          els.treeBody.appendChild(ul);
          return;
        }

        function walk(list) {
          const ul = document.createElement("ul");
          for (const n of list) {
            const li = document.createElement("li");
            li.appendChild(renderNode(n));
            if (n.children) {
              const child = walk(n.children);
              if (COLLAPSED[mode].has(n.id)) child.style.display = "none";
              li.appendChild(child);
            }
            ul.appendChild(li);
          }
          return ul;
        }

        els.treeBody.innerHTML = "";
        els.treeBody.appendChild(walk(nodes));
      }

      function renderNode(n, showFullPath = false) {
        const div = document.createElement("div");
        div.className = "node";
        div.dataset.nodeId = n.id;
        div.dataset.selected = n.id === selectedPageId ? "true" : "false";
        const caret = document.createElement("span");
        caret.className = "caret";
        if (n.type === "group") {
          caret.textContent = "▾";
          caret.dataset.open = COLLAPSED[activeMode].has(n.id) ? "false" : "true";
        } else {
          caret.textContent = "";
          caret.dataset.open = "true";
        }
        const icon = document.createElement("span");
        const ic = iconFor(n);
        icon.className = `node-icon ${ic.cls}`;
        icon.textContent = ic.txt;
        const label = document.createElement("span");
        label.className = "node-label";
        label.textContent = n.title;
        const meta = document.createElement("span");
        meta.className = "node-meta";
        meta.textContent = showFullPath ? n.path.join("/") : n.type === "group" ? "Group" : "Page";
        div.appendChild(caret);
        div.appendChild(icon);
        div.appendChild(label);
        div.appendChild(meta);
        div.addEventListener("click", (e) => {
          if (n.type === "group") {
            e.preventDefault();
            toggleCollapsed(activeMode, n.id);
            return;
          }
          if (n.type === "page") navigateTo(n.id);
        });
        return div;
      }

      function renderCrumbs(pageId) {
        const mode = pageMode(pageId) || activeMode;
        const match = FLAT[mode].find((n) => n.id === pageId);
        const crumbs = match ? match.path : pageId.startsWith("root.") ? ["KuberCloud ANI", "一级导航图"] : [mode === "boss" ? "BOSS" : "Console", "未找到页面"];
        els.crumbs.innerHTML = "";
        for (const c of crumbs) {
          const span = document.createElement("span");
          span.className = "crumb";
          span.textContent = c;
          els.crumbs.appendChild(span);
        }
      }

      function renderContent(pageId) {
        const page = PAGE[pageId];
        els.content.innerHTML = "";
        if (!page) {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `<h1>页面缺失</h1><div class="empty">该页面在原型数据中未定义。</div>`;
          els.content.appendChild(card);
          return;
        }

        const header = document.createElement("div");
        header.className = "card";
        const tenant = els.tenant.value;
        header.innerHTML = `
          <h1>${escapeHtml(page.title)}</h1>
          <div class="grid">
            <dl class="kv">
              <div class="kv-row"><dt>页面目标</dt><dd>${escapeHtml(page.goal || "文档未展开")}</dd></div>
              <div class="kv-row"><dt>入口</dt><dd>${escapeHtml(page.entry || "文档未展开")}</dd></div>
            </dl>
            <div class="kv">
              <div class="tag"><strong>上下文</strong><span>tenantId=${escapeHtml(tenant)}</span></div>
              <div class="tag"><strong>路由</strong><span>${escapeHtml(location.hash || "#")}</span></div>
              <div class="tag"><strong>状态</strong><span>IA Prototype</span></div>
            </div>
          </div>
        `;
        els.content.appendChild(header);

        let blocks = page.blocks || [];
        if (pageId === "console.compute.instances.container") {
          blocks = blocks.filter(
            (b) =>
              b &&
              b.title !== "资源对象（K8s）" &&
              !String(b.src || "").endsWith("容器服务模块_产品功能总结.md"),
          );
        }
        if (!blocks.length) {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `<h2>说明</h2><div class="empty">该页面在文档中未展开页面结构/字段，本原型仅保留导航入口。</div>`;
          els.content.appendChild(card);
          return;
        }

        for (const b of blocks) {
          const card = document.createElement("div");
          card.className = "card";
          const isApiMd = b.kind === "md" && /API 请求参数/.test(String(b.title || ""));
          if (!isApiMd) {
            const title = document.createElement("h2");
            title.textContent = b.title || "";
            card.appendChild(title);
          }

          if (b.kind === "code") {
            const pre = document.createElement("pre");
            pre.textContent = b.code || "";
            card.appendChild(pre);
          } else if (b.kind === "md") {
            if (isApiMd) {
              const details = document.createElement("details");
              details.className = "api";
              const summary = document.createElement("summary");
              const label = document.createElement("span");
              label.textContent = b.title || "";
              const chev = document.createElement("span");
              chev.className = "chev";
              chev.textContent = "展开/收起";
              summary.appendChild(label);
              summary.appendChild(chev);
              details.appendChild(summary);
              const body = document.createElement("div");
              body.className = "api-body";
              const md = document.createElement("div");
              md.className = "md";
              md.textContent = "点击展开加载…";
              body.appendChild(md);
              details.appendChild(body);
              const loadOnce = () => {
                if (details.dataset.loaded === "true") return;
                details.dataset.loaded = "true";
                const inline = API_MAPPING_OVERRIDES[b.title] ?? (typeof b.text === "string" ? b.text : "");
                if (inline) {
                  md.innerHTML = "";
                  md.appendChild(renderMarkdown(normalizeApiDoc(inline)));
                  return;
                }
                if (!b.src) {
                  md.textContent = "文档未展开";
                  return;
                }
                md.textContent = "加载中…";
                loadDoc(b.src).then((txt) => {
                  const content = normalizeApiDoc(getDocContent(txt, b));
                  md.innerHTML = "";
                  if (!content) {
                    const div = document.createElement("div");
                    div.className = "empty";
                    div.textContent = "文档未展开";
                    md.appendChild(div);
                  } else {
                    md.appendChild(renderMarkdown(content));
                  }
                });
              };
              details.addEventListener("toggle", () => {
                if (!details.open) return;
                loadOnce();
              });
              card.appendChild(details);
            } else {
              const md = document.createElement("div");
              md.className = "md";
              md.textContent = "加载中…";
              const inline = typeof b.text === "string" ? b.text : "";
              if (inline) {
                md.innerHTML = "";
                md.appendChild(renderMarkdown(inline));
              } else if (!b.src) {
                md.textContent = "文档未展开";
              } else {
                loadDoc(b.src).then((txt) => {
                  const content = getDocContent(txt, b);
                  md.innerHTML = "";
                  if (!content) {
                    const div = document.createElement("div");
                    div.className = "empty";
                    div.textContent = "文档未展开";
                    md.appendChild(div);
                  } else {
                    md.appendChild(renderMarkdown(content));
                  }
                });
              }
              card.appendChild(md);
            }
          } else if (b.kind === "iframe") {
            const iframe = document.createElement("iframe");
            iframe.className = "embed";
            iframe.src = b.src || "";
            iframe.loading = "lazy";
            iframe.referrerPolicy = "no-referrer";
            card.appendChild(iframe);
          } else if (b.kind === "list") {
            if (!b.items || !b.items.length) {
              const div = document.createElement("div");
              div.className = "empty";
              div.textContent = "文档未展开";
              card.appendChild(div);
            } else {
              const ul = document.createElement("ul");
              ul.style.margin = "0";
              ul.style.paddingLeft = "18px";
              for (const item of b.items) {
                const li = document.createElement("li");
                li.textContent = item;
                li.style.fontSize = "13px";
                li.style.margin = "6px 0";
                ul.appendChild(li);
              }
              card.appendChild(ul);
            }
          } else if (b.kind === "table") {
            const table = document.createElement("table");
            const thead = document.createElement("thead");
            const trh = document.createElement("tr");
            for (const h of b.header || []) {
              const th = document.createElement("th");
              th.textContent = h;
              trh.appendChild(th);
            }
            thead.appendChild(trh);
            table.appendChild(thead);
            const tbody = document.createElement("tbody");
            for (const row of b.rows || []) {
              const tr = document.createElement("tr");
              for (const cell of row) {
                const td = document.createElement("td");
                td.textContent = cell;
                tr.appendChild(td);
              }
              tbody.appendChild(tr);
            }
            table.appendChild(tbody);
            card.appendChild(table);
          } else {
            const div = document.createElement("div");
            div.className = "empty";
            div.textContent = "未知模块类型";
            card.appendChild(div);
          }
          els.content.appendChild(card);
        }
      }

      function navigateTo(pageId) {
        selectedPageId = pageId;
        const mode = pageMode(pageId);
        if (mode && activeMode !== mode) setMode(mode);
        location.hash = `#/${pageId}`;
        sync();
      }

      function sync() {
        const hash = location.hash || "";
        const match = hash.match(/^#\/(.+)$/);
        const pageId = match ? match[1] : selectedPageId;
        selectedPageId = PAGE[pageId] ? pageId : activeMode === "boss" ? "boss.overview" : "console.home";

        refreshTreeOnly();
        renderCrumbs(selectedPageId);
        renderContent(selectedPageId);
      }

      function setMode(mode) {
        activeMode = mode;
        els.pillConsole.dataset.active = mode === "console" ? "true" : "false";
        els.pillBoss.dataset.active = mode === "boss" ? "true" : "false";
        if (!selectedPageId.startsWith(mode + ".") && !selectedPageId.startsWith("root.")) {
          selectedPageId = mode === "boss" ? "boss.overview" : "console.home";
          location.hash = `#/${selectedPageId}`;
        }
        els.search.value = "";
        renderTree(activeMode, "");
        sync();
      }

      function pageMode(pageId) {
        if (pageId.startsWith("console.")) return "console";
        if (pageId.startsWith("boss.")) return "boss";
        return null;
      }

      function escapeHtml(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      els.pillConsole.addEventListener("click", () => setMode("console"));
      els.pillBoss.addEventListener("click", () => setMode("boss"));
      els.pillRootNav.addEventListener("click", () => navigateTo("root.nav"));
      els.pillIaReport.addEventListener("click", () => navigateTo("root.ia-report"));
      els.search.addEventListener("input", () => renderTree(activeMode, els.search.value));
      els.tenant.addEventListener("change", sync);
      els.copyLink.addEventListener("click", async () => {
        const url = location.href;
        try {
          await navigator.clipboard.writeText(url);
          els.copyLink.textContent = "已复制";
          setTimeout(() => (els.copyLink.textContent = "复制当前链接"), 900);
        } catch {
          prompt("复制失败，请手动复制：", url);
        }
      });

      window.addEventListener("hashchange", sync);
      window.addEventListener("keydown", (e) => {
        if (e.key === "/" && document.activeElement !== els.search) {
          e.preventDefault();
          els.search.focus();
        }
      });

      setMode("console");
      sync();
    </script>
  </body>
