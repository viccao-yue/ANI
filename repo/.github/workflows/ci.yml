name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: "1.23"
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:

  # ── Go 服务 CI ──────────────────────────────────────────────────────────────
  go-ci:
    name: Go Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b $(go env GOPATH)/bin v1.59.0

      - name: Build all Go services
        run: make build

      - name: Run tests
        run: make test-go

      - name: Security scan (gosec)
        run: gosec -severity high -quiet ./services/... ./operators/...

      - name: Lint (golangci-lint)
        run: golangci-lint run ./...

      - name: Coverage report
        run: |
          go test ./services/... ./operators/... \
            -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out | tail -1

  # ── Python AI 层 CI ─────────────────────────────────────────────────────────
  python-ci:
    name: Python AI Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r ai/rag-engine/requirements.txt
          pip install ruff mypy pytest pytest-asyncio

      - name: Lint
        run: |
          ruff check ai/
          mypy ai/ --ignore-missing-imports

      - name: Test
        run: pytest ai/ -v --tb=short

  # ── 前端 CI ─────────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: cd frontends && pnpm install --frozen-lockfile

      - name: Type check
        run: |
          cd frontends/console && pnpm type-check
          cd frontends/boss    && pnpm type-check

      - name: Lint
        run: cd frontends && pnpm lint

      - name: Build
        run: |
          cd frontends/console && pnpm build
          cd frontends/boss    && pnpm build

  # ── 依赖 CVE 扫描 ────────────────────────────────────────────────────────────
  dependency-scan:
    name: Dependency CVE Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan Go dependencies (govulncheck)
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: ${{ env.GO_VERSION }}
          go-package: ./...

      - name: Scan Python dependencies
        run: |
          pip install pip-audit
          pip-audit -r ai/rag-engine/requirements.txt

  # ── OpenAPI Spec 校验 ────────────────────────────────────────────────────────
  api-spec-lint:
    name: OpenAPI Spec Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint OpenAPI Spec
        uses: swaggerhub-actions/validate-openapi@v1
        with:
          file: api/openapi/v1.yaml
