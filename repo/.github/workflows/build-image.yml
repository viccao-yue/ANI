name: Build & Push Images

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag"
        required: true

env:
  REGISTRY: harbor.ani.internal/ani

jobs:
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: ani-gateway
            context: services/ani-gateway
          - name: inference-operator
            context: operators/inference-operator
          - name: upgrade-operator
            context: operators/upgrade-operator
          - name: rag-engine
            context: ai/rag-engine
          - name: doc-parser
            context: ai/doc-parser

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.service.name }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ matrix.service.name }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.service.name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.service.name }}:buildcache,mode=max

      # 镜像安全扫描（阻断 HIGH/CRITICAL 漏洞）
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ matrix.service.name }}:${{ steps.tag.outputs.tag }}"
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      # 镜像签名（Cosign）
      - name: Sign image (Cosign)
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY \
            ${{ env.REGISTRY }}/${{ matrix.service.name }}:${{ steps.tag.outputs.tag }}
