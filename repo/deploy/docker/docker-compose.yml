version: "3.9"

# ANI 本地开发环境
# 启动：make deps  或  docker compose -f deploy/docker/docker-compose.yml up -d
# 停止：make deps-down
#
# 端口分配（均绑定 127.0.0.1 防止意外暴露）：
#   PostgreSQL  5432
#   MinIO API   9000  MinIO Console 9001
#   NATS        4222  NATS Monitor  8222
#   Redis       6379
#   Milvus      19530 Milvus Attu   3000

services:

  # ── PostgreSQL 17 ──────────────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg17
    container_name: ani-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ani
      POSTGRES_PASSWORD: ani_dev_password
      POSTGRES_DB: ani
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ani-postgres-data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ani"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO ──────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: ani-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ani-admin
      MINIO_ROOT_PASSWORD: ani_dev_password
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - ani-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO 初始化（创建 Bucket）
  minio-init:
    image: minio/mc:latest
    container_name: ani-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ani-admin ani_dev_password &&
        mc mb --ignore-existing local/ani-models &&
        mc mb --ignore-existing local/ani-datasets &&
        mc mb --ignore-existing local/ani-kb-docs &&
        mc mb --ignore-existing local/ani-branding &&
        mc mb --ignore-existing local/ani-patches &&
        mc mb --ignore-existing local/ani-exports &&
        mc mb --ignore-existing local/ani-backups &&
        echo 'MinIO buckets initialized'
      "
    restart: "no"

  # ── NATS JetStream ─────────────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: ani-nats
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    volumes:
      - ani-nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: ani-redis
    restart: unless-stopped
    command: redis-server --requirepass ani_dev_password --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ani-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ani_dev_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Milvus（Standalone 开发模式）─────────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    container_name: ani-milvus-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - ani-etcd-data:/etcd

  milvus:
    image: milvusdb/milvus:v2.5.0
    container_name: ani-milvus
    restart: unless-stopped
    command: milvus run standalone
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ani-admin
      MINIO_SECRET_ACCESS_KEY: ani_dev_password
    ports:
      - "127.0.0.1:19530:19530"
      - "127.0.0.1:9091:9091"
    volumes:
      - ani-milvus-data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Milvus Attu（Web UI，可选）
  attu:
    image: zilliz/attu:v2.4
    container_name: ani-attu
    restart: unless-stopped
    environment:
      MILVUS_URL: milvus:19530
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - milvus
    profiles: ["tools"]   # 仅在 --profile tools 时启动

  # ── Dex（OIDC，可选，开发时可用 mock）─────────────────────────────────────
  dex:
    image: ghcr.io/dexidp/dex:v2.40.0
    container_name: ani-dex
    restart: unless-stopped
    command: dex serve /etc/dex/config.yaml
    ports:
      - "127.0.0.1:5556:5556"
    volumes:
      - ./config/dex-dev.yaml:/etc/dex/config.yaml:ro
    profiles: ["auth"]

volumes:
  ani-postgres-data:
  ani-minio-data:
  ani-nats-data:
  ani-redis-data:
  ani-etcd-data:
  ani-milvus-data:
