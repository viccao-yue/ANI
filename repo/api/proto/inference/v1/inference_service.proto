syntax = "proto3";

package inference.v1;

import "common/v1/common.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/kubercloud/ani/pkg/generated/pb/inference/v1;inferencev1";

// InferenceService manages the lifecycle of vLLM inference deployments.
service InferenceServiceRPC {
  // CreateInferenceService starts an asynchronous deployment.
  // Returns the initial status record and an AsyncTaskRef for polling.
  rpc CreateInferenceService(CreateInferenceServiceRequest) returns (CreateInferenceServiceResponse);

  // GetInferenceService returns the current status of a service.
  rpc GetInferenceService(GetInferenceServiceRequest) returns (InferenceServiceStatus);

  // ListInferenceServices returns a cursor-paginated list.
  rpc ListInferenceServices(ListInferenceServicesRequest) returns (ListInferenceServicesResponse);

  // DeleteInferenceService initiates graceful shutdown (drain then destroy).
  rpc DeleteInferenceService(DeleteInferenceServiceRequest) returns (google.protobuf.Empty);

  // GetEndpointURL is called by the ANI Gateway to route inference requests.
  // Returns the internal K8s Service URL for a running InferenceService.
  rpc GetEndpointURL(GetEndpointURLRequest) returns (GetEndpointURLResponse);

  // UpdateStatus is called by the Operator when CRD phase changes.
  // Not exposed externally (gateway RBAC blocks tenant access).
  rpc UpdateStatus(UpdateStatusRequest) returns (google.protobuf.Empty);
}

// ── Request / Response messages ───────────────────────────────────────────────

message CreateInferenceServiceRequest {
  string tenant_id        = 1;
  string name             = 2;   // unique within tenant
  string model            = 3;   // format: "{model_name}:{version}"
  int32  replicas         = 4;
  string gpu_type         = 5;
  int32  gpu_count_per_pod = 6;
  int32  max_concurrency  = 7;
  PlacementSpec placement = 8;
  EncryptionKeyRef encryption_key_ref = 9;
  int32  drain_timeout_seconds = 10;
  string idempotency_key  = 11;
  string webhook_url      = 12;
}

message CreateInferenceServiceResponse {
  InferenceServiceStatus service = 1;
  common.v1.AsyncTaskRef task    = 2;
}

message GetInferenceServiceRequest {
  string tenant_id  = 1;
  string service_id = 2;
}

message ListInferenceServicesRequest {
  string tenant_id = 1;
  string status    = 2;
  common.v1.CursorPageRequest page = 3;
}

message ListInferenceServicesResponse {
  repeated InferenceServiceStatus services = 1;
  common.v1.CursorPageMeta meta            = 2;
}

message DeleteInferenceServiceRequest {
  string tenant_id  = 1;
  string service_id = 2;
}

message GetEndpointURLRequest {
  string tenant_id    = 1;
  string service_name = 2;   // name of the InferenceService
}

message GetEndpointURLResponse {
  string endpoint_url = 1;   // internal K8s Service URL, e.g. "http://svc:8000"
  bool   is_ready     = 2;   // false if service is not yet Running
}

message UpdateStatusRequest {
  string service_id    = 1;
  string phase         = 2;   // one of the Phase constants
  string endpoint_url  = 3;   // set when phase=Running
  string message       = 4;   // human-readable, set when phase=Failed
  int32  ready_replicas = 5;
  int64  observed_generation = 6;
}

// ── Domain messages ───────────────────────────────────────────────────────────

message InferenceServiceStatus {
  string tenant_id       = 1;
  string id              = 2;
  string name            = 3;
  string model           = 4;
  int32  replicas        = 5;
  string gpu_type        = 6;
  int32  gpu_count_per_pod = 7;
  int32  max_concurrency = 8;
  PlacementSpec placement = 9;
  // phase follows the state machine defined in inferenceservice_types.go
  string phase           = 10;
  string endpoint_url    = 11;
  int32  ready_replicas  = 12;
  string message         = 13;
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp updated_at = 15;
}

message PlacementSpec {
  string region = 1;
  string az     = 2;
}

message EncryptionKeyRef {
  string secret_name = 1;   // K8s Secret name in the ANI namespace
  string key         = 2;   // data key within the Secret
}
