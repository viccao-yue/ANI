syntax = "proto3";

package kb.v1;

import "common/v1/common.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/kubercloud/ani/pkg/generated/pb/kb/v1;kbv1";

// KBService manages knowledge bases and provides RAG query capability.
service KBService {
  rpc CreateKB(CreateKBRequest) returns (KnowledgeBase);
  rpc GetKB(GetKBRequest) returns (KnowledgeBase);
  rpc ListKBs(ListKBsRequest) returns (ListKBsResponse);
  rpc DeleteKB(DeleteKBRequest) returns (google.protobuf.Empty);

  // GetDocumentUploadURL returns a presigned MinIO PUT URL for direct upload.
  // Creates a kb_documents record (parse_status=pending) and returns the doc_id.
  rpc GetDocumentUploadURL(GetDocumentUploadURLRequest) returns (GetDocumentUploadURLResponse);

  // NotifyDocumentUploaded is called after the client uploads directly to MinIO.
  // Validates the checksum, then enqueues a parse task via Outbox pattern.
  rpc NotifyDocumentUploaded(NotifyDocumentUploadedRequest) returns (common.v1.AsyncTaskRef);

  // GetDocument returns metadata for one document.
  rpc GetDocument(GetDocumentRequest) returns (KBDocument);

  // ListDocuments returns all documents in a knowledge base.
  rpc ListDocuments(ListDocumentsRequest) returns (ListDocumentsResponse);

  // DeleteDocument removes a document and its Milvus vectors (idempotent).
  rpc DeleteDocument(DeleteDocumentRequest) returns (google.protobuf.Empty);

  // Query performs a synchronous RAG query and returns a JSON answer.
  // For streaming answers use the SSE endpoint in the gateway directly.
  rpc Query(QueryRequest) returns (QueryResponse);
}

// ── Request / Response messages ───────────────────────────────────────────────

message CreateKBRequest {
  string tenant_id       = 1;
  string name            = 2;
  string description     = 3;
  string embedding_model = 4;   // default "bge-m3"
  int32  chunk_size      = 5;   // default 512
  int32  top_k           = 6;   // default 5
  float  score_threshold = 7;   // default 0.3
}

message GetKBRequest {
  string tenant_id = 1;
  string kb_id     = 2;
}

message ListKBsRequest {
  string tenant_id = 1;
  common.v1.CursorPageRequest page = 2;
}

message ListKBsResponse {
  repeated KnowledgeBase kbs  = 1;
  common.v1.CursorPageMeta meta = 2;
}

message DeleteKBRequest {
  string tenant_id = 1;
  string kb_id     = 2;
}

message GetDocumentUploadURLRequest {
  string tenant_id       = 1;
  string kb_id           = 2;
  string file_name       = 3;
  string file_type       = 4;   // pdf | docx | xlsx | txt | md
  int64  file_size_bytes = 5;
  string checksum_sha256 = 6;   // client-computed; validated after upload
  string idempotency_key = 7;   // collision-safe: resubmitting returns same doc
}

message GetDocumentUploadURLResponse {
  string doc_id       = 1;   // pre-reserved UUID
  string upload_url   = 2;   // presigned PUT URL (valid 15 minutes)
  string storage_path = 3;   // MinIO path — pass to NotifyDocumentUploaded
}

message NotifyDocumentUploadedRequest {
  string tenant_id    = 1;
  string kb_id        = 2;
  string doc_id       = 3;
  string storage_path = 4;
}

message GetDocumentRequest {
  string tenant_id = 1;
  string kb_id     = 2;
  string doc_id    = 3;
}

message ListDocumentsRequest {
  string tenant_id   = 1;
  string kb_id       = 2;
  string parse_status = 3;   // filter; empty = all
  common.v1.CursorPageRequest page = 4;
}

message ListDocumentsResponse {
  repeated KBDocument documents = 1;
  common.v1.CursorPageMeta meta = 2;
}

message DeleteDocumentRequest {
  string tenant_id = 1;
  string kb_id     = 2;
  string doc_id    = 3;
}

message QueryRequest {
  string tenant_id        = 1;
  string kb_id            = 2;
  string question         = 3;
  string session_id       = 4;   // optional; empty creates new session
  string idempotency_key  = 5;   // prevents duplicate billing on retry
  int32  top_k            = 6;   // override default if nonzero
  float  score_threshold  = 7;   // override default if nonzero
  string inference_service_name = 8; // which vLLM service to use; "default" if empty
}

message QueryResponse {
  string answer           = 1;
  repeated SourceChunk sources = 2;
  string session_id       = 3;
  int32  input_tokens     = 4;
  int32  output_tokens    = 5;
}

message SourceChunk {
  string doc_id    = 1;
  string file_name = 2;
  int32  page      = 3;
  string content   = 4;   // the cited passage
  float  score     = 5;   // similarity score [0,1]
}

// ── Domain messages ───────────────────────────────────────────────────────────

message KnowledgeBase {
  string tenant_id       = 1;
  string id              = 2;
  string name            = 3;
  string description     = 4;
  string embedding_model = 5;
  int32  chunk_size      = 6;
  int32  top_k           = 7;
  float  score_threshold = 8;
  string status          = 9;   // active | rebuilding | deleted
  int32  doc_count       = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

message KBDocument {
  string tenant_id       = 1;
  string kb_id           = 2;
  string id              = 3;
  string file_name       = 4;
  string file_type       = 5;
  int64  file_size_bytes = 6;
  string parse_status    = 7;   // pending | parsing | indexing | ready | failed
  int32  chunk_count     = 8;
  string error_message   = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp parsed_at  = 11;
}
