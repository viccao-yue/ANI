syntax = "proto3";

package task.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/kubercloud/ani/pkg/generated/pb/task/v1;taskv1";

// TaskService provides access to async task state.
// All task creation happens within domain services (model, inference, kb).
service TaskService {
  // GetTask returns the current state of an async task.
  rpc GetTask(GetTaskRequest) returns (AsyncTask);

  // CancelTask requests cancellation of a pending or running task.
  rpc CancelTask(CancelTaskRequest) returns (google.protobuf.Empty);

  // UpdateTaskProgress is called by workers to report progress.
  // Not exposed externally; blocked by gateway RBAC for tenant users.
  rpc UpdateTaskProgress(UpdateTaskProgressRequest) returns (google.protobuf.Empty);

  // AcquireTaskLease atomically acquires a processing lease for a task.
  // Returns ALREADY_EXISTS if another worker holds the lease.
  rpc AcquireTaskLease(AcquireTaskLeaseRequest) returns (AcquireTaskLeaseResponse);

  // HeartbeatTaskLease renews a lease. Workers call this every 30s.
  rpc HeartbeatTaskLease(HeartbeatTaskLeaseRequest) returns (google.protobuf.Empty);

  // FailTask records failure, increments attempt_count, and may dead-letter.
  rpc FailTask(FailTaskRequest) returns (google.protobuf.Empty);

  // CompleteTask marks a task as completed with a result payload.
  rpc CompleteTask(CompleteTaskRequest) returns (google.protobuf.Empty);
}

message GetTaskRequest {
  string tenant_id = 1;
  string task_id   = 2;
}

message CancelTaskRequest {
  string tenant_id = 1;
  string task_id   = 2;
}

message UpdateTaskProgressRequest {
  string task_id    = 1;
  int32  progress   = 2;   // 0-100
  string message    = 3;   // optional human-readable status
}

message AcquireTaskLeaseRequest {
  string task_id         = 1;
  int32  lease_seconds   = 2;   // how long the worker expects to hold the lease
}

message AcquireTaskLeaseResponse {
  bool   acquired          = 1;
  google.protobuf.Timestamp lease_until = 2;
}

message HeartbeatTaskLeaseRequest {
  string task_id = 1;
}

message FailTaskRequest {
  string task_id             = 1;
  string error_message       = 2;
  string compensating_action = 3;   // description of what the caller will do to compensate
}

message CompleteTaskRequest {
  string task_id = 1;
  bytes  result  = 2;   // JSON-encoded result payload
}

// ── Domain message ────────────────────────────────────────────────────────────

message AsyncTask {
  string tenant_id        = 1;
  string id               = 2;
  string idempotency_key  = 3;
  string task_type        = 4;
  string resource_type    = 5;
  string resource_id      = 6;
  string status           = 7;   // pending | running | completed | failed | cancelled | dead_letter
  int32  attempt_count    = 8;
  int32  max_attempts     = 9;
  int32  progress_pct     = 10;
  string error_message    = 11;
  string compensating_action = 12;
  google.protobuf.Timestamp lease_until       = 13;
  google.protobuf.Timestamp last_heartbeat_at = 14;
  google.protobuf.Timestamp dead_letter_at    = 15;
  google.protobuf.Timestamp created_at        = 16;
  google.protobuf.Timestamp started_at        = 17;
  google.protobuf.Timestamp completed_at      = 18;
  string webhook_url      = 19;
}
