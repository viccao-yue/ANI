    StorageVolumeListResponse:
      type: object
      required: [items, total]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/StorageVolume' } }
        total: { type: integer }
        next_cursor: { type: string, nullable: true }

    StorageFilesystemListResponse:
      type: object
      required: [items, total]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/StorageFilesystem' } }
        total: { type: integer }
        next_cursor: { type: string, nullable: true }

    StorageObjectListResponse:
      type: object
      required: [items, total]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/StorageObject' } }
        total: { type: integer }
        next_cursor: { type: string, nullable: true }

    CreateStorageVolumeRequest:
      type: object
      required: [name, size_gib, idempotency_key]
      properties:
        idempotency_key: { type: string, minLength: 1, maxLength: 128, description: "客户端生成；同一 tenant_id 下 24 小时内去重" }
        name:            { type: string, minLength: 1, maxLength: 128 }
        size_gib:        { type: integer, format: int64, minimum: 1 }
        storage_class:   { type: string, default: standard }

    CreateStorageFilesystemRequest:
      type: object
      required: [name, size_gib, idempotency_key]
      properties:
        idempotency_key: { type: string, minLength: 1, maxLength: 128, description: "客户端生成；同一 tenant_id 下 24 小时内去重" }
        name:            { type: string, minLength: 1, maxLength: 128 }
        protocol:        { type: string, enum: [nfs, cephfs], default: nfs }
        size_gib:        { type: integer, format: int64, minimum: 1 }

    CreateStorageObjectRequest:
      type: object
      required: [bucket, key, idempotency_key]
      properties:
        idempotency_key: { type: string, minLength: 1, maxLength: 128, description: "客户端生成；同一 tenant_id 下 24 小时内去重" }
        bucket:          { type: string, minLength: 1, maxLength: 128 }
        key:             { type: string, minLength: 1, maxLength: 1024 }
        size_bytes:      { type: integer, format: int64, minimum: 0, default: 0 }
        content_type:    { type: string, default: application/octet-stream }

    VectorStoreState:
      type: string
      enum: [pending, ready, failed, deleting, deleted]

    VectorStore:
      type: object
      required: [id, tenant_id, name, dimension, metric, state, created_at, updated_at]
      properties:
        id:        { type: string }
        tenant_id: { type: string }
        name:      { type: string }
        dimension: { type: integer, minimum: 1 }
        metric:    { type: string, enum: [cosine, l2, ip] }
        state:     { $ref: '#/components/schemas/VectorStoreState' }
        reason:    { type: string, nullable: true }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'
