      parameters:
        - { name: cluster_id, in: path, required: true, schema: { type: string } }
        - { name: node_pool_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/K8sClusterNodePool"
