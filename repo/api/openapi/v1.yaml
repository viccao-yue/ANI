          description: 品牌配置
          content:
            application/json:
              schema:
                properties:
                  platform_name:  { type: string }
                  logo_light_url: { type: string, format: uri }
                  logo_dark_url:  { type: string, format: uri }
                  favicon_url:    { type: string, format: uri }
                  primary_color:  { type: string, example: "#1677FF" }
                  secondary_color:{ type: string }
                  icp_number:     { type: string }

  # ── 实例操作历史（Control Plane 操作追踪）──────────────────────────────────
  /instances/{instance_id}/operations:
    get:
      operationId: listInstanceOperations
      summary: 查询实例操作历史
      description: |
        返回指定实例的所有操作记录（创建、启动、停止、变配、删除等）。
        每条操作记录包含：操作类型、状态、触发用户、时间线步骤、失败原因和重试建议。
      tags: [Instances]
      x-ani-rbac-scope: "scope:instances:read"
      parameters:
        - { name: instance_id, in: path,  required: true, schema: { type: string } }
        - { name: limit,       in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { name: cursor,      in: query, schema: { type: string } }
      responses:
        "200":
          description: 操作历史列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CursorPage'
                  - properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/InstanceOperation' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }

  /instance-operations/{operation_id}:
    get:
      operationId: getInstanceOperation
      summary: 查询单个操作详情
      description: 通过 operation_id 查询操作详情，包含完整时间线步骤。
      tags: [Instances]
      x-ani-rbac-scope: "scope:instances:read"
      parameters:
        - { name: operation_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: 操作详情
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InstanceOperation' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }

  # ── 异步任务 ────────────────────────────────────────────────────────────────
  /tasks/{task_id}:
    get:
      summary: 查询异步任务状态
      tags: [Tasks]
      parameters:
        - { name: task_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AsyncTask' }
        "404":
          $ref: '#/components/responses/NotFound'

  # ── 可观测性 ────────────────────────────────────────────────────────────────
  /observability/query:
    get:
      operationId: queryObservability
      summary: PromQL 代理查询
      description: 通过 Core 代理 PromQL 查询，不暴露底层 Prometheus 地址。
      tags: [Observability]
      x-ani-rbac-scope: "scope:observability:read"
      parameters:
        - { name: query, in: query, required: true, schema: { type: string, minLength: 1 } }
        - { name: time, in: query, required: false, schema: { type: string, format: date-time } }
        - { name: timeout, in: query, required: false, schema: { type: string, default: 30s } }
      responses:
        "200":
          description: PromQL 查询结果
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ObservabilityQueryResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

  /observability/alert-rules:
