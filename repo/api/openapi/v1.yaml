        repository: { type: string }
        subject:    { type: string }
        actions:
          type: array
          items: { type: string, enum: [pull, push, delete, scan] }
        state: { type: string, enum: [active, duplicate] }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'
        updated_at: { type: string, format: date-time }

    SetRegistryPermissionRequest:
      type: object
      required: [idempotency_key, subject, actions]
      properties:
        idempotency_key: { type: string, minLength: 1, maxLength: 128 }
        subject:         { type: string, minLength: 1, maxLength: 128 }
        actions:
          type: array
          minItems: 1
          items: { type: string, enum: [pull, push, delete, scan] }

    RegistryScanResult:
      type: object
      required: [image, status, critical, high, medium, low]
      properties:
        image:       { type: string }
        status:      { type: string, enum: [not_scanned, pending, running, complete, failed] }
        critical:    { type: integer }
        high:        { type: integer }
        medium:      { type: integer }
        low:         { type: integer }
        report_url:  { type: string }
        provider_id: { type: string }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'
        scanned_at: { type: string, format: date-time }

    CreateRegistryPullSecretRequest:
      type: object
      required: [idempotency_key]
      properties:
        idempotency_key: { type: string, minLength: 1, maxLength: 128 }
        name:            { type: string, minLength: 1, maxLength: 128, default: ani-registry-pull }
        namespace:       { type: string, minLength: 1, maxLength: 128 }

    RegistryPullSecret:
      type: object
      required: [project, name, secret_ref, registry, username, created_at]
      properties:
        project:    { type: string }
        name:       { type: string }
        secret_ref: { type: string }
        registry:   { type: string }
        username:   { type: string }
        namespace:  { type: string }
        state:      { type: string, enum: [active, duplicate] }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'
        created_at: { type: string, format: date-time }

    RegistryProjectScanReport:
      type: object
      required: [project, status, critical, high, medium, low, artifacts_total, scanned_artifacts]
      properties:
        project:           { type: string }
        status:            { type: string, enum: [not_scanned, pending, running, complete, failed] }
        critical:          { type: integer }
        high:              { type: integer }
        medium:            { type: integer }
        low:               { type: integer }
        artifacts_total:   { type: integer }
        scanned_artifacts: { type: integer }
        provider_id:       { type: string }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'
        scanned_at: { type: string, format: date-time }

    BeginOIDCLoginRequest:
      type: object
      required: [tenant_name, redirect_uri]
      properties:
        tenant_name:  { type: string, description: "租户 slug，用于限定登录上下文" }
        redirect_uri: { type: string, format: uri, description: "Console/CLI 注册的 OIDC callback 地址" }

    BeginOIDCLoginResponse:
      type: object
      required: [authorization_url, state]
      properties:
        authorization_url: { type: string, format: uri }
        state:            { type: string }

    CompleteOIDCLoginRequest:
      type: object
      required: [state, code, redirect_uri]
      properties:
        state:        { type: string }
        code:         { type: string }
        redirect_uri: { type: string, format: uri }

    TokenPairResponse:
      type: object
      required: [access_token, refresh_token, expires_in]
      properties:
        access_token:  { type: string }
        refresh_token: { type: string }
        expires_in:    { type: integer, example: 3600 }
        issued_at:     { type: string, format: date-time }

    RefreshAccessTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }

    RefreshAccessTokenResponse:
      type: object
      required: [access_token, expires_in]
      properties:
        access_token: { type: string }
        expires_in:   { type: integer, example: 3600 }

    LogoutRequest:
      type: object
      required: [jti]
      properties:
        jti: { type: string, description: "JWT ID，调用方从当前 AccessToken claims 中读取" }

    RevokeStatusResponse:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [revoked] }

    CreateAPIKeyRequest:
      type: object
      required: [name, scopes]
      properties:
        name:           { type: string, maxLength: 128 }
        user_id:        { type: string, description: "可选；为空时使用当前认证用户" }
        scopes:
          type: array
          minItems: 1
          items: { type: string, pattern: "^scope:[a-z0-9_-]+:(\\*|[a-z0-9_-]+)$" }
        rate_limit_rpm: { type: integer, minimum: 1, maximum: 10000, default: 60 }
        expires_at:     { type: string, format: date-time }

    CreateAPIKeyResponse:
      type: object
      required: [key_id, key_value, key_prefix]
      properties:
        key_id:     { type: string }
        key_value:  { type: string, description: "仅创建时返回一次，服务端不保存明文" }
        key_prefix: { type: string }

    APIKeyInfo:
      type: object
      required: [id, name, key_prefix, scopes, rate_limit_rpm, is_active]
      properties:
        id:             { type: string }
        name:           { type: string }
        key_prefix:     { type: string }
        scopes:
          type: array
          items: { type: string }
        rate_limit_rpm: { type: integer }
        created_at:     { type: string, format: date-time }
        expires_at:     { type: string, format: date-time, nullable: true }
        last_used_at:   { type: string, format: date-time, nullable: true }
        is_active:      { type: boolean }

    ListAPIKeysResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/APIKeyInfo' }
        total: { type: integer }

    # ─ Phase 2 扩展 Schema ──────────────────────────────────────────────────────
    InstanceLogEntry:
      type: object
      required: [timestamp, level, message]
      properties:
        timestamp:  { type: string, format: date-time }
        level:      { type: string, enum: [debug, info, warn, error] }
        message:    { type: string }
        container:  { type: string, nullable: true }
        stream:     { type: string, enum: [stdout, stderr], nullable: true }

    InstanceLogListResponse:
      type: object
      required: [items]
      properties:
        items:       { type: array, items: { $ref: '#/components/schemas/InstanceLogEntry' } }
        next_cursor: { type: string, nullable: true }

    InstanceEvent:
      type: object
      required: [id, instance_id, type, reason, message, occurred_at]
      properties:
        id:          { type: string }
        instance_id: { type: string, format: uuid }
        type:        { type: string, enum: [Normal, Warning] }
        reason:      { type: string }
        message:     { type: string }
        count:       { type: integer }
        occurred_at: { type: string, format: date-time }

    InstanceEventListResponse:
      type: object
      required: [items]
      properties:
        items:       { type: array, items: { $ref: '#/components/schemas/InstanceEvent' } }
        next_cursor: { type: string, nullable: true }

    InstanceMetrics:
      type: object
      required: [instance_id, timestamp]
      properties:
        instance_id:          { type: string, format: uuid }
        timestamp:            { type: string, format: date-time }
        cpu_utilization_pct:  { type: number, nullable: true }
        memory_used_mb:       { type: number, nullable: true }
        memory_total_mb:      { type: number, nullable: true }
        gpu_utilization_pct:  { type: number, nullable: true }
        gpu_memory_used_mb:   { type: number, nullable: true }
        gpu_memory_total_mb:  { type: number, nullable: true }
        network_rx_bytes:     { type: integer, nullable: true }
        network_tx_bytes:     { type: integer, nullable: true }

    InstanceSecurityEvent:
      type: object
      required: [id, instance_id, event_type, severity, occurred_at]
      properties:
        id:          { type: string, format: uuid }
        instance_id: { type: string, format: uuid }
        event_type:  { type: string }
        severity:    { type: string, enum: [info, warning, critical] }
        description: { type: string, nullable: true }
        occurred_at: { type: string, format: date-time }

    InstanceSecurityEventListResponse:
      type: object
      required: [items]
      properties:
        items:       { type: array, items: { $ref: '#/components/schemas/InstanceSecurityEvent' } }
        next_cursor: { type: string, nullable: true }

    InstanceExecSession:
      type: object
      required: [id, instance_id, ws_url, expires_at]
      properties:
        id:          { type: string, format: uuid }
        instance_id: { type: string, format: uuid }
        ws_url:      { type: string, format: uri }
        token:       { type: string }
        expires_at:  { type: string, format: date-time }

    CreateInstanceExecSessionRequest:
      type: object
      required: [idempotency_key]
      properties:
        idempotency_key: { type: string }
        container:       { type: string, nullable: true }
        command:
          type: array
          items: { type: string }
          default: ["/bin/sh"]
        tty:  { type: boolean, default: true }
        rows: { type: integer, default: 24 }
        cols: { type: integer, default: 80 }

    NetworkRoute:
      type: object
      required: [id, vpc_id, destination_cidr, next_hop_type, next_hop_id, created_at]
      properties:
        id:               { type: string, format: uuid }
        vpc_id:           { type: string, format: uuid }
        destination_cidr: { type: string }
        next_hop_type:    { type: string, enum: [gateway, instance, nat] }
        next_hop_id:      { type: string, format: uuid }
        description:      { type: string, nullable: true }
        created_at:       { type: string, format: date-time }

    NetworkRouteListResponse:
      type: object
      required: [items]
      properties:
        items:       { type: array, items: { $ref: '#/components/schemas/NetworkRoute' } }
        next_cursor: { type: string, nullable: true }

    CreateNetworkRouteRequest:
      type: object
      required: [idempotency_key, vpc_id, destination_cidr, next_hop_type, next_hop_id]
      properties:
        idempotency_key:  { type: string }
        vpc_id:           { type: string, format: uuid }
        destination_cidr: { type: string }
        next_hop_type:    { type: string, enum: [gateway, instance, nat] }
        next_hop_id:      { type: string, format: uuid }
        description:      { type: string }

    VolumeSnapshotRecord:
      type: object
      required: [id, volume_id, name, status, size_bytes, created_at]
      properties:
        id:         { type: string, format: uuid }
        volume_id:  { type: string, format: uuid }
        name:       { type: string }
        status:     { type: string, enum: [creating, available, error, deleting] }
        size_bytes: { type: integer }
        created_at: { type: string, format: date-time }

    VolumeSnapshotListResponse:
      type: object
      required: [items]
      properties:
        items:       { type: array, items: { $ref: '#/components/schemas/VolumeSnapshotRecord' } }
        next_cursor: { type: string, nullable: true }

    CreateVolumeSnapshotRequest:
      type: object
      required: [idempotency_key, name]
      properties:
        idempotency_key: { type: string }
        name:            { type: string }
        description:     { type: string }

    FilesystemMountTarget:
      type: object
      required: [id, filesystem_id, subnet_id, ip_address, status, created_at]
      properties:
        id:            { type: string, format: uuid }
        filesystem_id: { type: string, format: uuid }
        subnet_id:     { type: string, format: uuid }
        ip_address:    { type: string }
        status:        { type: string, enum: [creating, available, deleting, error] }
        created_at:    { type: string, format: date-time }

    FilesystemMountTargetListResponse:
      type: object
      required: [items]
      properties:
        items:       { type: array, items: { $ref: '#/components/schemas/FilesystemMountTarget' } }
        next_cursor: { type: string, nullable: true }

    StorageBucketRecord:
      type: object
      required: [id, name, access_mode, created_at]
      properties:
        id:           { type: string, format: uuid }
        name:         { type: string }
        region:       { type: string, nullable: true }
        access_mode:  { type: string, enum: [private, public_read] }
        object_count: { type: integer }
        size_bytes:   { type: integer }
        created_at:   { type: string, format: date-time }

    StorageBucketListResponse:
      type: object
      required: [items]
      properties:
        items:       { type: array, items: { $ref: '#/components/schemas/StorageBucketRecord' } }
        next_cursor: { type: string, nullable: true }

    CreateStorageBucketRequest:
      type: object
      required: [idempotency_key, name]
      properties:
        idempotency_key: { type: string }
        name:        { type: string, pattern: '^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$' }
        region:      { type: string }
        access_mode: { type: string, enum: [private, public_read], default: private }

    StorageObjectUploadRequest:
      type: object
      required: [idempotency_key, bucket_id, key]
      properties:
        idempotency_key: { type: string }
        bucket_id:    { type: string, format: uuid }
        key:          { type: string }
        content_type: { type: string }

    StorageObjectUploadResponse:
      type: object
      required: [upload_url, object_id]
      properties:
        upload_url: { type: string, format: uri }
        object_id:  { type: string, format: uuid }
        expires_at: { type: string, format: date-time }

    StorageObjectDownloadInfo:
      type: object
      required: [download_url]
      properties:
        download_url: { type: string, format: uri }
        expires_at:   { type: string, format: date-time }
        content_type: { type: string, nullable: true }
        size_bytes:   { type: integer, nullable: true }

    VectorStoreDocumentInsertRequest:
      type: object
      required: [idempotency_key, documents]
      properties:
        idempotency_key: { type: string }
        documents:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: object
            required: [content]
            properties:
              content:  { type: string }
              metadata: { type: object, additionalProperties: true }
              id:       { type: string }

    VectorStoreDocumentInsertResponse:
      type: object
      required: [inserted_count, task_id]
      properties:
        inserted_count: { type: integer }
        task_id:        { type: string, format: uuid }
        status:         { type: string, enum: [pending, completed, failed] }

    K8sClusterWorkload:
      type: object
      required: [name, namespace, kind, replicas, ready_replicas, status, created_at]
      properties:
        name:           { type: string }
        namespace:      { type: string }
        kind:           { type: string, enum: [Deployment, StatefulSet, DaemonSet, Job, CronJob] }
        replicas:       { type: integer }
        ready_replicas: { type: integer }
        image:          { type: string, nullable: true }
        status:         { type: string, enum: [running, pending, failed, succeeded] }
        created_at:     { type: string, format: date-time }

    K8sClusterWorkloadListResponse:
      type: object
      required: [items]
      properties:
        items:       { type: array, items: { $ref: '#/components/schemas/K8sClusterWorkload' } }
        next_cursor: { type: string, nullable: true }
        total:       { type: integer }

    GPUInventoryRecord:
      type: object
      required: [id, node_name, gpu_type, gpu_index, status]
      properties:
        id:              { type: string, format: uuid }
        node_name:       { type: string }
        gpu_type:        { type: string }
        gpu_index:       { type: integer }
        memory_total_mb: { type: integer }
        driver_version:  { type: string, nullable: true }
        status:          { type: string, enum: [available, in_use, fault, maintenance] }
        tenant_id:       { type: string, format: uuid, nullable: true }
        instance_id:     { type: string, format: uuid, nullable: true }

    GPUInventoryListResponse:
      type: object
      required: [items]
      properties:
        items:       { type: array, items: { $ref: '#/components/schemas/GPUInventoryRecord' } }
        next_cursor: { type: string, nullable: true }
        total:       { type: integer }

    GPUOccupancyStats:
      type: object
      required: [total, in_use, available, fault]
      properties:
        total:     { type: integer }
        in_use:    { type: integer }
        available: { type: integer }
        fault:     { type: integer }
        by_gpu_type:
          type: array
          items:
            type: object
            properties:
              gpu_type:  { type: string }
              total:     { type: integer }
              in_use:    { type: integer }
              available: { type: integer }

    SandboxTemplate:
      type: object
      required: [id, name, image, created_at]
      properties:
        id:          { type: string, format: uuid }
        name:        { type: string }
        image:       { type: string }
        description: { type: string, nullable: true }
        cpu_cores:   { type: number, nullable: true }
        memory_gb:   { type: number, nullable: true }
        storage_gb:  { type: number, nullable: true }
        is_builtin:  { type: boolean, default: false }
        created_at:  { type: string, format: date-time }

    SandboxTemplateListResponse:
      type: object
      required: [items]
      properties:
        items:       { type: array, items: { $ref: '#/components/schemas/SandboxTemplate' } }
        next_cursor: { type: string, nullable: true }

  # 公共响应
  responses:
    Unauthorized:
      description: 未认证或 Token 无效（code=UNAUTHORIZED）
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: 无权访问该资源（code=FORBIDDEN）
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: 资源不存在（code=NOT_FOUND）
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    BadRequest:
      description: 请求参数不合法（code=BAD_REQUEST）
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: 资源已存在或冲突（code=CONFLICT）
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    RateLimitExceeded:
      description: 超出速率限制（code=RATE_LIMIT_EXCEEDED）
      headers:
        Retry-After:
          schema: { type: integer }
          description: "建议等待的秒数"
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    PreconditionFailed:
      description: 前置条件不满足（code=PRECONDITION_FAILED）
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

security:
  - BearerAuth: []
  - ApiKeyAuth: []

# ── API 路径定义 ──────────────────────────────────────────────────────────────
# 说明：/demo/* 路径已迁移至 api/openapi/dev.yaml（不参与 SDK 生成）
paths:

  # ── 健康检查（K8s probe 必须）──────────────────────────────────────────────
  /healthz:
    get:
      operationId: liveness
      summary: Liveness probe（进程存活检查）
      description: |
        K8s liveness probe 端点。只要进程能响应即返回 200。
        不检查依赖（Postgres/NATS/Redis），仅表示"进程在运行"。
        不需要认证。
      tags: [Health]
      security: []
      responses:
        "200":
          description: 进程存活
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:   { type: string, enum: [ok], example: "ok" }
                  version:  { type: string, example: "v0.8.0" }
                  build_at: { type: string, format: date-time }
        "503":
          description: 进程异常（极少见，进程若能响应通常返回200）
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /readyz:
    get:
      operationId: readiness
      summary: Readiness probe（服务就绪检查）
      description: |
        K8s readiness probe 端点。检查所有关键依赖是否可用。
        任一依赖不可用则返回 503，此时 K8s 从 LB 摘除该实例。
        不需要认证。
      tags: [Health]
      security: []
      responses:
        "200":
          description: 服务就绪，可接受流量
          content:
            application/json:
              schema:
                type: object
                required: [status, checks]
                properties:
                  status: { type: string, enum: [ok, degraded] }
                  checks:
                    type: object
                    description: 各依赖的健康状态
                    additionalProperties:
                      type: object
                      properties:
                        status:  { type: string, enum: [ok, fail] }
                        latency_ms: { type: integer }
                        error:   { type: string, nullable: true }
                    example:
                      postgres:  { status: ok, latency_ms: 3 }
                      nats:      { status: ok, latency_ms: 1 }
                      redis:     { status: ok, latency_ms: 1 }
        "503":
          description: 服务未就绪（至少一个依赖不可用）
          content:
            application/json:
              schema:
                type: object
                required: [status, checks]
                properties:
                  status: { type: string, enum: [degraded, error] }
                  checks: { type: object, additionalProperties: true }

  # ── 认证 ────────────────────────────────────────────────────────────────────
  /auth/oidc/begin:
    post:
      operationId: beginOIDCLogin
      summary: 发起 OIDC 登录
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BeginOIDCLoginRequest' }
      responses:
        "200":
          description: 返回 Dex/OIDC 授权地址
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BeginOIDCLoginResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }

  /auth/token:
    post:
      operationId: completeOIDCLogin
      summary: OIDC callback 换取 TokenPair
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CompleteOIDCLoginRequest' }
      responses:
        "200":
          description: OIDC 登录完成
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPairResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }

  /auth/refresh:
    post:
      summary: 刷新 AccessToken
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshAccessTokenRequest' }
      responses:
        "200":
          description: 刷新成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RefreshAccessTokenResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }

  /auth/logout:
    post:
      operationId: logout
      summary: 吊销当前 JWT JTI
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LogoutRequest' }
      responses:
        "200":
          description: Token 已吊销
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RevokeStatusResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

  /auth/api-keys:
    get:
      operationId: listAPIKeys
      summary: 列出当前租户 API Key
      tags: [Auth]
      parameters:
        - name: user_id
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: API Key 列表
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ListAPIKeysResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: createAPIKey
