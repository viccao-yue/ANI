openapi: 3.1.0

info:
  title: KuberCloud ANI Core API
  version: 1.0.0
  description: |
    KuberCloud ANI Core — 基础设施平台 REST API 契约（唯一真实来源）。

    ## 文件范围与边界
    本文件（api/openapi/v1.yaml）仅包含 ANI Core 基础设施资源：
    instances（VM/Container/GPU/Sandbox/BM/K8s集群）、volumes/filesystems/objects/
    vector-stores、networks、auth/secrets/encryption、gpu-inventory/dpu-inventory、
    registry/metering/observability/notifications/audit 等。
    ANI Services 资源（模型仓库/推理/知识库/PaaS）在 api/openapi/services/v1.yaml。

    ## URL 前缀规范
    servers[0].url = "https://{host}/api/v1"（前缀在 spec 中定义，Gateway 不做路径变换）。
    版本升级时新建 api/openapi/v2.yaml，本文件路径保持稳定。

    ## SDK 生成（make gen-core-sdk）
    Go: github.com/kubercloud/ani-go | Python: pip install kubercloud-ani
    TypeScript: @kubercloud/ani-client | Java: com.kubercloud:ani-java

    ## 认证
    Bearer JWT（1小时有效）或 X-API-Key Header。
    tenant_id 从 JWT claims 提取，请求体中的 tenant_id 字段将被忽略。

    ## 错误格式
    `{ code: string, message: string, request_id: string, details?: object }`
    标准错误码：UNAUTHORIZED / FORBIDDEN / NOT_FOUND / CONFLICT / BAD_REQUEST /
    RATE_LIMIT_EXCEEDED / NOT_IMPLEMENTED / INTERNAL_ERROR

    ## 分页
    cursor 分页：`?limit=20&cursor=<token>` → `{ items: [], next_cursor: string | null }`

    ## 异步操作
    202 响应体返回 AsyncTask，Location Header 附任务 URL。
    轮询 GET /api/v1/tasks/{task_id} 或配置 Webhook。

servers:
  - url: https://{host}/api/v1
    variables:
      host:
        default: ani.internal
        description: ANI Gateway 地址（支持IP地址）

# ── 认证方式 ─────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT AccessToken（有效期1小时，通过 /auth/token 获取）
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: 长期 API Key（在 Console → 设置 → API Key 中创建）

# ── 公共 Schema ───────────────────────────────────────────────────────────────
  schemas:

    K8sClusterCreateRequest:
      type: object
      properties:
        idempotency_key: { type: string }
        name:            { type: string }
        version:         { type: string }
      required: [idempotency_key, name]
    K8sClusterUpgradeRequest:
      type: object
      properties:
        idempotency_key: { type: string }
        version:         { type: string }
      required: [idempotency_key, version]
    K8sCluster:
      type: object
      properties:
        id:         { type: string }
        tenant_id:  { type: string }
        name:       { type: string }
        version:    { type: string }
        state:      { type: string, enum: [provisioning, running, deleting] }
        reason:     { type: string }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    K8sClusterListResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/K8sCluster" } }
        total: { type: integer }
        next_cursor: { type: string, nullable: true }
    K8sClusterNodePoolGPU:
      type: object
      properties:
        vendor:        { type: string }
        model:         { type: string }
        count:         { type: integer }
        resource_name: { type: string }
    K8sClusterNodePoolCreateRequest:
      type: object
      properties:
        idempotency_key: { type: string }
        name:            { type: string }
        node_count:      { type: integer, minimum: 1 }
        instance_type:   { type: string }
        gpu:
          $ref: '#/components/schemas/K8sClusterNodePoolGPU'
      required: [idempotency_key, name, node_count, instance_type]
    K8sClusterNodePoolUpdateRequest:
      type: object
      properties:
        idempotency_key: { type: string }
        node_count:      { type: integer, minimum: 0 }
        instance_type:   { type: string }
        gpu:
          $ref: '#/components/schemas/K8sClusterNodePoolGPU'
      required: [idempotency_key, node_count, instance_type]
    K8sClusterNodePool:
      type: object
      properties:
        id:            { type: string }
        tenant_id:     { type: string }
        cluster_id:    { type: string }
        name:          { type: string }
        node_count:    { type: integer }
        instance_type: { type: string }
        gpu:
          $ref: '#/components/schemas/K8sClusterNodePoolGPU'
        state:         { type: string, enum: [running, deleting] }
        reason:        { type: string }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'
        created_at:    { type: string, format: date-time }
        updated_at:    { type: string, format: date-time }
    K8sClusterNodePoolListResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/K8sClusterNodePool" } }
        total: { type: integer }
        next_cursor: { type: string, nullable: true }
    K8sClusterKubeconfig:
      type: object
      properties:
        cluster_id: { type: string }
        tenant_id:  { type: string }
        server:     { type: string }
        namespace:  { type: string }
        ca_data:    { type: string }
        token:      { type: string }
        kubeconfig: { type: string }
        expires_at: { type: string, format: date-time }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'
    K8sClusterProxyRequest:
      type: object
      properties:
        idempotency_key: { type: string }
        method:
          type: string
          enum: [GET, POST, PUT, PATCH, DELETE]
        path:
          type: string
          description: 原生 Kubernetes API path，仅允许 /api/、/apis/、/healthz、/livez、/readyz、/version 范围。
        query:
          type: object
          additionalProperties: { type: string }
        body:
          type: object
          additionalProperties: true
      required: [idempotency_key, method, path]
    K8sClusterProxyResponse:
      type: object
      properties:
        cluster_id: { type: string }
        tenant_id:  { type: string }
        method:     { type: string }
        path:       { type: string }
        query:
          type: object
          additionalProperties: { type: string }
        status_code: { type: integer }
        headers:
          type: object
          additionalProperties: { type: string }
        body:
          type: object
          additionalProperties: true
        proxied_at: { type: string, format: date-time }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'

    EncryptionKeyCreateRequest:
      type: object
      properties:
        idempotency_key: { type: string }
        name:            { type: string }
        algorithm:       { type: string, enum: [SM4, AES256] }
      required: [idempotency_key, name]
    EncryptionKey:
      type: object
      properties:
        id:         { type: string }
        tenant_id:  { type: string }
        name:       { type: string }
        algorithm:  { type: string }
        state:      { type: string, enum: [active, rotated, revoked, deleted] }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    EncryptionKeyListResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/EncryptionKey" } }
        total: { type: integer }
        next_cursor: { type: string, nullable: true }
    EncryptionKeyRotateRequest:
      type: object
      properties:
        idempotency_key: { type: string }
      required: [idempotency_key]
    EncryptionKeyRevokeRequest:
      type: object
      properties:
        idempotency_key: { type: string }
        reason:          { type: string }
      required: [idempotency_key]
    EncryptionKeyRotationResponse:
      type: object
      properties:
        rotation_id:     { type: string }
        tenant_id:       { type: string }
        previous_key_id: { type: string }
        rotated_key:
          $ref: "#/components/schemas/EncryptionKey"
        rotated_at: { type: string, format: date-time }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'
    EncryptionSealRequest:
      type: object
      properties:
        idempotency_key: { type: string }
        key_id:          { type: string }
        object_uri:      { type: string }
      required: [idempotency_key, key_id, object_uri]
    EncryptionSealResponse:
      type: object
      properties:
        key_id:            { type: string }
        tenant_id:         { type: string }
        object_uri:        { type: string }
        sealed_object_uri: { type: string }
        unseal_token:      { type: string }
        expires_at:        { type: string, format: date-time }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'
    EncryptionUnsealTokenRequest:
      type: object
      properties:
        key_id:            { type: string }
        sealed_object_uri: { type: string }
      required: [key_id, sealed_object_uri]
    EncryptionUnsealTokenResponse:
      type: object
      properties:
        key_id:            { type: string }
        tenant_id:         { type: string }
        sealed_object_uri: { type: string }
        unseal_token:      { type: string }
        expires_at:        { type: string, format: date-time }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'

    SecretCreateRequest:
      type: object
      properties:
        idempotency_key: { type: string }
        name:            { type: string }
        type:            { type: string, enum: [opaque, dockerconfigjson, tls] }
        data:
          type: object
          additionalProperties: { type: string }
      required: [idempotency_key, name, data]
    Secret:
      type: object
      properties:
        id:         { type: string }
        tenant_id:  { type: string }
        name:       { type: string }
        type:       { type: string }
        keys:       { type: array, items: { type: string } }
        state:      { type: string, enum: [active, deleted] }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    SecretListResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/Secret" } }
        total: { type: integer }
        next_cursor: { type: string, nullable: true }
    SecretBindingRequest:
      type: object
      properties:
        target_type: { type: string, enum: [instance, k8s-cluster, service] }
        target_id:   { type: string }
        mount_path:  { type: string }
        env_prefix:  { type: string }
      required: [target_type, target_id]
    SecretBinding:
      type: object
      properties:
        id:          { type: string }
        secret_id:   { type: string }
        tenant_id:   { type: string }
        target_type: { type: string }
        target_id:   { type: string }
        mount_path:  { type: string }
        env_prefix:  { type: string }
        state:       { type: string }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'
        created_at:  { type: string, format: date-time }

    # 所有错误响应的统一格式
    ErrorResponse:
      type: object
      required: [code, message, request_id]
      properties:
        code:        { type: string, example: "MODEL_NOT_FOUND" }
        message:     { type: string, example: "模型 qwen2.5-72b 不存在" }
        request_id:  { type: string, example: "req_01j8xabc" }
        details:     { type: object, additionalProperties: true }

    # Cursor 分页（所有列表接口统一使用此格式）
    CursorPage:
      type: object
      required: [items, total]
      properties:
        total:       { type: integer, description: "总记录数（用于显示）", example: 42 }
        next_cursor: { type: string, nullable: true, description: "下一页游标；null 表示已到最后一页" }

    # 异步任务（统一格式，202 响应一律返回此 schema）
    AsyncTask:
      type: object
      required: [id, idempotency_key, task_type, status, created_at]
      properties:
        id:               { type: string, format: uuid }
        idempotency_key:  { type: string, description: "客户端提供的幂等键" }
        task_type:        { type: string, example: "model.import",
                            enum: [model.import, kb.parse, kb.index, inference.deploy] }
        resource_type:    { type: string, nullable: true,
                            enum: [inference_service, kb_document, model_version] }
        resource_id:      { type: string, format: uuid, nullable: true }
        status:           { type: string,
                            enum: [pending, running, completed, failed, cancelled, dead_letter] }
        attempt_count:    { type: integer, minimum: 0 }
        max_attempts:     { type: integer, minimum: 1 }
        progress_pct:     { type: integer, minimum: 0, maximum: 100 }
        result:           { type: object, nullable: true }
        error_message:    { type: string, nullable: true }
        dead_letter_at:   { type: string, format: date-time, nullable: true }
        created_at:       { type: string, format: date-time }
        completed_at:     { type: string, format: date-time, nullable: true }

    # Demo/Services schemas 已迁移：
    # - DemoInstance/DemoCreateInstanceRequest → api/openapi/dev.yaml
    # - Model/InferenceService/KnowledgeBase path/schema → api/openapi/services/v1.yaml

    # ── ANI Core 基础设施 Schemas ─────────────────────────────────────────────

    HealthCheck:
      type: object
      required: [status, checks]
      properties:
        status:  { type: string, enum: [ok, degraded, error] }
        version: { type: string, example: "v0.8.0" }
        checks:
          type: object
          additionalProperties:
            type: object
            properties:
              status:     { type: string, enum: [ok, fail] }
              latency_ms: { type: integer }
              error:      { type: string, nullable: true }

    CoreDevProfileInfo:
      type: object
      description: "Core dev/local profile 标记；用于区分本地联调成功与真实 provider 执行成功。"
      required: [mode, provider, real_provider]
      properties:
        mode:          { type: string, enum: [local, real] }
        provider:      { type: string }
        real_provider: { type: boolean }
        reason:        { type: string, nullable: true }

    InstanceRecord:
      type: object
      description: ANI Core 计算实例（VM/Container/GPU/Sandbox/BM/K8s集群/Batch）
      required: [id, tenant_id, name, kind, state, provider, created_at, updated_at]
      properties:
        id:             { type: string }
        tenant_id:      { type: string }
        name:           { type: string }
        kind:           { type: string, enum: [vm, container, gpu_container, sandbox, batch_job, notebook, k8s_cluster, bare_metal, dpu_node] }
        instance_type:  { type: string, enum: [vm, container, gpu_container, sandbox, batch_job, notebook, k8s_cluster, bare_metal, dpu_node], description: "kind 的兼容别名；新客户端可用 instance_type 表达实例类型。" }
        state:          { type: string, enum: [pending, provisioning, starting, running, stopping, stopped, failed, deleting, deleted] }
        state_reason:   { type: string, nullable: true, description: "机器可读的状态原因码，如 InsufficientGPU" }
        state_message:  { type: string, nullable: true, description: "人类可读的状态描述" }
        provider:       { type: string, example: "kubernetes_rest" }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'
        audit_id:       { type: string, nullable: true }
        resource_refs:  { type: array, items: { type: string } }
        endpoint:       { type: string, nullable: true }
        node_name:      { type: string, nullable: true }
        termination_protection: { type: boolean, default: false, description: "VM 危险操作保护开关；开启后 stop/delete/rebuild 等操作必须先关闭保护" }
        ssh:
          type: object
          nullable: true
          description: "VM SSH 连接信息；仅返回连接元数据，不返回私钥"
          required: [username, host, port, ready]
          properties:
            username: { type: string, example: "ubuntu" }
            host:     { type: string, nullable: true }
            port:     { type: integer, default: 22 }
            key_ref:  { type: string, nullable: true, description: "SSH key/secret 引用；不包含私钥内容" }
            ready:    { type: boolean, description: "连接信息是否已可用于发起 SSH" }
            reason:   { type: string, nullable: true }
        volumes:
          type: array
          items:
            type: object
            required: [name, kind]
            properties:
              name:       { type: string }
              kind:       { type: string, enum: [root_disk, data_disk, shared_pvc, object_fuse, ephemeral] }
              size_gib:   { type: integer, format: int64 }
              source_ref: { type: string, nullable: true }
              mount_path: { type: string, nullable: true }
              read_only:  { type: boolean, default: false }
        container:
          type: object
          nullable: true
          description: "Container/GPU Container 部署状态摘要"
          properties:
            replicas:       { type: integer, minimum: 0, default: 1 }
            ready_replicas: { type: integer, minimum: 0, default: 0 }
            revision:       { type: string, nullable: true }
            rollout_status: { type: string, nullable: true, enum: [pending, progressing, healthy, degraded, rolled_back] }
            history:
              type: array
              items:
                type: object
                required: [revision, created_at]
                properties:
                  revision:   { type: string }
                  image:      { type: string, nullable: true }
                  created_at: { type: string, format: date-time }
        gpu:
          type: object
          nullable: true
          description: "GPU container 调度和利用率状态"
          properties:
            vendor:                { type: string, nullable: true }
            model:                 { type: string, nullable: true }
            count:                 { type: integer, minimum: 0 }
            scheduling_reason:     { type: string, nullable: true }
            utilization_percent:   { type: number, format: float, minimum: 0, maximum: 100, nullable: true }
        sandbox:
          $ref: '#/components/schemas/SandboxInstanceStatus'
        workload_identity:
          $ref: '#/components/schemas/WorkloadIdentityBinding'
        snapshots:
          type: array
          description: "VM 快照元数据；provider-native 快照执行后续通过 reconcile 对齐"
          items:
            type: object
            required: [id, name, source_instance_id, state, created_at]
            properties:
              id:                 { type: string }
              name:               { type: string }
              source_instance_id: { type: string }
              state:              { type: string, enum: [creating, ready, failed, deleting, deleted] }
              reason:             { type: string, nullable: true }
              created_at:         { type: string, format: date-time }
              ready_at:           { type: string, format: date-time, nullable: true }
        created_at:     { type: string, format: date-time }
        updated_at:     { type: string, format: date-time }

    WorkloadIdentityBinding:
      type: object
      description: "实例生命周期绑定的 scoped API key 摘要；不返回 key 明文。"
      required: [active]
      properties:
        key_id:     { type: string, nullable: true }
        key_prefix: { type: string, nullable: true, description: "仅用于展示和排查，不可用于认证" }
        scopes:
          type: array
          items: { type: string, pattern: "^scope:[a-z0-9_-]+:(\\*|[a-z0-9_-]+)$" }
        active:     { type: boolean }
        created_at: { type: string, format: date-time, nullable: true }
        revoked_at: { type: string, format: date-time, nullable: true }

    InstanceOperation:
      type: object
      description: 实例操作记录（创建/启动/停止/变配/删除等）
      required: [id, instance_id, tenant_id, operation, status, requested_by, created_at]
      properties:
        id:               { type: string }
        instance_id:      { type: string }
        tenant_id:        { type: string }
        operation:        { type: string, enum: [create, start, stop, restart, resize, rebuild, delete, snapshot, attach_volume, detach_volume, rollback, console_session] }
        status:           { type: string, enum: [accepted, in_progress, succeeded, failed, cancelled] }
        idempotency_key:  { type: string, nullable: true, description: "客户端提供的幂等键" }
        requested_by:     { type: string, description: "发起操作的用户 ID" }
        precheck_result:  { type: object, nullable: true }
        failure_reason:   { type: string, nullable: true }
        failure_message:  { type: string, nullable: true }
        retry_eligible:   { type: boolean, default: false }
        steps:
          type: array
          items:
            type: object
            required: [step_name, status]
            properties:
              step_name:    { type: string, example: "admission_check" }
              status:       { type: string, enum: [pending, running, succeeded, failed, skipped] }
              message:      { type: string, nullable: true }
              started_at:   { type: string, format: date-time, nullable: true }
              completed_at: { type: string, format: date-time, nullable: true }
        before_spec:      { type: object, nullable: true, description: "变更前的实例规格快照（用于 diff）" }
        after_spec:       { type: object, nullable: true, description: "变更后的实例规格快照" }
        created_at:       { type: string, format: date-time }
        updated_at:       { type: string, format: date-time }

    InstanceListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/InstanceRecord' }
        total:       { type: integer }
        next_cursor: { type: string, nullable: true }

    CreateInstanceRequest:
      type: object
      required: [name, kind, idempotency_key]
      properties:
        idempotency_key: { type: string, minLength: 1, maxLength: 128, description: "客户端生成；同一 tenant_id 下 24 小时内去重" }
        name:           { type: string, minLength: 1, maxLength: 128 }
        kind:           { type: string, enum: [vm, container, gpu_container, sandbox] }
        instance_type:  { type: string, enum: [vm, container, gpu_container, sandbox], description: "kind 的兼容别名；两者同时传入时必须一致。" }
        image:          { type: string, nullable: true, description: "容器镜像或运行时镜像引用" }
        cpu:            { type: string, example: "2" }
        memory:         { type: string, example: "4Gi" }
        auto_start:     { type: boolean, default: true }
        boot_image:     { type: string, nullable: true, description: "VM boot image 引用" }
        ssh_username:   { type: string, nullable: true, default: "ubuntu", description: "VM SSH 用户名；仅 VM 使用" }
        ssh_key_ref:    { type: string, nullable: true, description: "VM SSH key/secret 引用；不包含私钥内容" }
        termination_protection: { type: boolean, default: false }
        gpu:
          type: object
          nullable: true
          properties:
            vendor: { type: string, example: "nvidia" }
            model:  { type: string, example: "A100" }
            count:  { type: integer, minimum: 1, default: 1 }
        replicas:
          type: integer
          minimum: 1
          default: 1
          description: "Container/GPU Container 副本数；VM 固定为 1"
        sandbox_config:
          $ref: '#/components/schemas/SandboxConfig'

    SandboxNetworkEgressPolicy:
      type: string
      description: "Sandbox 出口策略；local profile 仅记录意图，不代表真实网络隔离已执行。"
      enum: [deny_all, allowlist, internet]

    SandboxConfig:
      type: object
      description: "Sandbox 实例配置；表达 ANI 产品意图，不暴露 Kubernetes/Kata provider 对象。"
      properties:
        runtime_class:
          type: string
          default: sandbox-kata
          description: "目标 RuntimeClass 名称，P0 默认 Kata Containers QEMU profile。"
        session_timeout:
          type: string
          default: 30m
          description: "会话最大存活时间，Go duration 字符串，如 30m、2h。"
        network_egress_policy:
          $ref: '#/components/schemas/SandboxNetworkEgressPolicy'

    SandboxInstanceStatus:
      type: object
      nullable: true
      description: "Sandbox 实例运行摘要；dev_profile.real_provider=false 时仅表示 local profile 状态机。"
      required: [runtime_class, session_timeout, network_egress_policy, session_state]
      properties:
        runtime_class:          { type: string }
        session_timeout:        { type: string }
        network_egress_policy:
          $ref: '#/components/schemas/SandboxNetworkEgressPolicy'
        session_state:          { type: string, enum: [pending, running, expired, stopped] }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'

    ObservabilityQueryResponse:
      type: object
      description: "PromQL 代理查询结果；不暴露底层 Prometheus 地址。"
      required: [query, result_type, results, dev_profile]
      properties:
        query:       { type: string }
        result_type: { type: string, enum: [vector, matrix, scalar, string] }
        results:
          type: array
          items:
            type: object
            required: [metric, value]
            properties:
              metric:
                type: object
                additionalProperties: { type: string }
              value: { type: number, format: double }
              timestamp: { type: string, format: date-time, nullable: true }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'

    ObservabilityAlertRule:
      type: object
      required: [id, tenant_id, name, promql, severity, state, created_at, updated_at]
      properties:
        id:          { type: string }
        tenant_id:   { type: string }
        name:        { type: string }
        promql:      { type: string }
        duration:    { type: string, default: 5m }
        severity:    { type: string, enum: [info, warning, critical] }
        labels:
          type: object
          additionalProperties: { type: string }
        annotations:
          type: object
          additionalProperties: { type: string }
        enabled:     { type: boolean, default: true }
        state:       { type: string, enum: [active, disabled, deleted] }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    ObservabilityAlertRuleListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ObservabilityAlertRule' }
        total:       { type: integer }
        next_cursor: { type: string, nullable: true }

    CreateObservabilityAlertRuleRequest:
      type: object
      required: [idempotency_key, name, promql, severity]
      properties:
        idempotency_key: { type: string, minLength: 1, maxLength: 128 }
        name:           { type: string, minLength: 1, maxLength: 128 }
        promql:         { type: string, minLength: 1 }
        duration:       { type: string, default: 5m }
        severity:       { type: string, enum: [info, warning, critical] }
        labels:
          type: object
          additionalProperties: { type: string }
        annotations:
          type: object
          additionalProperties: { type: string }
        enabled:        { type: boolean, default: true }

    UpdateObservabilityAlertRuleRequest:
      type: object
      required: [idempotency_key]
      properties:
        idempotency_key: { type: string, minLength: 1, maxLength: 128 }
        name:           { type: string, minLength: 1, maxLength: 128 }
        promql:         { type: string, minLength: 1 }
        duration:       { type: string }
        severity:       { type: string, enum: [info, warning, critical] }
        labels:
          type: object
          additionalProperties: { type: string }
        annotations:
          type: object
          additionalProperties: { type: string }
        enabled:        { type: boolean }

    MeteringUsageRecord:
      type: object
      required: [resource_type, total_quantity, unit]
      properties:
        resource_type:  { type: string, enum: [instance_cpu_seconds, instance_memory_gib_seconds, instance_gpu_seconds, token_input, token_output, token_total] }
        total_quantity: { type: number, format: double }
        unit:           { type: string }
        period:         { type: string, nullable: true }
        tenant_id:      { type: string, nullable: true }

    MeteringUsageResponse:
      type: object
      required: [items, total, dev_profile]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/MeteringUsageRecord' }
        total: { type: integer }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'

    ReportTokenUsageRequest:
      type: object
      required: [idempotency_key, source, model, input_tokens, output_tokens]
      properties:
        idempotency_key: { type: string, minLength: 1, maxLength: 128 }
        source:          { type: string, description: "上报来源，如 model-service、inference-gateway" }
        model:           { type: string }
        input_tokens:    { type: integer, format: int64, minimum: 0 }
        output_tokens:   { type: integer, format: int64, minimum: 0 }
        request_id:      { type: string, nullable: true }
        instance_id:     { type: string, nullable: true }
        occurred_at:     { type: string, format: date-time, nullable: true }
        labels:
          type: object
          additionalProperties: { type: string }

    TokenUsageReport:
      type: object
      required: [id, tenant_id, source, model, input_tokens, output_tokens, total_tokens, state, created_at]
      properties:
        id:            { type: string }
        tenant_id:     { type: string }
        source:        { type: string }
        model:         { type: string }
        input_tokens:  { type: integer, format: int64 }
        output_tokens: { type: integer, format: int64 }
        total_tokens:  { type: integer, format: int64 }
        request_id:    { type: string, nullable: true }
        instance_id:   { type: string, nullable: true }
        state:         { type: string, enum: [accepted, duplicate] }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'
        created_at:    { type: string, format: date-time }

    CreateInstanceResponse:
      type: object
      required: [instance, operation_id]
      properties:
        instance:     { $ref: '#/components/schemas/InstanceRecord' }
        operation_id: { type: string }
        audit_id:     { type: string, nullable: true }

    InstanceLifecycleRequest:
      type: object
      required: [action, idempotency_key]
      properties:
        action:
          type: string
          enum: [start, stop, restart, resize, rebuild, delete, snapshot, attach_volume, detach_volume, rollback]
        idempotency_key: { type: string, minLength: 1, maxLength: 128 }
        cpu:            { type: string, nullable: true, description: "resize 时使用" }
        memory:         { type: string, nullable: true, description: "resize 时使用" }
        snapshot_name:  { type: string, nullable: true, description: "snapshot 时指定快照名称；为空时由本地 profile 生成" }
        revision:       { type: string, nullable: true, description: "rollback 时指定目标 revision；为空时回滚上一版本" }
        volume_id:      { type: string, nullable: true, description: "attach_volume/detach_volume 时使用" }

    InstanceLifecycleResponse:
      type: object
      required: [instance, operation_id]
      properties:
        instance:     { $ref: '#/components/schemas/InstanceRecord' }
        operation_id: { type: string }

    CreateInstanceConsoleSessionRequest:
      type: object
      properties:
        protocol: { type: string, enum: [console, vnc, novnc, serial], default: "vnc" }

    InstanceConsoleSession:
      type: object
      required: [session_id, protocol, connect_url, url, expires_at]
      properties:
        operation_id: { type: string, nullable: true, description: "对应 operation timeline，可通过 /instance-operations/{operation_id} 查询" }
        session_id:  { type: string }
        protocol:    { type: string, enum: [console, vnc, novnc, serial] }
        connect_url: { type: string }
        url:         { type: string, description: "连接 URL，和 connect_url 等价，供 Console/SDK 直接使用" }
        expires_at:  { type: string, format: date-time }

    NetworkResourceState:
      type: string
      enum: [pending, available, failed, deleting, deleted]

    NetworkVPC:
      type: object
      required: [id, tenant_id, name, cidr, state, created_at, updated_at]
      properties:
        id:         { type: string }
        tenant_id:  { type: string }
        name:       { type: string }
        cidr:       { type: string, example: "10.20.0.0/16" }
        state:      { $ref: '#/components/schemas/NetworkResourceState' }
        reason:     { type: string, nullable: true }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    NetworkSubnet:
      type: object
      required: [id, tenant_id, vpc_id, name, cidr, state, created_at, updated_at]
      properties:
        id:         { type: string }
        tenant_id:  { type: string }
        vpc_id:     { type: string }
        name:       { type: string }
        cidr:       { type: string, example: "10.20.1.0/24" }
        gateway:    { type: string, nullable: true }
        state:      { $ref: '#/components/schemas/NetworkResourceState' }
        reason:     { type: string, nullable: true }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    NetworkSecurityGroupRule:
      type: object
      required: [direction, protocol, port_range, cidr, action]
      properties:
        direction:  { type: string, enum: [ingress, egress] }
        protocol:   { type: string, enum: [tcp, udp, icmp, all] }
        port_range: { type: string, example: "443" }
        cidr:       { type: string, example: "0.0.0.0/0" }
        action:     { type: string, enum: [allow, deny] }

    NetworkSecurityGroup:
      type: object
      required: [id, tenant_id, name, rules, state, created_at, updated_at]
      properties:
        id:          { type: string }
        tenant_id:   { type: string }
        name:        { type: string }
        description: { type: string, nullable: true }
        rules:
          type: array
          items: { $ref: '#/components/schemas/NetworkSecurityGroupRule' }
        state:      { $ref: '#/components/schemas/NetworkResourceState' }
        reason:     { type: string, nullable: true }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    NetworkLoadBalancerListener:
      type: object
      required: [protocol, port, target_port]
      properties:
        protocol:    { type: string, enum: [http, https, tcp] }
        port:        { type: integer, minimum: 1, maximum: 65535 }
        target_port: { type: integer, minimum: 1, maximum: 65535 }

    NetworkLoadBalancer:
      type: object
      required: [id, tenant_id, name, vpc_id, scheme, listeners, state, created_at, updated_at]
      properties:
        id:         { type: string }
        tenant_id:  { type: string }
        name:       { type: string }
        vpc_id:     { type: string }
        subnet_id:  { type: string, nullable: true }
        scheme:     { type: string, enum: [internal, public] }
        vip:        { type: string, nullable: true }
        listeners:
          type: array
          items: { $ref: '#/components/schemas/NetworkLoadBalancerListener' }
        state:      { $ref: '#/components/schemas/NetworkResourceState' }
        reason:     { type: string, nullable: true }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    NetworkVPCListResponse:
      type: object
      required: [items, total]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/NetworkVPC' } }
        total: { type: integer }
        next_cursor: { type: string, nullable: true }

    NetworkSubnetListResponse:
      type: object
      required: [items, total]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/NetworkSubnet' } }
        total: { type: integer }
        next_cursor: { type: string, nullable: true }

    NetworkSecurityGroupListResponse:
      type: object
      required: [items, total]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/NetworkSecurityGroup' } }
        total: { type: integer }
        next_cursor: { type: string, nullable: true }

    NetworkLoadBalancerListResponse:
      type: object
      required: [items, total]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/NetworkLoadBalancer' } }
        total: { type: integer }
        next_cursor: { type: string, nullable: true }

    CreateNetworkVPCRequest:
      type: object
      required: [name, idempotency_key]
      properties:
        idempotency_key: { type: string, minLength: 1, maxLength: 128, description: "客户端生成；同一 tenant_id 下 24 小时内去重" }
        name: { type: string, minLength: 1, maxLength: 128 }
        cidr: { type: string, default: "10.0.0.0/16" }

    CreateNetworkSubnetRequest:
      type: object
      required: [vpc_id, name, idempotency_key]
      properties:
        idempotency_key: { type: string, minLength: 1, maxLength: 128, description: "客户端生成；同一 tenant_id 下 24 小时内去重" }
        vpc_id:          { type: string }
        name:            { type: string, minLength: 1, maxLength: 128 }
        cidr:            { type: string, default: "10.0.1.0/24" }
        gateway:         { type: string, nullable: true }

    CreateNetworkSecurityGroupRequest:
      type: object
      required: [name, idempotency_key]
      properties:
        idempotency_key: { type: string, minLength: 1, maxLength: 128, description: "客户端生成；同一 tenant_id 下 24 小时内去重" }
        name:            { type: string, minLength: 1, maxLength: 128 }
        description:     { type: string, nullable: true }
        rules:
          type: array
          items: { $ref: '#/components/schemas/NetworkSecurityGroupRule' }

    CreateNetworkLoadBalancerRequest:
      type: object
      required: [name, vpc_id, idempotency_key]
      properties:
        idempotency_key: { type: string, minLength: 1, maxLength: 128, description: "客户端生成；同一 tenant_id 下 24 小时内去重" }
        name:            { type: string, minLength: 1, maxLength: 128 }
        vpc_id:          { type: string }
        subnet_id:       { type: string, nullable: true }
        scheme:          { type: string, enum: [internal, public], default: internal }
        listeners:
          type: array
          items: { $ref: '#/components/schemas/NetworkLoadBalancerListener' }

    StorageResourceState:
      type: string
      enum: [pending, available, failed, deleting, deleted]

    StorageVolume:
      type: object
      required: [id, tenant_id, name, size_gib, storage_class, state, created_at, updated_at]
      properties:
        id:            { type: string }
        tenant_id:     { type: string }
        name:          { type: string }
        size_gib:      { type: integer, format: int64, minimum: 1 }
        storage_class: { type: string }
        state:         { $ref: '#/components/schemas/StorageResourceState' }
        reason:        { type: string, nullable: true }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'
        created_at:    { type: string, format: date-time }
        updated_at:    { type: string, format: date-time }

    StorageFilesystem:
      type: object
