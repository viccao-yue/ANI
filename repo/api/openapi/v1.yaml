    RegistryArtifactListResponse:
      type: object
      required: [items, total]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/RegistryArtifact' } }
        total: { type: integer }
        next_cursor: { type: string, nullable: true }

    RegistryPermission:
      type: object
