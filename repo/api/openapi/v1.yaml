      description: Sprint 5 local dev profile 返回模拟 sealed object URI 和 unseal token；真实 SM4/KMS provider 接入后必须保持响应语义兼容。
      tags: [Encryption]
      x-ani-rbac-scope: "scope:encryption:use"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EncryptionSealRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EncryptionSealResponse"
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          $ref: '#/components/responses/Conflict'

  /encryption/unseal-token:
    post:
      operationId: createEncryptionUnsealToken
      summary: 生成对象解封令牌
      description: 为 Init Container 或后续模型加载流程生成限时解封令牌；当前为 local dev profile 模拟令牌。
      tags: [Encryption]
      x-ani-rbac-scope: "scope:encryption:use"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EncryptionUnsealTokenRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EncryptionUnsealTokenResponse"
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          $ref: '#/components/responses/Conflict'

  /secrets:
    get:
      operationId: listSecrets
      summary: 列出 Secret
      description: 只返回 Secret 元数据和 key 名称，不返回明文值。
      tags: [Secrets]
      x-ani-rbac-scope: "scope:secrets:read"
      parameters:
        - { name: limit,  in: query, schema: { type: integer, minimum: 1, maximum: 100 } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretListResponse"
    post:
      operationId: createSecret
      summary: 创建 Secret
      description: Sprint 5 local dev profile 存储 Secret 明文仅限本地 adapter；API 响应只返回元数据和 key 名称。
      tags: [Secrets]
      x-ani-rbac-scope: "scope:secrets:create"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecretCreateRequest"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Secret"

  /secrets/{secret_id}:
    get:
      operationId: getSecret
      summary: 查询 Secret 元数据
      tags: [Secrets]
      x-ani-rbac-scope: "scope:secrets:read"
      parameters:
        - { name: secret_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Secret"
        "404":
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteSecret
      summary: 删除 Secret
      tags: [Secrets]
      x-ani-rbac-scope: "scope:secrets:delete"
      parameters:
        - { name: secret_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Secret"
        "404":
          $ref: '#/components/responses/NotFound'

  /secrets/{secret_id}/bindings:
    post:
      operationId: bindSecret
      summary: 绑定 Secret 到工作负载
      description: 当前为 local dev profile 绑定记录；真实 K8s Secret 注入在 provider/controller 边界实现。
      tags: [Secrets]
      x-ani-rbac-scope: "scope:secrets:bind"
      parameters:
        - { name: secret_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecretBindingRequest"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretBinding"
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          $ref: '#/components/responses/Conflict'

  # ── GPU 设备清单（Core API Alpha）────────────────────────────────────────────
  /gpu-inventory:
    get:
      operationId: listGPUInventory
      summary: 查询 GPU 设备清单
      description: 返回平台所有 GPU 卡的清单视图，含型号、状态、租户分配情况。
      tags: [GPUInventory]
      x-ani-rbac-scope: "scope:gpu-inventory:read"
      parameters:
        - { name: gpu_type,  in: query, schema: { type: string } }
        - { name: status,    in: query, schema: { type: string, enum: [available, in_use, fault, maintenance] } }
        - { name: node_name, in: query, schema: { type: string } }
        - { name: limit,  in: query, schema: { type: integer, default: 50, minimum: 1, maximum: 200 } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        "200":
          description: GPU 设备清单
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GPUInventoryListResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

  /gpu-inventory/occupancy:
    get:
      operationId: getGPUOccupancy
      summary: 查询 GPU 占用分布统计
      tags: [GPUInventory]
      x-ani-rbac-scope: "scope:gpu-inventory:read"
      responses:
        "200":
          description: GPU 占用分布
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GPUOccupancyStats' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

  # ── Sandbox 模板（Core API Alpha）────────────────────────────────────────────
  /sandbox-templates:
    get:
      operationId: listSandboxTemplates
      summary: 查询 Sandbox 模板列表
      tags: [Instances]
      x-ani-rbac-scope: "scope:instances:read"
      parameters:
        - { name: limit,  in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        "200":
          description: Sandbox 模板列表
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SandboxTemplateListResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

