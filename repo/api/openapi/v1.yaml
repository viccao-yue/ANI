          $ref: '#/components/schemas/CoreDevProfileInfo'

    RegistryRepositoryListResponse:
      type: object
      required: [items, total]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/RegistryRepository' } }
        total: { type: integer }
