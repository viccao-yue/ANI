      properties:
        id:         { type: string }
        tenant_id:  { type: string }
        name:       { type: string }
        protocol:   { type: string, enum: [nfs, cephfs] }
        size_gib:   { type: integer, format: int64, minimum: 1 }
        endpoint:   { type: string, nullable: true }
        state:      { $ref: '#/components/schemas/StorageResourceState' }
        reason:     { type: string, nullable: true }
        dev_profile:
          $ref: '#/components/schemas/CoreDevProfileInfo'
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    StorageObject:
      type: object
      required: [id, tenant_id, bucket, key, size_bytes, content_type, state, created_at, updated_at]
      properties:
