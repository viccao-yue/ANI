openapi: 3.1.0

info:
  title: KuberCloud ANI Services API
  version: 1.0.0
  description: |
    ANI Services 层 REST API 契约。由 ANI Services 团队维护。
    models、inference-services、knowledge-bases 等业务资源只在本文件维护；
    ANI Core API 不承载这些业务路径。

servers:
  - url: https://{host}/api/v1/svc
    description: ANI Services API base path
    variables:
      host: { default: ani.internal }

components:
  securitySchemes:
    BearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
    ApiKeyAuth:  { type: apiKey, in: header, name: X-API-Key }

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: 未认证
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: 无权限
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: 资源冲突
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    PreconditionFailed:
      description: 前置条件不满足（code=PRECONDITION_FAILED）
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  schemas:
    ErrorResponse:
      type: object
      required: [code, message, request_id]
      properties:
        code:       { type: string }
        message:    { type: string }
        request_id: { type: string }
        details:    { type: object, additionalProperties: true }

    CursorPage:
      type: object
      properties:
        next_cursor: { type: string, nullable: true }

    AsyncTask:
      type: object
      required: [id, idempotency_key, task_type, status, created_at]
      properties:
        id:               { type: string, format: uuid }
        idempotency_key:  { type: string }
        task_type:        { type: string }
        resource_type:    { type: string, nullable: true }
        resource_id:      { type: string, format: uuid, nullable: true }
        status:           { type: string, enum: [pending, running, completed, failed, cancelled, dead_letter] }
        attempt_count:    { type: integer, minimum: 0 }
        max_attempts:     { type: integer, minimum: 1 }
        progress_pct:     { type: integer, minimum: 0, maximum: 100 }
        result:           { type: object, nullable: true }
        error_message:    { type: string, nullable: true }
        created_at:       { type: string, format: date-time }
        completed_at:     { type: string, format: date-time, nullable: true }

    Model:
      type: object
      required: [id, name, source, status, created_at]
      properties:
        id:           { type: string, format: uuid }
        name:         { type: string }
        display_name: { type: string }
        source:       { type: string, enum: [upload, huggingface, modelscope, builtin] }
        capabilities: { type: array, items: { type: string } }
        status:       { type: string, enum: [pending, downloading, ready, error, deleted] }
        total_size_bytes: { type: integer }
        created_at:   { type: string, format: date-time }

    ModelVersion:
      type: object
      required: [id, model_id, version, format, created_at]
      properties:
        id:           { type: string, format: uuid }
        model_id:     { type: string, format: uuid }
        version:      { type: string }
        format:       { type: string, enum: [safetensors, gguf, pytorch] }
        is_encrypted: { type: boolean }
        size_bytes:   { type: integer }
        created_at:   { type: string, format: date-time }

    InferenceService:
      type: object
      required: [id, name, model, status, created_at]
      properties:
        id:                { type: string, format: uuid }
        name:              { type: string }
        model:             { type: string }
        replicas:          { type: integer, default: 1 }
        gpu_type:          { type: string, nullable: true }
        gpu_count_per_pod: { type: integer, default: 1 }
        max_concurrency:   { type: integer, default: 8 }
        status:            { type: string, enum: [pending, deploying, running, stopping, stopped, failed] }
        endpoint_url:      { type: string, nullable: true }
        created_at:        { type: string, format: date-time }

    CreateModelRequest:
      type: object
      required: [idempotency_key, name, source]
      properties:
        idempotency_key: { type: string, format: uuid, description: "客户端生成UUID，防重复提交" }
        name:    { type: string }
        source:  { type: string, enum: [upload, huggingface, modelscope] }
        source_url: { type: string }

    InferenceEndpoint:
      type: object
      required: [id, name, model_version_id, status, created_at]
      properties:
        id:               { type: string, format: uuid }
        name:             { type: string }
        model_version_id: { type: string, format: uuid }
        replicas:         { type: integer, default: 1 }
        gpu_profile:      { type: string }
        status:           { type: string, enum: [pending, deploying, running, stopping, stopped, failed] }
        endpoint_url:     { type: string }
        created_at:       { type: string, format: date-time }

    CreateInferenceEndpointRequest:
      type: object
      required: [idempotency_key, name, model_version_id]
      properties:
        idempotency_key:  { type: string, format: uuid }
        name:             { type: string }
        model_version_id: { type: string, format: uuid }
        replicas:         { type: integer, minimum: 1, default: 1 }
        gpu_profile:      { type: string }

    KnowledgeBase:
      type: object
      required: [id, name, status, created_at]
      properties:
        id:      { type: string, format: uuid }
        name:    { type: string }
        status:  { type: string, enum: [active, rebuilding, deleted] }
        doc_count: { type: integer }
        created_at: { type: string, format: date-time }

    KBDocument:
      type: object
      required: [id, knowledge_base_id, file_name, status, created_at]
      properties:
        id:                { type: string, format: uuid }
        knowledge_base_id: { type: string, format: uuid }
        file_name:         { type: string }
        content_type:      { type: string, nullable: true }
        size_bytes:        { type: integer, minimum: 0 }
        status:            { type: string, enum: [uploaded, parsing, indexed, failed, deleted] }
        created_at:        { type: string, format: date-time }

    KBQueryRequest:
      type: object
      required: [question]
      properties:
        question:   { type: string }
        top_k:      { type: integer, default: 5 }
        session_id: { type: string, format: uuid, nullable: true }

    KBQueryResponse:
      type: object
      required: [answer, sources]
      properties:
        answer:  { type: string }
        sources:
          type: array
          items:
            type: object
            properties:
              doc_id:    { type: string, format: uuid }
              file_name: { type: string }
              page:      { type: integer }
              content:   { type: string }
              score:     { type: number }
        session_id:    { type: string, format: uuid }
        input_tokens:  { type: integer }
        output_tokens: { type: integer }

    GpuContainer:
      type: object
      required: [id, name, image, gpu_type, gpu_count, status, created_at]
      properties:
        id:           { type: string, format: uuid }
        name:         { type: string }
        display_name: { type: string, nullable: true }
        image:        { type: string }
        gpu_type:     { type: string }
        gpu_count:    { type: integer, minimum: 1 }
        cpu_cores:    { type: number, nullable: true }
        memory_gb:    { type: number, nullable: true }
        storage_gb:   { type: number, nullable: true }
        status:       { type: string, enum: [pending, running, stopped, failed, deleted] }
        endpoint_url: { type: string, nullable: true }
        created_at:   { type: string, format: date-time }
        updated_at:   { type: string, format: date-time, nullable: true }

    CreateGpuContainerRequest:
      type: object
      required: [idempotency_key, name, image, gpu_type, gpu_count]
      properties:
        idempotency_key: { type: string, format: uuid, description: "客户端生成UUID，防重复提交" }
        name:         { type: string, pattern: '^[a-z0-9][a-z0-9-]{0,62}$' }
        display_name: { type: string, maxLength: 128 }
        image:        { type: string }
        gpu_type:     { type: string }
        gpu_count:    { type: integer, minimum: 1, default: 1 }
        cpu_cores:    { type: number }
        memory_gb:    { type: number }
        storage_gb:   { type: number }
        env:
          type: object
          additionalProperties: { type: string }

    PatchGpuContainerRequest:
      type: object
      required: [idempotency_key]
      properties:
        idempotency_key: { type: string, format: uuid }
        display_name: { type: string, maxLength: 128 }
        replicas:     { type: integer, minimum: 1 }
        env:
          type: object
          additionalProperties: { type: string }

    GpuContainerMetrics:
      type: object
      properties:
        gpu_utilization_pct: { type: number }
        gpu_memory_used_mb:  { type: number }
        gpu_memory_total_mb: { type: number }
        cpu_utilization_pct: { type: number }
        memory_used_mb:      { type: number }
        timestamp:           { type: string, format: date-time }

    GpuContainerVersion:
      type: object
      required: [id, container_id, image, created_at]
      properties:
        id:           { type: string, format: uuid }
        container_id: { type: string, format: uuid }
        image:        { type: string }
        is_current:   { type: boolean }
        created_at:   { type: string, format: date-time }

    AvailableGpu:
      type: object
      required: [gpu_type, available_count, total_count]
      properties:
        gpu_type:        { type: string }
        available_count: { type: integer }
        total_count:     { type: integer }
        node_name:       { type: string, nullable: true }

    Sandbox:
      type: object
      required: [id, name, image, status, created_at, expires_at]
      properties:
        id:           { type: string, format: uuid }
        name:         { type: string }
        image:        { type: string }
        status:       { type: string, enum: [pending, running, paused, expired, deleted] }
        endpoint_url: { type: string, nullable: true }
        created_at:   { type: string, format: date-time }
        expires_at:   { type: string, format: date-time }
        updated_at:   { type: string, format: date-time, nullable: true }

    CreateSandboxRequest:
      type: object
      required: [idempotency_key, name, image]
      properties:
        idempotency_key: { type: string, format: uuid }
        name:        { type: string, pattern: '^[a-z0-9][a-z0-9-]{0,62}$' }
        image:       { type: string }
        ttl_hours:   { type: integer, minimum: 1, maximum: 720, default: 24 }
        cpu_cores:   { type: number }
        memory_gb:   { type: number }
        env:
          type: object
          additionalProperties: { type: string }

    PatchSandboxRequest:
      type: object
      required: [idempotency_key]
      properties:
        idempotency_key: { type: string, format: uuid }
        env:
          type: object
          additionalProperties: { type: string }

    ExtendSandboxRequest:
      type: object
      required: [idempotency_key, extend_hours]
      properties:
        idempotency_key: { type: string, format: uuid }
        extend_hours: { type: integer, minimum: 1, maximum: 720 }

    SecurityEvent:
      type: object
      required: [id, sandbox_id, event_type, severity, occurred_at]
      properties:
        id:          { type: string, format: uuid }
        sandbox_id:  { type: string, format: uuid }
        event_type:  { type: string }
        severity:    { type: string, enum: [info, warning, critical] }
        description: { type: string, nullable: true }
        occurred_at: { type: string, format: date-time }

    SecurityOverview:
      type: object
      required: [sandbox_id, total_events, critical_count, warning_count]
      properties:
        sandbox_id:     { type: string, format: uuid }
        total_events:   { type: integer }
        critical_count: { type: integer }
        warning_count:  { type: integer }
        last_event_at:  { type: string, format: date-time, nullable: true }

    TenantMember:
      type: object
      required: [id, user_id, email, role, joined_at]
      properties:
        id:        { type: string, format: uuid }
        user_id:   { type: string, format: uuid }
        email:     { type: string, format: email }
        name:      { type: string, nullable: true }
        role:      { type: string }
        joined_at: { type: string, format: date-time }

    InviteMemberRequest:
      type: object
      required: [idempotency_key, email, role]
      properties:
        idempotency_key: { type: string, format: uuid }
        email: { type: string, format: email }
        role:  { type: string }

    TenantRole:
      type: object
      required: [id, name, permissions]
      properties:
        id:          { type: string }
        name:        { type: string }
        description: { type: string, nullable: true }
        permissions: { type: array, items: { type: string } }

    SsoConfig:
      type: object
      properties:
        enabled:      { type: boolean }
        provider:     { type: string, enum: [oidc, saml], nullable: true }
        issuer_url:   { type: string, format: uri, nullable: true }
        client_id:    { type: string, nullable: true }
        redirect_url: { type: string, format: uri, nullable: true }
        updated_at:   { type: string, format: date-time, nullable: true }

    UpdateSsoConfigRequest:
      type: object
      required: [idempotency_key]
      properties:
        idempotency_key: { type: string, format: uuid }
        enabled:       { type: boolean }
        provider:      { type: string, enum: [oidc, saml] }
        issuer_url:    { type: string, format: uri }
        client_id:     { type: string }
        client_secret: { type: string }
        redirect_url:  { type: string, format: uri }

    Webhook:
      type: object
      required: [id, url, events, active, created_at]
      properties:
        id:         { type: string, format: uuid }
        url:        { type: string, format: uri }
        events:     { type: array, items: { type: string } }
        active:     { type: boolean }
        created_at: { type: string, format: date-time }

    CreateWebhookRequest:
      type: object
      required: [idempotency_key, url, events]
      properties:
        idempotency_key: { type: string, format: uuid }
        url:    { type: string, format: uri }
        events: { type: array, items: { type: string }, minItems: 1 }
        secret: { type: string }

    # ─ Phase 2 扩展 Schema ──────────────────────────────────────────────────
    InferenceServiceLogEntry:
      type: object
      required: [timestamp, level, message]
      properties:
        timestamp:  { type: string, format: date-time }
        level:      { type: string, enum: [debug, info, warn, error] }
        message:    { type: string }
        container:  { type: string, nullable: true }
        stream:     { type: string, enum: [stdout, stderr], nullable: true }

    InferenceServiceLogListResponse:
      type: object
      required: [items]
      properties:
        items:       { type: array, items: { $ref: '#/components/schemas/InferenceServiceLogEntry' } }
        next_cursor: { type: string, nullable: true }

    InferenceTestRequest:
      type: object
      required: [idempotency_key, input]
      properties:
        idempotency_key: { type: string, format: uuid }
        input:           { type: object, additionalProperties: true }
        timeout_seconds: { type: integer, minimum: 1, maximum: 300, default: 30 }

    InferenceTestResponse:
      type: object
      required: [output, latency_ms, status]
      properties:
        output:     { type: object, additionalProperties: true }
        latency_ms: { type: integer }
        model_id:   { type: string, nullable: true }
        status:     { type: string, enum: [success, timeout, error] }

    InferenceServicePolicies:
      type: object
      properties:
        rate_limit_rpm:     { type: integer, nullable: true }
        max_concurrency:    { type: integer, nullable: true }
        allowed_tenant_ids: { type: array, items: { type: string }, nullable: true }
        auth_mode:          { type: string, enum: [api_key, jwt, none], nullable: true }

    UpdateInferenceServicePoliciesRequest:
      type: object
      required: [idempotency_key]
      properties:
        idempotency_key:    { type: string, format: uuid }
        rate_limit_rpm:     { type: integer, minimum: 1, nullable: true }
        max_concurrency:    { type: integer, minimum: 1, nullable: true }
        allowed_tenant_ids: { type: array, items: { type: string } }
        auth_mode:          { type: string, enum: [api_key, jwt, none] }

    KBCitation:
      type: object
      required: [id, kb_id, doc_id, file_name, content, created_at]
      properties:
        id:         { type: string, format: uuid }
        kb_id:      { type: string, format: uuid }
        doc_id:     { type: string, format: uuid }
        file_name:  { type: string }
        page:       { type: integer, nullable: true }
        content:    { type: string }
        score:      { type: number, nullable: true }
        created_at: { type: string, format: date-time }

    KBCitationListResponse:
      type: object
      required: [items]
      properties:
        items:       { type: array, items: { $ref: '#/components/schemas/KBCitation' } }
        next_cursor: { type: string, nullable: true }

    KBSession:
      type: object
      required: [id, kb_id, created_at]
      properties:
        id:             { type: string, format: uuid }
        kb_id:          { type: string, format: uuid }
        message_count:  { type: integer }
        last_query:     { type: string, nullable: true }
        created_at:     { type: string, format: date-time }
        last_active_at: { type: string, format: date-time, nullable: true }

    KBSessionListResponse:
      type: object
      required: [items]
      properties:
        items:       { type: array, items: { $ref: '#/components/schemas/KBSession' } }
        next_cursor: { type: string, nullable: true }

    UpdateKBPermissionsRequest:
      type: object
      required: [idempotency_key]
      properties:
        idempotency_key:  { type: string, format: uuid }
        public_read:      { type: boolean }
        allowed_user_ids: { type: array, items: { type: string } }

    UpdateTenantRoleRequest:
      type: object
      required: [idempotency_key, permissions]
      properties:
        idempotency_key: { type: string, format: uuid }
        name:            { type: string }
        description:     { type: string, nullable: true }
        permissions:     { type: array, items: { type: string }, minItems: 1 }

    WebhookDelivery:
      type: object
      required: [id, webhook_id, event_type, status, attempt_count, created_at]
      properties:
        id:            { type: string, format: uuid }
        webhook_id:    { type: string, format: uuid }
        event_type:    { type: string }
        payload:       { type: object, additionalProperties: true, nullable: true }
        status:        { type: string, enum: [pending, delivered, failed, retrying] }
        http_status:   { type: integer, nullable: true }
        attempt_count: { type: integer }
        created_at:    { type: string, format: date-time }
        delivered_at:  { type: string, format: date-time, nullable: true }

    WebhookDeliveryListResponse:
      type: object
      required: [items]
      properties:
        items:       { type: array, items: { $ref: '#/components/schemas/WebhookDelivery' } }
        next_cursor: { type: string, nullable: true }

    Integration:
      type: object
      required: [id, type, name, status, created_at]
      properties:
        id:          { type: string, format: uuid }
        type:        { type: string, enum: [dingtalk, wechat_work, lark, slack, email, generic_webhook] }
        name:        { type: string }
        status:      { type: string, enum: [active, disabled] }
        webhook_url: { type: string, format: uri, nullable: true }
        created_at:  { type: string, format: date-time }

    IntegrationListResponse:
      type: object
      required: [items]
      properties:
        items:       { type: array, items: { $ref: '#/components/schemas/Integration' } }
        next_cursor: { type: string, nullable: true }

    CreateIntegrationRequest:
      type: object
      required: [idempotency_key, type, name]
      properties:
        idempotency_key: { type: string, format: uuid }
        type:        { type: string, enum: [dingtalk, wechat_work, lark, slack, email, generic_webhook] }
        name:        { type: string }
        webhook_url: { type: string, format: uri }
        config:      { type: object, additionalProperties: true }

    IntegrationBot:
      type: object
      required: [id, integration_id, name, app_id, status, created_at]
      properties:
        id:             { type: string, format: uuid }
        integration_id: { type: string, format: uuid }
        name:           { type: string }
        app_id:         { type: string }
        status:         { type: string, enum: [active, disabled] }
        created_at:     { type: string, format: date-time }

    CreateIntegrationBotRequest:
      type: object
      required: [idempotency_key, integration_id, name, app_id, app_secret]
      properties:
        idempotency_key: { type: string, format: uuid }
        integration_id:  { type: string, format: uuid }
        name:            { type: string }
        app_id:          { type: string }
        app_secret:      { type: string }

paths:
  /models:
    get:
      operationId: listModels
      summary: 获取模型列表
      tags: [Models]
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [pending, downloading, ready, error, deleted] } }
        - { name: limit, in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { name: cursor, in: query, schema: { type: string }, description: "上一页返回的 next_cursor" }
      responses:
        "200":
          description: 模型列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CursorPage'
                  - properties:
                      items: { type: array, items: { $ref: '#/components/schemas/Model' } }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: createModel
      summary: 创建模型元数据记录
      tags: [Models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [idempotency_key, name, display_name]
              properties:
                idempotency_key: { type: string, format: uuid, description: "客户端生成UUID，防重复提交" }
                name:
                  type: string
                  pattern: '^[a-z0-9][a-z0-9.-]{0,62}$'
                display_name: { type: string, minLength: 1, maxLength: 128 }
                description:  { type: string, maxLength: 1024 }
                capabilities:
                  type: array
                  items: { type: string, enum: [text-generation, embedding, speech-to-text] }
      responses:
        "201":
          description: 模型记录已创建
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Model' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "409": { $ref: '#/components/responses/Conflict' }

  /models/import:
    post:
      operationId: importModel
      summary: 从 HuggingFace 或 ModelScope 异步导入模型
      tags: [Models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [source, repo_id, idempotency_key]
              properties:
                source: { type: string, enum: [huggingface, modelscope] }
                repo_id: { type: string, minLength: 3, maxLength: 256 }
                revision: { type: string, default: "main" }
                idempotency_key: { type: string, maxLength: 128 }
                webhook_url: { type: string, format: uri }
      responses:
        "202":
          description: 导入任务已提交
          headers:
            Location:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AsyncTask' }
        "400": { $ref: '#/components/responses/BadRequest' }
