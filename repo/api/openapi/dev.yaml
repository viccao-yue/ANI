openapi: 3.1.0

info:
  title: KuberCloud ANI Dev/Demo API
  version: 0.0.0
  description: |
    ⚠️  仅供开发阶段演示，不参与 SDK 生成，不进入生产 spec。
    本文件从 api/openapi/v1.yaml 拆出（SPEC-SPLIT-A 批次），
    包含 Demo 层的模拟接口（/demo/*），用于前端信息架构验证。

    make gen-core-sdk 不会引用本文件。
    所有 /demo/* 路径在生产环境下由真实 Core API 替代。

servers:
  - url: https://{host}/api/v1
    variables:
      host:
        default: localhost:8080

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    DemoInstance:
      type: object
      required: [id, tenant_id, name, kind, status, provider, resource_refs, created_at, updated_at]
      properties:
        id:            { type: string }
        tenant_id:     { type: string }
        name:          { type: string }
        kind:          { type: string, enum: [vm, container, gpu_container] }
        status:        { type: string, enum: [pending, provisioning, running, starting, stopping, stopped, failed, deleting, deleted] }
        provider:      { type: string }
        resource_refs: { type: array, items: { type: string } }
        endpoint:      { type: string }
        created_at:    { type: string, format: date-time }
        updated_at:    { type: string, format: date-time }

    DemoCreateInstanceRequest:
      type: object
      required: [kind, name]
      properties:
        kind:        { type: string, enum: [vm, container, gpu_container] }
        name:        { type: string }
        cpu:         { type: string, example: "4" }
        memory:      { type: string, example: "8Gi" }
        boot_image:  { type: string, example: "images/ubuntu-22.04.qcow2" }
        image:       { type: string, example: "registry.local/ani/demo-app:1.0.0" }
        gpu_vendor:  { type: string, example: "nvidia" }
        gpu_model:   { type: string, example: "A100" }
        gpu_count:   { type: integer, minimum: 0 }
        auto_start:  { type: boolean, default: true }
        description: { type: string }

paths:
  /demo/instances:
    get:
      summary: "[Demo] 演示实例列表"
      tags: [Demo]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: 实例列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: '#/components/schemas/DemoInstance' } }
                  total: { type: integer }
    post:
      summary: "[Demo] 创建演示实例"
      tags: [Demo]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DemoCreateInstanceRequest' }
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DemoInstance' }

  /demo/instances/{instance_id}:
    get:
      summary: "[Demo] 演示实例详情"
      tags: [Demo]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: instance_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: 实例详情
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DemoInstance' }

  /demo/instances/{instance_id}/lifecycle:
    post:
      summary: "[Demo] 演示实例生命周期动作"
      tags: [Demo]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: instance_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string, enum: [start, stop, restart, delete] }
      responses:
        "200":
          description: 动作完成
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DemoInstance' }
